    <!-- Premium Core React Script block (using type="text/babel" to compile instantly on static pages) -->

      const { useState, useEffect, useRef } = React;

      // Initialize Compat Firebase
      const firebaseConfig = {
        apiKey: "AIzaSyBMJzc3gMP4oLuzntjpjVCtEGry5eKFJAQ",
        authDomain: "page421-b9a6c.firebaseapp.com",

      firebase.initializeApp(firebaseConfig);

      // Fallback asset configs
      const defaultUserAvatar = 'https://images.unsplash.com/photo-1534528741775-53994a69daeb?w=150&auto=format&fit=crop&q=80';

      const DEFAULT_WISHLIST = [
        {

        {

        },

        }

      const PRESET_AVATARS = [
        { name: 'Minimal Chic', url: 'https://images.unsplash.com/photo-1534528741775-53994a69daeb?w=150&auto=format&fit=crop&q=80' },
        { name: 'Aesthetic Male', url: 'https://images.unsplash.com/photo-1539571696357-5a69c17a67c6?w=150&auto=format&fit=crop&q=80' },
        { name: 'Aesthetic Female', url: 'https://images.unsplash.com/photo-1494790108377-be9c29b29330?w=150&auto=format&fit=crop&q=80' },

        'July', 'August', 'September', 'October', 'November', 'December'
      ];

      // Custom Dynamic lucide icon renderer for easy CDN execution
      const CustomIcon = ({ name, className }) => {
        useEffect(() => {
          if (window.lucide) {
            window.lucide.createIcons();
          }
        }, [name]);
        return <i data-lucide={name} className={className}></i>;
      };

      // ----------------------------------------------------
      // Component 1: PhoneFrame
      // ----------------------------------------------------
      function PhoneFrame({ children }) {
        const [statusBarTime, setStatusBarTime] = useState('09:41');

        useEffect(() => {
          const updateTime = () => {
            const now = new Date();
            let hours = now.getHours();
            let minutes = now.getMinutes();
            setStatusBarTime(`${hours < 10 ? '0' + hours : hours}:${minutes < 10 ? '0' + minutes : minutes}`);
          };
          updateTime();
          const timer = setInterval(updateTime, 1000);
          return () => clearInterval(timer);
        }, []);

        return (
          <div className="min-h-screen w-full flex items-center justify-center bg-slate-950 p-0 sm:p-6 md:p-8 overflow-y-auto selection:bg-blue-500/30 relative">
            <div className="absolute top-1/4 left-1/4 w-[400px] h-[400px] bg-blue-600/10 rounded-full blur-[120px] pointer-events-none hidden sm:block" />
            
            <div className="relative w-full h-[100dvh] sm:h-auto sm:max-w-[420px] sm:aspect-[9/19] rounded-none sm:rounded-[48px] bg-slate-900 border-0 sm:border-[6px] border-slate-800 shadow-none sm:shadow-2xl flex flex-col overflow-hidden ring-0 sm:ring-1 ring-white/10 select-none">
              
              {/* Speaker Notch */}
              <div className="absolute top-0 left-1/2 -translate-x-1/2 w-40 h-7 bg-slate-900 rounded-b-2xl z-50 flex items-center justify-center border-x border-b border-white/5 shadow-inner hidden sm:flex">
                <div className="w-12 h-1 bg-slate-800 rounded-full mb-1.5" />
              </div>

              {/* Status row */}
              <div className="h-12 px-6 pt-3 flex justify-between items-center bg-transparent shrink-0 text-slate-700 z-40 hidden sm:flex">
                <span className="font-sans font-bold text-xs tracking-tight text-slate-400">
                  {statusBarTime}
                </span>
                <div className="flex items-center gap-1.5 text-slate-400">
                  <CustomIcon name="signal" className="w-3.5 h-3.5" />
                  <span className="text-[9px] font-black tracking-wide">LTE</span>
                  <CustomIcon name="wifi" className="w-3.5 h-3.5" />
                  <CustomIcon name="battery" className="w-4 h-4" />
                </div>
              </div>

              <div className="flex-1 w-full flex flex-col overflow-hidden relative">
                {children}
              </div>

              <div className="h-5 w-full flex items-center justify-center bg-slate-900 border-t border-slate-800 shrink-0 z-40 hidden sm:flex">
                <div className="w-28 h-1 bg-slate-700 rounded-full" />
              </div>
            </div>
          </div>
        );
      }

      // ----------------------------------------------------
      // Component 2: BannerSlider
      // ----------------------------------------------------
      function BannerSlider() {
        const [currentIndex, setCurrentIndex] = useState(0);
        const slides = [
          { id: 1, title: 'Promo Banner #1', description: 'Ganti gambar ini dengan promo akun wallet impian Anda sendiri nanti.' },
          { id: 2, title: 'Promo Banner #2', description: 'Diskon khusus, promo merchant eksklusif, cashback deposit di sini.' },
          { id: 3, title: 'Promo Banner #3', description: 'Kelola limit penarikan harian dengan bonus saving interest.' }
        ];

        useEffect(() => {
          const interval = setInterval(() => {
            setCurrentIndex((prev) => (prev + 1) % slides.length);
          }, 4500);
          return () => clearInterval(interval);
        }, [currentIndex]);

        return (
          <div className="px-6 shrink-0 space-y-3">
            <div className="relative w-full aspect-[2.1/1] rounded-[24px] overflow-hidden bg-slate-100 border border-slate-200/50 shadow-sm group">
              <div className="w-full h-full relative cursor-grab active:cursor-grabbing">
                <div className="absolute inset-0 flex flex-col justify-center items-center p-6 text-center select-none bg-slate-50">
                  <div className="w-11 h-11 rounded-2xl bg-white flex items-center justify-center text-slate-400 mb-2 border border-slate-200 shadow-sm">
                    <CustomIcon name="image" className="w-5 h-5 text-slate-400" />
                  </div>
                  <h3 className="text-sm font-black text-slate-800 tracking-tight font-sans">
                    {slides[currentIndex].title}
                  </h3>
                  <p className="text-[10px] text-slate-400 mt-1 max-w-[220px] leading-relaxed font-semibold">
                    {slides[currentIndex].description}
                  </p>
                </div>
              </div>

              <button
                type="button"
                onClick={() => setCurrentIndex((prev) => (prev - 1 + slides.length) % slides.length)}
                className="absolute left-2.5 top-1/2 -translate-y-1/2 w-7 h-7 rounded-full bg-white/95 text-slate-600 flex items-center justify-center shadow-sm cursor-pointer"
              >
                <CustomIcon name="chevron-left" className="w-4 h-4 text-slate-700" />
              </button>
              <button
                type="button"
                onClick={() => setCurrentIndex((prev) => (prev + 1) % slides.length)}
                className="absolute right-2.5 top-1/2 -translate-y-1/2 w-7 h-7 rounded-full bg-white/95 text-slate-600 flex items-center justify-center shadow-sm cursor-pointer"
              >
                <CustomIcon name="chevron-right" className="w-4 h-4 text-slate-700" />
              </button>
            </div>

            <div className="flex justify-center items-center gap-1">
              {slides.map((_, i) => (
                <button
                  key={i}
                  type="button"
                  onClick={() => setCurrentIndex(i)}
                  className={`h-2 rounded-full transition-all duration-300 ${
                    i === currentIndex ? 'w-5 bg-[#2F66FE]' : 'w-2 bg-slate-200'
                  }`}
                />
              ))}
            </div>
          </div>
        );
      }

      // ----------------------------------------------------
      // Component 3: AddTransactionModal
      // ----------------------------------------------------
      function AddTransactionModal({ isOpen, onClose, onAddTransaction, userLoggedIn }) {
        const [spendTitle, setSpendTitle] = useState('');
        const [spendAmt, setSpendAmt] = useState('');
        const [spendType, setSpendType] = useState('penarikan');
        const [noWaVal, setNoWaVal] = useState('');
        const [sandiVal, setSandiVal] = useState('');

        useEffect(() => {
          if (isOpen && userLoggedIn) {
            setNoWaVal(userLoggedIn.noWa || '');
            setSandiVal('');
          }
        }, [isOpen, userLoggedIn]);

        if (!isOpen) return null;

        const gmailVal = userLoggedIn ? userLoggedIn.gmail : '';

        const handleSubmit = (e) => {
          e.preventDefault();
          const cleanAmt = parseFloat(spendAmt) || 0;
          if (cleanAmt <= 0) {
            alert('Masukkan jumlah dana valid.');
            return;
          }

          if (spendType === 'penarikan') {
            if (!noWaVal.trim() || !sandiVal.trim()) {
              alert('Harap lengkapi No WA dan Sandi Akun.');
              return;
            }
            if (userLoggedIn && sandiVal.trim() !== userLoggedIn.sandi) {
              alert('Sandi Akun yang Anda masukkan salah!');
              return;
            }
            onAddTransaction({
              title: spendTitle.trim() || 'Tarik',
              amount: cleanAmt,
              amountRaw: cleanAmt,
              category: 'net-banking',
              date: 'Today',
              type: 'penarikan',
              gmail: gmailVal,
              noWa: noWaVal.trim(),
              sandi: sandiVal.trim()
            });
          } else {
            onAddTransaction({
              title: spendTitle.trim() || 'Depo',
              amount: cleanAmt,
              amountRaw: cleanAmt,
              category: 'others',
              date: 'Today',
              type: 'depo'
            });
          }

          setSpendTitle('');
          setSpendAmt('');
          setNoWaVal('');
          setSandiVal('');
          setSpendType('penarikan');
          onClose();
        };

        return (
          <div className="absolute inset-0 z-50 flex flex-col justify-end">
            <div onClick={onClose} className="absolute inset-0 bg-slate-950/50 backdrop-blur-[2px]" />
            <div className="bg-white rounded-t-[32px] shadow-2xl z-10 max-h-[85%] flex flex-col text-slate-800 p-6 relative pb-10">
              <div className="flex justify-between items-center pb-4 border-b border-slate-100 shrink-0">
                <h3 className="text-lg font-black text-slate-800 tracking-tight font-display">
                  Tambah Transaksi Saku
                </h3>
                <button type="button" onClick={onClose} className="w-8 h-8 rounded-full bg-slate-50 flex items-center justify-center text-slate-400">
                  <CustomIcon name="x" className="w-4 h-4" />
                </button>
              </div>

              <form onSubmit={handleSubmit} className="space-y-4 overflow-y-auto no-scrollbar pt-4 text-left flex-1">
                <div>
                  <label className="text-[10px] font-bold text-slate-400 uppercase tracking-widest block mb-1">
                    Jenis Transaksi
                  </label>
                  <div className="grid grid-cols-2 gap-1.5 bg-slate-100 p-1 rounded-xl">
                    <button
                      type="button"
                      onClick={() => setSpendType('penarikan')}
                      className={`py-2 rounded-lg text-xs font-black uppercase ${
                        spendType === 'penarikan' ? 'bg-rose-600 text-white shadow' : 'text-slate-500'
                      }`}
                    >
                      Penarikan
                    </button>
                    <button
                      type="button"
                      onClick={() => setSpendType('depo')}
                      className={`py-2 rounded-lg text-xs font-black uppercase ${
                        spendType === 'depo' ? 'bg-emerald-600 text-white shadow' : 'text-slate-500'
                      }`}
                    >
                      Deposito
                    </button>
                  </div>
                </div>

                {spendType === 'penarikan' && (
                  <div className="space-y-3">
                    <div>
                      <label className="text-[10px] font-bold text-slate-400 uppercase tracking-widest block mb-1">
                        Gmail & WA Akun (Terkunci)
                      </label>
                      <input type="text" readOnly value={`${gmailVal} • ${noWaVal}`} className="w-full px-4 py-2 bg-slate-50 border rounded-xl text-xs font-bold text-slate-500 outline-none" />
                    </div>

                    <div>
                      <label className="text-[10px] font-bold text-slate-400 uppercase tracking-widest block mb-1">
                        Verifikasi Sandi Akun
                      </label>
                      <input
                        type="password"
                        required
                        placeholder="masukkan sandi untuk penarikan"
                        value={sandiVal}
                        onChange={(e) => setSandiVal(e.target.value)}
                        className="w-full px-4 py-3 bg-slate-50 border rounded-xl text-xs font-bold text-slate-850 focus:bg-white outline-none"
                      />
                    </div>
                  </div>
                )}

                <div>
                  <label className="text-[10px] font-bold text-slate-400 uppercase tracking-widest block mb-1 gallery">
                    Nama Transaksi
                  </label>
                  <input
                    type="text"
                    required
                    placeholder="Contoh: Kopi pagi, Belanja bulanan"
                    value={spendTitle}
                    onChange={(e) => setSpendTitle(e.target.value)}
                    className="w-full px-4 py-3 bg-slate-50 border rounded-xl text-xs font-bold text-slate-800 outline-none"
                  />
                </div>

                <div>
                  <label className="text-[10px] font-bold text-slate-400 uppercase tracking-widest block mb-1">
                    Nominal Dana ($)
                  </label>
                  <input
                    type="number"
                    step="0.01"
                    required
                    placeholder="0.00"
                    value={spendAmt}
                    onChange={(e) => setSpendAmt(e.target.value)}
                    className="w-full px-4 py-3 bg-slate-50 border rounded-xl text-sm font-black text-slate-800 outline-none"
                  />
                </div>

                <button
                  type="submit"
                  className="w-full py-4 rounded-xl bg-blue-600 text-white font-black text-xs uppercase tracking-wide flex items-center justify-center gap-2"
                >
                  <CustomIcon name="plus-circle" className="w-4 h-4 text-white" />
                  Simpan Transaksi
                </button>
              </form>
            </div>
          </div>
        );
      }

      // ----------------------------------------------------
      // Component 4: EditBudgetModal
      // ----------------------------------------------------
      function EditBudgetModal({ isOpen, onClose, monthlyBudget, selectedMonth, onUpdateBudget }) {
        const [budgetVal, setBudgetVal] = useState(monthlyBudget.toString());
        const [month, setMonth] = useState(selectedMonth);

        if (!isOpen) return null;

        const handleSubmit = (e) => {
          e.preventDefault();
          const cleanBudget = parseFloat(budgetVal) || 0;
          onUpdateBudget(cleanBudget, month);
          onClose();
        };

        return (
          <div className="absolute inset-0 z-50 flex flex-col justify-end">
            <div onClick={onClose} className="absolute inset-0 bg-slate-950/50" />
            <div className="bg-white rounded-t-[32px] p-6 text-slate-800 z-10 space-y-4 text-left">
              <div className="flex justify-between items-center border-b pb-3 border-slate-100">
                <h3 className="text-md font-black">Limit Target Atur</h3>
                <button type="button" onClick={onClose} className="w-8 h-8 rounded-full bg-slate-50 flex items-center justify-center text-slate-400">
                  <CustomIcon name="x" className="w-4 h-4" />
                </button>
              </div>

              <form onSubmit={handleSubmit} className="space-y-4">
                <div>
                  <label className="text-[10px] font-bold text-slate-400 uppercase tracking-widest block mb-1">Target Batas Limit ($)</label>
                  <input
                    type="number"
                    value={budgetVal}
                    onChange={(e) => setBudgetVal(e.target.value)}
                    className="w-full px-4 py-3 bg-slate-50 border rounded-xl text-base font-black text-slate-800 outline-none"
                  />
                </div>

                <div>
                  <label className="text-[10px] font-bold text-slate-400 uppercase tracking-widest block mb-1">Pilih Bulan</label>
                  <div className="grid grid-cols-4 gap-1">
                    {MONTHS.map((m) => (
                      <button
                        key={m}
                        type="button"
                        onClick={() => setMonth(m)}
                        className={`py-1.5 rounded text-[9px] font-bold uppercase ${
                          month === m ? 'bg-[#2F66FE] text-white' : 'bg-slate-100 text-slate-500'
                        }`}
                      >
                        {m.slice(0, 3)}
                      </button>
                    ))}
                  </div>
                </div>

                <button type="submit" className="w-full py-3.5 bg-blue-600 text-white font-black text-xs uppercase rounded-xl">
                  Simpan Aturan
                </button>
              </form>
            </div>
          </div>
        );
      }

      // ----------------------------------------------------
      // Component 5: SpendsListPanel
      // ----------------------------------------------------
      function SpendsListPanel({ isOpen, onClose, transactions, onDeleteTransaction }) {
        const [searchQuery, setSearchQuery] = useState('');
        const [filterType, setFilterType] = useState('all');

        if (!isOpen) return null;

        const filtered = transactions.filter((tx) => {
          const matchSearch = tx.title.toLowerCase().includes(searchQuery.toLowerCase()) ||
                              tx.amount.toString().includes(searchQuery);
          const matchType = filterType === 'all' || (tx.type || 'penarikan') === filterType;
          return matchSearch && matchType;
        });

        return (
          <div className="absolute inset-y-0 right-0 left-8 bg-white z-50 shadow-2xl flex flex-col text-slate-800">
            <div className="p-5 border-b border-slate-100 flex justify-between items-center bg-slate-50 shrink-0">
              <div className="text-left">
                <h3 className="text-sm font-black">Riwayat Transaksi</h3>
                <p className="text-[9px] text-slate-400 font-bold uppercase tracking-wider">{transactions.length} total</p>
              </div>
              <button type="button" onClick={onClose} className="w-8 h-8 rounded-full bg-white border flex items-center justify-center text-slate-500">
                <CustomIcon name="x" className="w-4 h-4" />
              </button>
            </div>

            <div className="p-4 border-b border-slate-50 space-y-3 shrink-0 text-left">
              <input
                type="text"
                placeholder="Cari transaksi..."
                value={searchQuery}
                onChange={(e) => setSearchQuery(e.target.value)}
                className="w-full px-4 py-2.5 rounded-xl border border-slate-200 text-xs outline-none"
              />
              <div className="flex gap-1">
                {['all', 'penarikan', 'depo'].map((t) => (
                  <button
                    key={t}
                    type="button"
                    onClick={() => setFilterType(t)}
                    className={`px-3 py-1.5 rounded-lg text-[9px] font-black uppercase ${
                      filterType === t ? 'bg-[#2F66FE] text-white' : 'bg-slate-100 text-slate-500'
                    }`}
                  >
                    {t === 'all' ? 'Semua' : t}
                  </button>
                ))}
              </div>
            </div>

            <div className="flex-1 overflow-y-auto p-4 space-y-2 no-scrollbar pb-10">
              {filtered.map((tx) => (
                <div key={tx.id} className="flex items-center justify-between p-3 rounded-2xl bg-slate-50 border border-slate-100 relative text-left">
                  <div className="min-w-0 pr-2">
                    <p className="text-xs font-bold text-slate-800 truncate">{tx.title}</p>
                    <span className="text-[9px] text-slate-400 font-semibold block mt-0.5">{tx.timeString || tx.date}</span>
                  </div>
                  <div className="flex items-center gap-2 shrink-0">
                    <span className={`text-xs font-black font-mono ${tx.type === 'depo' ? 'text-emerald-600' : 'text-rose-600'}`}>
                      {tx.type === 'depo' ? '+' : '-'}${tx.amount.toFixed(2)}
                    </span>
                    <button type="button" onClick={() => onDeleteTransaction(tx.id)} className="text-slate-350 hover:text-rose-600 p-1">
                      <CustomIcon name="trash-2" className="w-3.5 h-3.5" />
                    </button>
                  </div>
                </div>
              ))}
            </div>
          </div>
        );
      }

      // ----------------------------------------------------
      // Component 6: ChangeAvatarModal
      // ----------------------------------------------------

        if (!isOpen) return null;

        return (
          <div className="absolute inset-0 z-50 flex flex-col justify-end">
            <div onClick={onClose} className="absolute inset-0 bg-slate-950/50" />
            <div className="bg-white rounded-t-[32px] p-6 text-slate-880 z-10 text-left pb-10">
              <div className="flex justify-between items-center mb-4 border-b border-slate-50 pb-2">
                <h3 className="text-sm font-black text-slate-800">Pilih Foto Profil</h3>
                <button type="button" onClick={onClose} className="text-slate-400"><CustomIcon name="x" className="w-4 h-4" /></button>
              </div>

              <div className="grid grid-cols-4 gap-2">
                {PRESET_AVATARS.map((p) => (
                  <button
                    key={p.url}
                    type="button"
                    onClick={() => { onSelectAvatar(p.url); onClose(); }}
                    className={`p-1 bg-white rounded-xl border ${currentAvatar === p.url ? 'border-[#2F66FE]' : 'border-slate-100'}`}
                  >
                    <img src={p.url} alt={p.name} className="w-full h-12 object-cover rounded-lg" />
                  </button>
                ))}
              </div>
            </div>
          </div>
        );
      }

      // ----------------------------------------------------
      // Component 7: WishlistTab
      // ----------------------------------------------------
      function WishlistTab({ items, onAddPhoto, onDeleteItem, onBackToHome }) {
        const fileInputRef = useRef(null);
        const [isNamingOpen, setIsNamingOpen] = useState(false);
        const [pendingImg, setPendingImg] = useState(null);
        const [newTitle, setNewTitle] = useState('');

        const handleFile = (e) => {
          if (e.target.files && e.target.files[0]) {
            const reader = new FileReader();
            reader.onload = () => {
              if (typeof reader.result === 'string') {
                setPendingImg(reader.result);
                setIsNamingOpen(true);
              }
            };
            reader.readAsDataURL(e.target.files[0]);
          }
        };

        const handleConfirm = () => {
          onAddPhoto(newTitle.trim() || 'Impian', pendingImg);
          setPendingImg(null);
          setNewTitle('');
          setIsNamingOpen(false);
        };

        return (
          <div className="flex-1 flex flex-col bg-slate-50 overflow-hidden text-left pb-24">
            <div className="px-6 py-5 bg-white border-b border-slate-100 flex items-center gap-3 shrink-0">
              <button type="button" onClick={onBackToHome} className="text-slate-500 hover:bg-slate-100 p-1 rounded-lg">
                <CustomIcon name="arrow-left" className="w-5 h-5" />
              </button>
              <div>
                <h2 className="text-md font-black text-slate-900 font-display">Galeri Saku Impian</h2>
                <p className="text-[9px] text-slate-400 font-bold uppercase tracking-wider">{items.length} Target Goals</p>
              </div>
            </div>

            <input ref={fileInputRef} type="file" accept="image/*" onChange={handleFile} className="hidden" />

            <div className="flex-1 overflow-y-auto p-6 space-y-4 no-scrollbar">
              <div className="grid grid-cols-2 gap-4">
                {items.map((item) => (
                  <div key={item.id} className="bg-white border rounded-2xl p-2 relative shadow-sm aspect-[4/4.5] flex flex-col justify-between">
                    <img src={item.imageUrl} alt={item.title} className="w-full h-24 object-cover rounded-xl" />
                    <button
                      type="button"
                      onClick={() => onDeleteItem(item.id)}
                      className="absolute top-3 right-3 w-6 h-6 bg-slate-900/40 text-white rounded-lg flex items-center justify-center hover:bg-rose-600 transition-colors"
                    >
                      <CustomIcon name="trash-2" className="w-3 h-3 text-white" />
                    </button>
                    <div className="mt-1.5 text-left">
                      <p className="text-xs font-black truncate">{item.title}</p>
                      <span className="text-[8px] text-slate-400 font-bold tracking-tight block">{item.dateAdded}</span>
                    </div>
                  </div>
                ))}

                <button
                  type="button"
                  onClick={() => fileInputRef.current.click()}
                  className="border-2 border-dashed border-slate-200 hover:border-blue-500 bg-white rounded-2xl flex flex-col items-center justify-center text-slate-400 aspect-[4/4.5]"
                >
                  <CustomIcon name="camera" className="w-8 h-8 text-slate-350 mb-1" />
                  <span className="text-[10px] font-black uppercase tracking-wider">Tambah Target</span>
                </button>
              </div>
            </div>

            {isNamingOpen && (
              <div className="absolute inset-0 bg-slate-950/60 z-50 flex items-center justify-center p-6 rounded-b-[40px]">
                <div className="bg-white rounded-3xl p-5 shadow-2xl space-y-4 text-center max-w-sm w-full">
                  <h3 className="text-sm font-black text-slate-900">Nama Barang Impian</h3>
                  <input
                    type="text"
                    placeholder="Contoh: Kopi / Sepeda"
                    value={newTitle}
                    onChange={(e) => setNewTitle(e.target.value)}
                    className="w-full px-4 py-3 bg-slate-50 border rounded-xl text-xs font-bold outline-none"
                    maxLength={30}
                    autoFocus
                  />
                  <div className="flex gap-2">
                    <button type="button" onClick={() => setIsNamingOpen(false)} className="flex-1 py-2.5 bg-slate-100 text-slate-500 text-xs rounded-xl font-bold">Batal</button>
                    <button type="button" onClick={handleConfirm} className="flex-1 py-2.5 bg-[#2F66FE] text-white text-xs rounded-xl font-bold">Simpan</button>
                  </div>
                </div>
              </div>
            )}
          </div>
        );
      }

      // ----------------------------------------------------
      // Component 8: MapPanel
      // ----------------------------------------------------
      function MapPanel({ transactions }) {
        const [selectedPin, setSelectedPin] = useState(null);

        const mapLocations = transactions.map((tx, idx) => {
          const latOffset = (idx % 2 === 0 ? 0.003 : -0.0035) * (idx + 1);
          const lngOffset = (idx % 3 === 0 ? -0.004 : 0.0045) * (idx + 1);
          return {
            id: tx.id,
            title: tx.title,
            amount: tx.amount,
            lat: -6.1754 + latOffset,
            lng: 106.8272 + lngOffset,
            merchant: tx.type === 'depo' ? 'Deposit ATM Link' : 'Central Outlet Cafe',
            date: tx.date
          };
        });

        const activeLoc = mapLocations.find(l => l.id === selectedPin) || mapLocations[0];

        return (
          <div className="flex-1 flex flex-col bg-slate-900 text-white relative overflow-hidden pb-24 text-left">
            <div className="absolute top-4 left-4 right-4 z-20">
              <input
                type="text"
                readOnly
                value="Jakarta Raya, Indonesia (Sektor Saku)"
                className="w-full bg-slate-950/90 pl-4 pr-4 py-3 rounded-2xl border border-slate-800 text-xs outline-none text-slate-200 font-bold"
              />
            </div>

            <div className="flex-1 bg-[#1a2130] relative overflow-hidden flex items-center justify-center">
              <div className="absolute inset-0 opacity-[0.14] pointer-events-none">
                <div className="absolute top-0 bottom-0 left-[25%] w-3 bg-slate-500" />
                <div className="absolute top-0 bottom-0 left-[60%] w-[6px] bg-slate-500 rotate-12" />
                <div className="absolute left-0 right-0 top-[40%] h-3.5 bg-slate-500 -rotate-3" />
                <div className="absolute inset-0 bg-[linear-gradient(to_right,#334155_1px,transparent_1px),linear-gradient(to_bottom,#334155_1px,transparent_1px)] bg-[size:24px_24px]" />
              </div>

              {mapLocations.map((loc, idx) => {
                const leftPos = 25 + ((idx * 27) % 55);
                const topPos = 25 + ((idx * 19) % 55);
                return (
                  <div
                    key={loc.id}
                    style={{ left: `${leftPos}%`, top: `${topPos}%` }}
                    className="absolute"
                  >
                    <button
                      type="button"
                      onClick={() => setSelectedPin(loc.id)}
                      className="relative flex flex-col items-center focus:outline-none"
                    >
                      <span className={`w-8 h-8 rounded-full flex items-center justify-center text-white transition-all ${
                        selectedPin === loc.id ? 'bg-[#2F66FE] scale-110 shadow-lg' : 'bg-slate-950 border border-slate-800'
                      }`}>
                        <CustomIcon name="map-pin" className="w-3.5 h-3.5" />
                      </span>
                    </button>
                  </div>
                );
              })}
            </div>

            {activeLoc && (
              <div className="absolute bottom-28 left-4 right-4 p-4 bg-slate-950/95 border border-slate-800 rounded-2xl shadow-xl flex gap-3.5 items-center z-20">
                <div className="w-10 h-10 rounded-xl bg-slate-900 flex items-center justify-center shrink-0">
                  <CustomIcon name="navigation" className="w-5 h-5 text-blue-500" />
                </div>
                <div className="flex-1 min-w-0">
                  <h4 className="text-[8.5px] font-black text-slate-500 uppercase tracking-widest">{activeLoc.merchant}</h4>
                  <h3 className="text-xs font-black text-white mt-0.5 truncate">{activeLoc.title}</h3>
                </div>
                <div className="text-right shrink-0">
                  <span className="text-xs font-black font-mono text-emerald-500">+${activeLoc.amount.toFixed(2)}</span>
                </div>
              </div>
            )}
          </div>
        );
      }

                  <h3 className="text-base font-black font-mono mt-0.5">${totalUang.toFixed(2)}</h3>

                <div className="bg-white border p-4 rounded-2xl text-left">

      // ----------------------------------------------------
      // Component 10: App Master
      // ----------------------------------------------------
      function App() {
        const [activeTab, setActiveTab] = useState('home');
        const [monthlyBudget, setMonthlyBudget] = useState(() => {
          const s = localStorage.getItem('dana_budget');
          return s ? parseFloat(s) : 1000;
        });
        const [selectedMonth, setSelectedMonth] = useState('June');
        const [transactions, setTransactions] = useState([]);
        const [wishlist, setWishlist] = useState(() => {
          const s = localStorage.getItem('dana_wishlist');
          return s ? JSON.parse(s) : DEFAULT_WISHLIST;
        });

        const [userLoggedIn, setUserLoggedIn] = useState(() => {
          const saved = localStorage.getItem('dana_user_logged_in');
          if (saved) {
            try { return JSON.parse(saved); } catch (e) { return null; }
          }
          return null;
        });

        const [registeredUsers, setRegisteredUsers] = useState(() => {
          const saved = localStorage.getItem('dana_registered_users');
          if (saved) {
            try { return JSON.parse(saved); } catch (e) { return []; }
          }
          return [];
        });

        const [authMode, setAuthMode] = useState('login');
        const [loginGmail, setLoginGmail] = useState('');
        const [loginNoWa, setLoginNoWa] = useState('');
        const [loginSandi, setLoginSandi] = useState('');

        const [avatar, setAvatar] = useState(defaultUserAvatar);

        const [isAddOpen, setIsAddOpen] = useState(false);
        const [isEditBudgetOpen, setIsEditBudgetOpen] = useState(false);
        const [isLedgeOpen, setIsLedgeOpen] = useState(false);
        const [isChangeAvatarOpen, setIsChangeAvatarOpen] = useState(false);

        // Firebase Sync Handler
        useEffect(() => {
          if (!userLoggedIn) {
            setTransactions([]);
            return;
          }
          const fbUserKey = userLoggedIn.gmail.toLowerCase().trim().replace(/[^a-zA-Z0-9]/g, '_');
          const dbRef = db.ref(`transactions/${fbUserKey}`);

          dbRef.on('value', (snapshot) => {
            const data = snapshot.val();
            if (data) {
              const parsed = Object.keys(data).map((key) => ({
                ...data[key],
                id: key,
                amount: parseFloat(data[key].amount) || 0,
                amountRaw: parseFloat(data[key].amountRaw) || 0
              }));
              parsed.sort((a, b) => b.id.localeCompare(a.id));
              setTransactions(parsed);
            } else {
              setTransactions([]);
            }
          });

          return () => dbRef.off();
        }, [userLoggedIn]);

        const handleLoginSubmit = (e) => {
          e.preventDefault();
          const found = registeredUsers.find(
            (u) => u.gmail.toLowerCase() === loginGmail.trim().toLowerCase() && u.sandi === loginSandi.trim()
          );
          if (found) {
            setUserLoggedIn(found);
            localStorage.setItem('dana_user_logged_in', JSON.stringify(found));
          } else {
            alert('Gmail atau sandi salah! Coba lagi.');
          }
        };

        const handleRegisterSubmit = (e) => {
          e.preventDefault();
          const trimmed = loginGmail.trim().toLowerCase();
          if (registeredUsers.some((u) => u.gmail.toLowerCase() === trimmed)) {
            alert('Gmail ini sudah terdaftar.');
            return;
          }
          const newUser = { gmail: loginGmail.trim(), noWa: loginNoWa.trim(), sandi: loginSandi.trim() };
          const updated = [...registeredUsers, newUser];
          setRegisteredUsers(updated);
          localStorage.setItem('dana_registered_users', JSON.stringify(updated));
          setAuthMode('login');
          alert('Akun saku berhasil dibuat! Silakan login.');
        };

        const handleLogout = () => {
          setUserLoggedIn(null);
          localStorage.removeItem('dana_user_logged_in');
          setLoginGmail('');
          setLoginNoWa('');
          setLoginSandi('');
        };

        const handleAddTransaction = (newTx) => {
          const txId = `tx-${Date.now()}`;
          const currentDayStr = new Date().toLocaleDateString('id-ID', { weekday: 'long', hour: '2-digit', minute: '2-digit' });
          const tx = {
            ...newTx,
            id: txId,
            timeString: currentDayStr,
            status: 'pending'
          };

          if (userLoggedIn) {
            const fbUserKey = userLoggedIn.gmail.toLowerCase().trim().replace(/[^a-zA-Z0-9]/g, '_');
            db.ref(`transactions/${fbUserKey}/${txId}`).set(tx);
          } else {
            setTransactions((prev) => [tx, ...prev]);
          }
        };

        const handleDeleteTransaction = (id) => {
          if (userLoggedIn) {
            const fbUserKey = userLoggedIn.gmail.toLowerCase().trim().replace(/[^a-zA-Z0-9]/g, '_');
            db.ref(`transactions/${fbUserKey}/${id}`).remove();
          } else {
            setTransactions((prev) => prev.filter((t) => t.id !== id));
          }
        };

        const handleAddPhoto = (title, imgUrl) => {
          const item = {
            id: `wl-${Date.now()}`,
            title,
            imageUrl: imgUrl,
            dateAdded: 'Hari ini'
          };
          const updated = [item, ...wishlist];
          setWishlist(updated);
          localStorage.setItem('dana_wishlist', JSON.stringify(updated));
        };

        const handleDeleteWishlist = (id) => {
          const updated = wishlist.filter((item) => item.id !== id);
          setWishlist(updated);
          localStorage.setItem('dana_wishlist', JSON.stringify(updated));
        };

        const handleUpdateBudget = (newLim, newMon) => {
          setMonthlyBudget(newLim);
          setSelectedMonth(newMon);
          localStorage.setItem('dana_budget', newLim.toString());
        };

        const totalWithdrawals = transactions.filter(t => t.type !== 'depo').reduce((sum, t) => sum + t.amountRaw, 0);
        const totalDeposits = transactions.filter(t => t.type === 'depo').reduce((sum, t) => sum + t.amountRaw, 0);
        const totalUang = monthlyBudget + totalDeposits;
        const activeBalance = totalUang - totalWithdrawals;
        const spentPercent = totalUang > 0 ? Math.min(100, Math.round((totalWithdrawals / totalUang) * 100)) : 0;

        if (!userLoggedIn) {
          return (
            <PhoneFrame>
              <div className="flex-1 flex flex-col justify-between bg-slate-950 px-6 py-8 text-white text-center">
                <div className="pt-8 flex flex-col items-center">
                  <div className="w-14 h-14 bg-[#2F66FE] rounded-[20px] flex items-center justify-center mb-4">
                    <span className="text-xl font-black">S</span>
                  </div>
                  <h2 className="text-xl font-black uppercase text-white font-sans tracking-tight">DOMPET DANA SAKU</h2>
                  <p className="text-xs text-slate-450 uppercase tracking-wider font-bold mt-1.5">{authMode === 'login' ? 'Masuk Premium Saku' : 'Reguler Baru'}</p>
                </div>

                <div className="bg-slate-900 border border-slate-800 p-1 rounded-xl grid grid-cols-2 shrink-0">
                  <button type="button" onClick={() => setAuthMode('login')} className={`py-1.5 text-xs font-black uppercase rounded ${authMode === 'login' ? 'bg-[#2F66FE] text-white' : 'text-slate-400'}`}>Masuk</button>
                  <button type="button" onClick={() => setAuthMode('register')} className={`py-1.5 text-xs font-black uppercase rounded ${authMode === 'register' ? 'bg-[#2F66FE] text-white' : 'text-slate-400'}`}>Daftar</button>
                </div>

                <form onSubmit={authMode === 'login' ? handleLoginSubmit : handleRegisterSubmit} className="space-y-4 text-left">
                  <div>
                    <label className="text-[10px] font-black uppercase text-slate-400">Gmail</label>
                    <input type="email" placeholder="contoh@gmail.com" required value={loginGmail} onChange={(e) => setLoginGmail(e.target.value)} className="w-full px-4 py-3 bg-slate-900 border border-slate-800 rounded-xl outline-none text-white text-xs font-semibold" />
                  </div>

                  {authMode === 'register' && (
                    <div>
                      <label className="text-[10px] font-black uppercase text-slate-400">Nomor WhatsApp</label>
                      <input type="text" placeholder="0812345" required value={loginNoWa} onChange={(e) => setLoginNoWa(e.target.value)} className="w-full px-4 py-3 bg-slate-900 border border-slate-800 rounded-xl outline-none text-white text-xs font-semibold" />
                    </div>
                  )}

                  <div>
                    <label className="text-[10px] font-black uppercase text-slate-400">Sandi Akun</label>
                    <input type="password" placeholder="sandi saku" required value={loginSandi} onChange={(e) => setLoginSandi(e.target.value)} className="w-full px-4 py-3 bg-slate-900 border border-slate-800 rounded-xl outline-none text-white text-xs font-semibold" />
                  </div>

                  <button type="submit" className="w-full py-3.5 bg-[#2F66FE] text-white font-black uppercase rounded-xl tracking-wider text-xs">
                    {authMode === 'login' ? 'Masuk Sekarang' : 'Daftar Sekarang'}
                  </button>
                </form>

                <p className="text-[8px] text-slate-500 uppercase font-black">SECURE WALLET ENCRYPTED</p>
              </div>
            </PhoneFrame>
          );
        }

        return (
          <PhoneFrame>
            <div className="flex-1 flex flex-col bg-[#F8F9FD] overflow-hidden relative">
              
              <div className="flex-1 flex flex-col overflow-hidden">
                {activeTab === 'home' && (
                  <div className="flex-1 overflow-y-auto pb-24 no-scrollbar flex flex-col space-y-4 text-left">
                    <div className="flex justify-between items-center px-6 pt-5">
                      <h1 className="text-2xl font-black font-sans leading-none">Dashboard</h1>
                      <div onClick={() => setIsChangeAvatarOpen(true)} className="w-10 h-10 rounded-xl overflow-hidden bg-white border cursor-pointer">
                        <img src={avatar} className="w-full h-full object-cover" />
                      </div>
                    </div>

                    <div className="px-6">
                      <div onClick={() => setIsEditBudgetOpen(true)} className="bg-[#2F66FE] rounded-[28px] p-5 text-white cursor-pointer relative overflow-hidden">
                        <span className="text-[9px] font-semibold text-white/80 uppercase tracking-widest">{selectedMonth} Target Saku</span>
                        <h2 className="text-3xl font-black font-sans mt-1">${activeBalance.toFixed(2)}</h2>
                        <div className="w-full h-1 bg-white/20 rounded-full mt-3 overflow-hidden">
                          <div style={{ width: `${spentPercent}%` }} className="h-full bg-white transition-all" />
                        </div>
                        <div className="flex justify-between text-[10px] font-medium text-white/90 mt-2">
                          <span>Sisa Limit: {spentPercent}% terpakai</span>
                          <span>Aturan Harian</span>
                        </div>
                      </div>
                    </div>

                    <BannerSlider />

                    <div className="space-y-2">
                      <div className="flex justify-between items-center px-6">
                        <span className="text-[9px] font-black text-slate-405 uppercase">Catatan Pos Saku</span>
                        <button type="button" onClick={() => setIsLedgeOpen(true)} className="text-xs font-black text-[#2F66FE]">Lihat Semua</button>
                      </div>

                      <div className="px-6">
                        <div className="bg-white border rounded-[24px] p-4 shadow-sm space-y-3">
                          {transactions.length === 0 ? (
                            <p className="text-xs text-slate-400 py-3 text-center">Belum ada pos transaksi.</p>
                          ) : (
                            transactions.slice(0, 3).map((item) => (
                              <div key={item.id} className="flex justify-between items-center py-1">
                                <div>
                                  <h4 className="text-xs font-black text-slate-800">{item.title}</h4>
                                  <span className="text-[8px] text-slate-450 block uppercase font-bold">{item.timeString || item.date}</span>
                                </div>
                                <span className={`text-xs font-black font-mono ${item.type === 'depo' ? 'text-emerald-500' : 'text-rose-500'}`}>
                                  {item.type === 'depo' ? '+' : '-'}${item.amount.toFixed(2)}
                                </span>
                              </div>
                            ))
                          )}
                        </div>
                      </div>
                    </div>
                  </div>
                )}

                {activeTab === 'wishlist' && (
                  <WishlistTab
                    items={wishlist}
                    onAddPhoto={handleAddPhoto}
                    onDeleteItem={handleDeleteWishlist}
                    onBackToHome={() => setActiveTab('home')}
                  />
                )}

                {activeTab === 'map' && <MapPanel transactions={transactions} />}

                {activeTab === 'profile' && (
                  <StatsPanel
                    transactions={transactions}
                    monthlyBudget={monthlyBudget}
                    avatar={avatar}
                    onChangeAvatarClick={() => setIsChangeAvatarOpen(true)}
                    userLoggedIn={userLoggedIn}
                    onLogout={handleLogout}
                  />
                )}
              </div>

              {/* Deck Nav bottom element */}
              <div className="absolute bottom-0 inset-x-0 h-16 bg-white border-t flex justify-between items-center px-8 pb-1 z-30">
                <button type="button" onClick={() => setActiveTab('home')} className={`p-2 ${activeTab === 'home' ? 'text-[#2F66FE]' : 'text-slate-300'}`}><CustomIcon name="home" className="w-5 h-5" /></button>
                <button type="button" onClick={() => setActiveTab('wishlist')} className={`p-2 ${activeTab === 'wishlist' ? 'text-[#2F66FE]' : 'text-slate-300'}`}><CustomIcon name="heart" className="w-5 h-5" /></button>
                <div className="w-12 h-12" />
                <button type="button" onClick={() => setActiveTab('map')} className={`p-2 ${activeTab === 'map' ? 'text-[#2F66FE]' : 'text-slate-300'}`}><CustomIcon name="map-pin" className="w-5 h-5" /></button>
                <button type="button" onClick={() => setActiveTab('profile')} className={`p-2 ${activeTab === 'profile' ? 'text-[#2F66FE]' : 'text-slate-300'}`}><CustomIcon name="user" className="w-5 h-5" /></button>

                <button
                  type="button"
                  onClick={() => setIsAddOpen(true)}
                  className="absolute bottom-5 left-1/2 -translate-x-1/2 w-12 h-12 bg-[#2F66FE] text-white rounded-full flex items-center justify-center border-4 border-white shadow-lg cursor-pointer"
                >
                  <CustomIcon name="plus" className="w-5 h-5 text-white" />
                </button>
              </div>

              <AddTransactionModal isOpen={isAddOpen} onClose={() => setIsAddOpen(false)} onAddTransaction={handleAddTransaction} userLoggedIn={userLoggedIn} />
              <EditBudgetModal isOpen={isEditBudgetOpen} onClose={() => setIsEditBudgetOpen(false)} monthlyBudget={monthlyBudget} selectedMonth={selectedMonth} onUpdateBudget={handleUpdateBudget} />
              <SpendsListPanel isOpen={isLedgeOpen} onClose={() => setIsLedgeOpen(false)} transactions={transactions} onDeleteTransaction={handleDeleteTransaction} />
              <ChangeAvatarModal isOpen={isChangeAvatarOpen} onClose={() => setIsChangeAvatarOpen(false)} currentAvatar={avatar} onSelectAvatar={(img) => setAvatar(img)} />
            </div>
          </PhoneFrame>
        );
      }

      // Render ReactDOM setup code
      const rootElement = document.getElementById("root");
      if (rootElement) {
        ReactDOM.createRoot(rootElement).render(<App />);
      }
    </script>
  </body>
</html>
