<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OVO Clone - Simulasi Dompet Digital Premium</title>
  <!-- Google Fonts & Tailwind Play CDN -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            brandPurp: '#4C2A86',
            brandMint: '#50E3C2',
            brandTeal: '#06B3BA',
          }
        }
      }
    }
  </script>
  <!-- React & Babel CDN -->
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <!-- Firebase Compat Core -->
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
  <style>
    body { font-family: 'Inter', sans-serif; }
    .scrollbar-none::-webkit-scrollbar { display: none; }
    .scrollbar-none { -ms-overflow-style: none; scrollbar-width: none; }
    @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
    .animate-slide-up { animation: slideUp 0.3s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
  </style>
</head>
<body class="bg-slate-950 text-slate-800 antialiased overflow-x-hidden">

  <div id="root"></div>

  <!-- React JSX Application Code -->
  <script type="text/babel">
    const { useState, useEffect, createContext, useContext, useRef } = React;

    // --- Dynamic SVG Icon Component ---
    const Icon = ({ name, className = "w-5 h-5", ...props }) => {
      const icons = {
        home: <g><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></g>,
        trendingup: <g><polyline points="22 7 13.5 15.5 8.5 10.5 2 17"/><polygon points="16 7 22 7 22 13"/></g>,
        mail: <g><rect width="20" height="16" x="2" y="4" rx="2"/><path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/></g>,
        user: <g><path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></g>,
        smartphone: <g><rect x="5" y="2" width="14" height="20" rx="2" ry="2"/><line x1="12" y1="18" x2="12.01" y2="18"/></g>,
        zap: <g><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></g>,
        gamepad: <g><rect x="2" y="6" width="20" height="12" rx="3"/><line x1="6" y1="12" x2="10" y2="12"/><line x1="8" y1="10" x2="8" y2="14"/></g>,
        heart: <g><path d="M19 14c1.49-1.46 3-3.21 3-5.5A5.5 5.5 0 0 0 16.5 3c-1.76 0-3 .5-4.5 2-1.5-1.5-2.74-2-4.5-2A5.5 5.5 0 0 0 2 8.5c0 2.3 1.5 4.05 3 5.5l7 7Z"/></g>,
        droplet: <g><path d="M12 22a7 7 0 0 0 7-7c0-4.3-7-11-7-11S5 10.7 5 15a7 7 0 0 0 7 7z"/></g>,
        bell: <g><path d="M6 8a6 6 0 0 1 12 0c0 7 3 9 3 9H3s3-2 3-9"/><path d="M10.3 21a1.94 1.94 0 0 0 3.4 0"/></g>,
        pluscircle: <g><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="16"/><line x1="8" y1="12" x2="16" y2="12"/></g>,
        send: <g><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></g>,
        qrcode: <g><rect width="5" height="5" x="3" y="3" rx="1"/><rect width="5" height="5" x="16" y="3" rx="1"/><rect width="5" height="5" x="3" y="16" rx="1"/><path d="M21 16v5h-5m0-5h5V11h-5v5m-5 5h3m-2 0v-5m-2-5h4M10 10h4v4h-4z"/></g>,
        history: <g><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><polyline points="3 3 3 8 8 8"/></g>,
        award: <g><circle cx="12" cy="8" r="7"/><polyline points="8.21 13.89 7 23 12 20 17 23 15.79 13.88"/></g>,
        chevronright: <g><polyline points="9 18 15 12 9 6"/></g>,
        sparkles: <g><path d="m12 3-1.912 5.813a2 2 0 0 1-1.275 1.275L3 12l5.813 1.912a2 2 0 0 1 1.275 1.275L12 21l1.912-5.813a2 2 0 0 1 1.275-1.275L21 12l-5.813-1.912a2 2 0 0 1-1.275-1.275L12 3Z"/></g>,
        info: <g><circle cx="12" cy="12" r="10"/><line x1="12" y1="16" x2="12" y2="12"/><line x1="12" y1="8" x2="12.01" y2="8"/></g>,
        shieldcheck: <g><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/><polyline points="9 11 11 13 15 9"/></g>,
        checkcircle: <g><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></g>,
        x: <g><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></g>,
        laptop: <g><rect width="18" height="12" x="3" y="4" rx="2" ry="2"/><line x1="2" y1="20" x2="22" y2="20"/><line x1="12" y1="16" x2="12" y2="16"/></g>,
        database: <g><ellipse cx="12" cy="5" rx="9" ry="3"/><path d="M3 5v14c0 1.66 4 3 9 3s9-1.34 9-3V5"/><path d="M3 12c0 1.66 4 3 9 3s9-1.34 9-3"/></g>
      };
      const key = name.toLowerCase().replace(/[-_ ]/g, "");
      return (
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" className={className} {...props}>
          {icons[key] || icons["info"]}
        </svg>
      );
    };

    // --- State Context Provider & Reducer Logic ---
    const OvoContext = createContext();

    const OvoProvider = ({ children }) => {
      const [state, setState] = useState(() => {
        const local = localStorage.getItem('ovo_wallet_state_v5');
        return local ? JSON.parse(local) : {
          ovoCash: 125000,
          ovoPoints: 5200,
          userTier: 'Club',
          transactions: [
            { id: 't-1', title: 'Top Up PAGE Cash', description: 'Metode Alfamart/Indomaret', amount: 50000, type: 'topup', category: 'Isi Saldo', date: new Date(Date.now() - 3600000*2).toISOString(), status: 'SUCCESS', referenceNumber: 'PAGE-889811' },
            { id: 't-2', title: 'Kopi Kenangan Mall', description: 'Pembayaran QRIS Sukses', amount: 24000, type: 'bill_payment', category: 'Kuliner', date: new Date(Date.now() - 3600000*24).toISOString(), status: 'SUCCESS', referenceNumber: 'PAGE-333190' }
          ],
          notifications: [
            { id: 'n-1', title: 'Cashback Gila 50%!', message: 'Dapatkan diskon nonton XXI dan jajan s/d 50.000 menggunakan saldo PAGE Cash Anda sekarang!', type: 'promo', date: new Date().toISOString(), read: false }
          ],
          userName: 'Budi Santoso',
          userPhone: '+62 812-4567-8901',
          userPin: '123456',
          userEmail: 'budisantoso@gmail.com',
        };
      });

      const [portfolio, setPortfolio] = useState(() => {
        const local = localStorage.getItem('ovo_portfolio_state_v5');
        return local ? JSON.parse(local) : {
          balance: 20000,
          totalProfit: 1250,
          profitPercentage: 6.25,
          performanceHistory: [
            { date: 'H-5', value: 18000 },
            { date: 'H-4', value: 18500 },
            { date: 'H-3', value: 19100 },
            { date: 'H-2', value: 19000 },
            { date: 'H-1', value: 19600 },
            { date: 'Hari Ini', value: 20000 }
          ]
        };
      });

      const [activeTab, setActiveTab] = useState('home');
      const [activeOverlay, setActiveOverlay] = useState('none'); // topup, transfer, bills, upgrade, scan, my_qr, invest
      const [selectedService, setSelectedService] = useState(null); // pulsa, pln, game, bpjs, water
      const [selectedTransaction, setSelectedTransaction] = useState(null);
      const [isLoggedIn, setIsLoggedIn] = useState(() => localStorage.getItem('ovo_is_logged_in') === 'true');
      const [pinModalOpen, setPinModalOpen] = useState(false);
      const [pinCallback, setPinCallback] = useState(null);
      const [toast, setToast] = useState(null);

      useEffect(() => { localStorage.setItem('ovo_wallet_state_v5', JSON.stringify(state)); }, [state]);
      useEffect(() => { localStorage.setItem('ovo_portfolio_state_v5', JSON.stringify(portfolio)); }, [portfolio]);
      useEffect(() => { localStorage.setItem('ovo_is_logged_in', isLoggedIn); }, [isLoggedIn]);

      const triggerToast = (msg, isErr = false) => {
        setToast({ msg, isErr });
        setTimeout(() => setToast(null), 3500);
      };

      const showPinModal = (callback) => {
        setPinCallback(() => callback);
        setPinModalOpen(true);
      };

      const verifyPinAndExecute = (enteredPin) => {
        if (enteredPin === state.userPin) {
          if (pinCallback) pinCallback();
          setPinModalOpen(false);
          setPinCallback(null);
          return true;
        }
        return false;
      };

      // --- Firebase Live Listeners ---
      const getFirebaseDb = () => {
        try {
          const fb = window.firebase;
          if (fb && fb.apps.length === 0) {
            fb.initializeApp({
              apiKey: "AIzaSyBMJzc3gMP4oLuzntjpjVCtEGry5eKFJAQ",
              authDomain: "page421-b9a6c.firebaseapp.com",
              databaseURL: "https://page421-b9a6c-default-rtdb.asia-southeast1.firebasedatabase.app/",
              projectId: "page421-b9a6c"
            });
          }
          return fb ? fb.database() : null;
        } catch (e) { return null; }
      };

      const listenToFirebaseTx = (txId, pushKey) => {
        const db = getFirebaseDb();
        if (!db || !pushKey) return;
        
        const ref = db.ref(`topup/${pushKey}`);
        ref.on('value', (snapshot) => {
          const val = snapshot.val();
          if (val && val.status) {
            const status = val.status.toLowerCase().trim();
            if (status === 'selesai' || status === 'success' || status === 'approve') {
              approveTopUp(txId, val.nominal);
              ref.off();
            } else if (status === 'failed' || status === 'ditolak' || status === 'reject') {
              rejectTopUp(txId);
              ref.off();
            }
          }
        });
      };

      const registerUser = (email, pin) => {
        const namePart = email.split('@')[0].toUpperCase();
        setState(prev => ({
          ...prev,
          userName: namePart,
          userPin: pin,
          userEmail: email,
          ovoCash: 0,
          ovoPoints: 0,
          transactions: []
        }));
        triggerToast("Akun " + namePart + " Berhasil Dibuat!");
      };

      const approveTopUp = (txId, cashGain) => {
        setState(prev => {
          const txs = prev.transactions.map(t => t.id === txId ? { ...t, status: 'SUCCESS' } : t);
          return { ...prev, ovoCash: prev.ovoCash + cashGain, transactions: txs };
        });
        triggerToast("Top Up Berhasil Disetujui Admin!");
      };

      const rejectTopUp = (txId) => {
        setState(prev => ({
          ...prev,
          transactions: prev.transactions.map(t => t.id === txId ? { ...t, status: 'FAILED' } : t)
        }));
        triggerToast("Top Up Ditolak Oleh Admin.", true);
      };

      const addTransaction = (tProps, status = 'SUCCESS') => {
        const tx = {
          id: `tx-${Date.now()}`,
          date: new Date().toISOString(),
          referenceNumber: 'PAGE-' + Math.floor(100000 + Math.random() * 900000),
          status,
          ...tProps
        };
        setState(prev => ({ ...prev, transactions: [tx, ...prev.transactions] }));
        return tx;
      };

      const topUp = (nominal, method) => {
        const newTx = addTransaction({
          title: 'Top Up PAGE Cash',
          description: `Isi ulang via ${method}`,
          amount: nominal,
          type: 'topup',
          category: 'Top Up'
        }, 'PENDING');

        const db = getFirebaseDb();
        if (db) {
          const pushRef = db.ref('topup').push();
          const key = pushRef.key;
          pushRef.set({
            email: state.userEmail,
            nominal: nominal,
            status: 'pending',
            timestamp: Date.now(),
            uid: 'OVO-MOCK-RAND'
          }).then(() => {
            setState(prev => ({
              ...prev,
              transactions: prev.transactions.map(t => t.id === newTx.id ? { ...t, firebasePushKey: key } : t)
            }));
            listenToFirebaseTx(newTx.id, key);
          });
        }
        triggerToast("Top Up Tertunda! Menunggu Persetujuan Admin dari Firebase.");
        return newTx;
      };

      const transfer = (name, target, amount, note, bankName) => {
        const fee = bankName ? 2500 : 0;
        const total = amount + fee;
        if (state.ovoCash < total) {
          triggerToast("Saldo PAGE Cash tidak mencukupi!", true);
          return false;
        }
        setState(prev => ({ ...prev, ovoCash: prev.ovoCash - total }));
        addTransaction({
          title: bankName ? `Transfer Bank ke ${name}` : `Transfer ke ${name}`,
          description: bankName ? `${bankName} (${target})` : `Sesama PAGE (${target}) • ${note}`,
          amount: amount,
          type: 'transfer_out',
          category: 'Transfer'
        });
        triggerToast("Transfer Berhasil Dikirim!");
        return true;
      };

      const payBill = (serviceType, identityNo, cost, pointsEnable) => {
        let cashToUse = cost;
        let pointsToUse = 0;
        if (pointsEnable) {
          if (state.ovoPoints >= cost) {
            pointsToUse = cost;
            cashToUse = 0;
          } else {
            pointsToUse = state.ovoPoints;
            cashToUse = cost - pointsToUse;
          }
        }
        if (state.ovoCash < cashToUse) {
          triggerToast("Saldo tidak mencukupi tagihan!", true);
          return false;
        }
        setState(prev => ({
          ...prev,
          ovoCash: prev.ovoCash - cashToUse,
          ovoPoints: prev.ovoPoints - pointsToUse + Math.floor(cashToUse * 0.05)
        }));
        addTransaction({
          title: `${serviceType.toUpperCase()} Tagihan - ${identityNo}`,
          description: `Pembayaran ${serviceType.toUpperCase()} berhasil`,
          amount: cost,
          type: 'bill_payment',
          category: 'Tagihan',
          pointsEarned: Math.floor(cashToUse * 0.05)
        });
        triggerToast("Tagihan Berhasil Dibayar!");
        return true;
      };

      const investMoney = (nominal, isBuy) => {
        if (isBuy) {
          if (state.ovoCash < nominal) {
            triggerToast("Saldo Cash kurang!", true);
            return false;
          }
          setState(prev => ({ ...prev, ovoCash: prev.ovoCash - nominal }));
          setPortfolio(prev => {
            const nextBal = prev.balance + nominal;
            return {
              ...prev,
              balance: nextBal,
              performanceHistory: [...prev.performanceHistory.slice(1), { date: 'Hari Ini', value: nextBal }]
            };
          });
          addTransaction({ title: 'Beli Reksa Dana Syariah', description: 'Portofolio PAGE Invest', amount: nominal, type: 'expense', category: 'Investasi' });
          triggerToast("Investasi Saham Reksa Dana Berhasil!");
        } else {
          if (portfolio.balance < nominal) {
            triggerToast("Saldo Investasi tidak cukup!", true);
            return false;
          }
          setPortfolio(prev => {
            const nextBal = prev.balance - nominal;
            return {
              ...prev,
              balance: nextBal,
              performanceHistory: [...prev.performanceHistory.slice(1), { date: 'Hari Ini', value: nextBal }]
            };
          });
          setState(prev => ({ ...prev, ovoCash: prev.ovoCash + nominal }));
          addTransaction({ title: 'Jual Reksa Dana Syariah', description: 'Pencairan PAGE Invest', amount: nominal, type: 'income', category: 'Investasi' });
          triggerToast("Pencairan Investasi Berhasil dicover!");
        }
        return true;
      };

      const upgradeToPremier = () => {
        setState(prev => ({ ...prev, userTier: 'Premier' }));
        triggerToast("Upgrade Premier Berhasil Dimetodologi!");
      };

      const readNotification = (id) => {
        setState(prev => ({
          ...prev,
          notifications: prev.notifications.map(n => n.id === id ? { ...n, read: true } : n)
        }));
      };

      return (
        <OvoContext.Provider value={{
          state, portfolio, activeTab, activeOverlay, selectedService, selectedTransaction, isLoggedIn, pinModalOpen, toast,
          setActiveTab, setActiveOverlay, setSelectedService, setSelectedTransaction, setIsLoggedIn, showPinModal, verifyPinAndExecute,
          registerUser, topUp, transfer, payBill, investMoney, upgradeToPremier, readNotification, approveTopUp, rejectTopUp, setPinModalOpen
        }}>
          {children}
        </OvoContext.Provider>
      );
    };

    const useOvo = () => useContext(OvoContext);

    // --- Component: Dynamic Numerical Check Code Modal ---
    const PinModal = () => {
      const { pinModalOpen, state, verifyPinAndExecute, setPinModalOpen } = useOvo();
      const [pin, setPin] = useState('');
      const [hasErr, setHasErr] = useState(false);

      if (!pinModalOpen) return null;

      const press = (num) => {
        setHasErr(false);
        if (pin.length < 6) {
          const next = pin + num;
          setPin(next);
          if (next.length === 6) {
            setTimeout(() => {
              if (!verifyPinAndExecute(next)) {
                setHasErr(true);
                setPin('');
              }
            }, 150);
          }
        }
      };

      return (
        <div className="absolute inset-0 z-[100] bg-brandPurp text-white flex flex-col justify-between p-6">
          <div className="flex items-center justify-between">
            <button onClick={() => setPinModalOpen(false)} className="text-white text-sm font-bold flex items-center gap-1"><Icon name="arrowleft" className="w-5 h-5"/> Kembali</button>
            <span className="font-bold text-xs uppercase tracking-widest text-[#50E3C2]">Keamanan Transaksi</span>
            <div className="w-8"></div>
          </div>
          <div className="text-center flex-1 flex flex-col items-center justify-center -mt-6">
            <Icon name="shieldcheck" className="w-12 h-12 text-brandMint mb-3 animate-pulse"/>
            <h3 className="text-lg font-bold">Masukkan Security Code</h3>
            <p className="text-xs text-purple-200 mt-1 max-w-[240px]">Masukkan 6-Digit PIN akun PAGE untuk menyelesaikan transaksi ini.</p>
            <div className={`flex gap-3 my-6 ${hasErr ? 'animate-bounce' : ''}`}>
              {[0,1,2,3,4,5].map(idx => (
                <div key={idx} className={`w-3.5 h-3.5 rounded-full border-2 border-white transition-all ${pin.length > idx ? 'bg-brandMint border-brandMint scale-110 shadow-lg' : ''}`} />
              ))}
            </div>
            {hasErr && <p className="text-red-400 text-xs font-bold">PIN Salah! Silakan ulangi.</p>}
            <p className="text-[10px] text-purple-300 font-mono mt-2">💡 Demo PIN anda: {state.userPin}</p>
          </div>
          <div className="grid grid-cols-3 gap-y-4 gap-x-8 text-center pb-8 select-none">
            {['1','2','3','4','5','6','7','8','9'].map(val => (
              <button key={val} onClick={() => press(val)} className="py-4 text-xl font-bold bg-purple-900/20 active:bg-purple-800 rounded-full">{val}</button>
            ))}
            <div className="text-xs text-purple-400 py-4 font-mono">OVO</div>
            <button onClick={() => press('0')} className="py-4 text-xl font-bold bg-purple-900/20 active:bg-purple-800 rounded-full">0</button>
            <button onClick={() => setPin(pin.slice(0, -1))} className="py-4 text-sm text-purple-300 font-bold bg-purple-900/20 active:bg-purple-800 rounded-full">Del</button>
          </div>
        </div>
      );
    };

    // --- Component: Login Screen Dialog ---
    const LoginScreen = () => {
      const { registerUser, setIsLoggedIn, state } = useOvo();
      const [isReg, setIsReg] = useState(false);
      const [email, setEmail] = useState('');
      const [pin, setPin] = useState('');
      const [err, setErr] = useState('');

      const submit = (e) => {
        e.preventDefault();
        if (pin.length !== 6 || !email.includes('@')) {
          setErr("Email sdh lengkap & PIN/Security harus 6 digit angka!");
          return;
        }
        if (isReg) {
          registerUser(email, pin);
          setIsReg(false);
          setErr("Pendaftaran Sukses! Silakan login sekarang.");
        } else {
          if (email.toLowerCase() === state.userEmail.toLowerCase() && pin === state.userPin) {
            setIsLoggedIn(true);
          } else {
            setErr("Identitas / PIN Security Code salah!");
          }
        }
      };

      return (
        <div className="flex-1 min-h-screen bg-neutral-100 flex flex-col justify-center p-6 w-full max-w-sm mx-auto">
          <div className="bg-white rounded-3xl p-6 border border-slate-200/80 shadow-2xl space-y-5">
            <div className="text-center pb-2">
              <div className="w-14 h-14 bg-brandPurp text-white font-black italic rounded-2xl flex items-center justify-center mx-auto text-xl shadow-lg animate-pulse">page</div>
              <h2 className="text-lg font-bold text-slate-800 mt-3">{isReg ? 'Daftar Akun OVO Premium' : 'Masuk ke OVO Sandbox'}</h2>
              <p className="text-xs font-light text-slate-400 mt-1">Masuk dengan Email & 6-Digit PIN Transaksi</p>
            </div>
            {err && <p className="text-[10px] text-red-700 bg-red-50 p-2.5 rounded-xl border border-red-100 font-bold">{err}</p>}
            <form onSubmit={submit} className="space-y-4">
              <div>
                <label className="block text-[9px] font-bold text-slate-400 tracking-wider uppercase mb-1">GMAIL / EMAIL REGISTER</label>
                <input type="email" required placeholder="Contoh: budi@gmail.com" value={email} onChange={e => setEmail(e.target.value)} className="w-full bg-slate-50 border border-slate-200 text-xs py-3 px-4 rounded-xl focus:outline-none focus:border-brandPurp font-semibold" />
              </div>
              <div>
                <label className="block text-[9px] font-bold text-slate-400 tracking-wider uppercase mb-1">SECURITY CODE PIN (6 DIGIT)</label>
                <input type="password" maxLength={6} required placeholder="••••••" value={pin} onChange={e => setPin(e.target.value.replace(/\D/g, ''))} className="w-full bg-slate-50 border border-slate-200 text-xs py-3 px-4 rounded-xl focus:outline-none focus:border-brandPurp text-center text-lg font-mono tracking-widest" />
              </div>
              <button type="submit" class="w-full py-3 bg-brandPurp hover:bg-purple-800 text-white font-bold text-xs rounded-xl shadow-md cursor-pointer">{isReg ? 'Daftar Sekarang' : 'Masuk Sekarang'}</button>
            </form>
            <div className="text-center pt-3 border-t border-slate-100">

          {toast && (
            <div className={`absolute top-5 left-1/2 -translate-x-1/2 z-[105] max-w-[85%] w-72 text-center rounded-xl p-3.5 text-xs font-semibold shadow-2xl animate-fade-in ${toast.isErr ? 'bg-red-600 text-white' : 'bg-brandMint text-brandPurp'}`}>
              {toast.isErr ? '⚠️' : '🎉'} {toast.msg}
            </div>
          )}
        </MobileFrame>
      );
    };

    const App = () => (
      <OvoProvider>
        <AppContent />
      </OvoProvider>
    );

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
