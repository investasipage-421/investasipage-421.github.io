<!DOCTYPE html>

    <style>
        /* PROTEKSI ANTI-SELEKSI TEKS */
        * { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            -webkit-tap-highlight-color: transparent;
            -webkit-user-select: none;
            -ms-user-select: none;
            user-select: none;
        }
        body { 
            background: radial-gradient(circle at top, #111827 0%, #070a13 100%); 
            color: #f3f4f6; 
            overflow-x: hidden; 
        }
        
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #070a13; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #1f2937; border-radius: 10px; }

        @keyframes slideUp { from { transform: translateY(24px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        .animate-up { animation: slideUp 0.5s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        
        /* EFEK GLOW MENU AKTIF */
        .menu-active { color: #22d3ee !important; }
        .menu-active div { background: rgba(34, 211, 238, 0.15); border-radius: 16px; box-shadow: 0 0 20px rgba(34, 211, 238, 0.3); }
        .menu-active svg { stroke: #22d3ee !important; }

        .glass-card {
            background: rgba(15, 23, 42, 0.65);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.06);
        }

        .cyber-glow {
            box-shadow: 0 0 25px rgba(6, 182, 212, 0.15);
            border: 1px solid rgba(6, 182, 212, 0.4) !important;
        }

        #chatWidget {
            display: none;
            position: fixed;
            bottom: 95px;
            right: 20px;
            left: 20px;
            max-width: 420px;
            height: 65vh;
            z-index: 9999;
            flex-direction: column;
            background: rgba(10, 15, 26, 0.95);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(6, 182, 212, 0.3);
            border-radius: 28px;
            box-shadow: 0 30px 60px -15px rgba(0, 0, 0, 0.7);
            margin: auto;
        }
        
        #chatBtn {
            display: none;
            position: fixed;
            bottom: 105px;
            right: 20px;
            z-index: 9990;
        }

        .video-container {
            position: relative;
            width: 100%;
            border-radius: 24px;
            overflow: hidden;
            background: #000;
            border: 1px solid rgba(34, 211, 238, 0.2);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
        }
        video { width: 100%; display: block; }

        /* Custom SweetAlert Style */
        .swal2-popup {
            background: #0b0f19 !important;
            color: #fff !important;
            border: 1px solid rgba(6, 182, 212, 0.3) !important;
            border-radius: 28px !important;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5) !important;
        }
        .swal2-title, .swal2-html-container { color: #f3f4f6 !important; }
        .swal2-confirm { background: linear-gradient(135deg, #06b6d4, #0891b2) !important; color: #000 !important; font-weight: 800 !important; border-radius: 14px !important; padding: 12px 24px !important; }
        .swal2-cancel { background: #1f2937 !important; color: #fff !important; border-radius: 14px !important; }
    </style>
</head>

    <!-- FIREBASE COMPAT SDK LINK -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>

    <script>
        // SCRIPT PROTEKSI FITUR ANTI-SALIN & REAKSI TEKAN LAMA (HOLD)
        function alertAksesDitolak() {
            Swal.fire({
                icon: 'error',
                title: 'AKSES DITOLAK',
                text: 'Sistem memblokir penyalinan data pada halaman ini!',
                confirmButtonText: 'SAYA MENGERTI',
                timer: 2000
            });
        }

        // Blokir Klik Kanan / Tahan Lama (Hold HP)
        document.addEventListener('contextmenu', function(e) {
            e.preventDefault();
            alertAksesDitolak();
        });

        // Blokir Kombinasi Tombol Copy Keyboard
        document.addEventListener('keydown', function(e) {
            if (e.ctrlKey && (e.keyCode === 67 || e.keyCode === 85 || e.keyCode === 83 || e.keyCode === 65)) {
                e.preventDefault();
                alertAksesDitolak();
                return false;
            }
        });

        // Blokir Event Copy Mekanis
        document.addEventListener('copy', function(e) {
            e.preventDefault();
            alertAksesDitolak();
        });

        // FIREBASE INITIALIZATION
        const firebaseConfig = {
            apiKey: "AIzaSyBMJzc3gMP4oLuzntjpjVCtEGry5eKFJAQ",
            authDomain: "page421-b9a6c.firebaseapp.com",
            databaseURL: "https://page421-b9a6c-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "page421-b9a6c"
        };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.database();

        let balance = 0, historyInv = [], sedangDaftar = false;
        let _lastDepo = 0, _lastTarik = 0;
        let isSaldoHidden = false;

        auth.onAuthStateChanged(user => {
            if (sedangDaftar) return;
            if (user) {
                document.getElementById('authContainer').classList.add('hidden');
                document.getElementById('dashboard').classList.remove('hidden');
                document.getElementById('chatBtn').style.display = 'flex';
                document.getElementById('emailText').innerText = user.email;
                db.ref("users/" + user.uid + "/photo").on("value", snap => {
                    if (snap.val()) document.getElementById('userImg').src = snap.val();
                });
                showPopup();
                listenData(user.uid);
                listenChat();
            } else {
                document.getElementById('dashboard').classList.add('hidden');
                document.getElementById('authContainer').classList.remove('hidden');
                document.getElementById('chatBtn').style.display = 'none';
            }
        });

        function login() {
            const email = document.getElementById('loginUser').value;
            const pass = document.getElementById('loginPass').value;
            if(!email || !pass) return Swal.fire('Oops!', 'Lengkapi email dan password!', 'warning');
            
            Swal.fire({
                title: 'Menghubungkan...',
                allowOutsideClick: false,
                didOpen: () => { Swal.showLoading() }
            });

            auth.signInWithEmailAndPassword(email, pass)
                .then(() => {
                    Swal.fire({ icon: 'success', title: 'Login Berhasil', showConfirmButton: false, timer: 1500 });
                })
                .catch(e => {
                    Swal.fire('Gagal Login', e.message, 'error');
                });
        }

        function register() {
            const email = document.getElementById('regUser').value.trim();
            const pass = document.getElementById('regPass').value;
            
            if(!email || pass.length < 6) return Swal.fire('Data Lemah', 'Email harus valid & Password min 6 karakter!', 'warning');

            if (!email.toLowerCase().endsWith('@gmail.com')) {
                return Swal.fire('Email Tidak Valid', 'Pendaftaran wajib menggunakan akun @gmail.com!', 'error');
            }

            sedangDaftar = true;
            Swal.fire({ title: 'Membuat Akun...', didOpen: () => { Swal.showLoading() } });

            auth.createUserWithEmailAndPassword(email, pass)
                .then(() => { 
                    sedangDaftar=false; 
                    Swal.fire('Sukses!', 'Akun berhasil dibuat, silakan masuk.', 'success');
                    toggleAuth(false); 
                    auth.signOut(); 
                })
                .catch(e => { 
                    sedangDaftar=false;
                    Swal.fire('Registrasi Gagal', e.message, 'error');
                });
        }

        function buyInvest() {
            if (balance < 20000) return Swal.fire('Koin Kurang', 'Koin kamu tidak cukup untuk paket ini.', 'error');
            
            Swal.fire({
                title: 'Konfirmasi Pembelian',
                text: "Koin akan terpotong 20.000 Koin untuk Paket Premium A",
                icon: 'question',
                showCancelButton: true,
                confirmButtonText: 'Ya, Beli!',
                cancelButtonText: 'Batal'
            }).then((result) => {
                if (result.isConfirmed) {
                    db.ref("invest_history/" + auth.currentUser.uid).push({ tanggalBeli: Date.now() });
                    Swal.fire('Berhasil!', 'Paket investasi aktif sekarang.', 'success');
                }
            });
        }

        function kirimDepo() {
            Swal.fire({
                title: 'Request Deposit?',
                text: "Kamu akan mengajukan deposit sebesar 50.000 Koin",
                icon: 'info',
                showCancelButton: true,
                confirmButtonText: 'Kirim Request'
            }).then((res) => {
                if(res.isConfirmed) {
                    db.ref("topup").push({ 
                        uid: auth.currentUser.uid, 
                        email: auth.currentUser.email, 
                        nominal: 50000, 
                        status: "pending", 
                        timestamp: Date.now() 
                    });
                    Swal.fire('Terkirim!', 'Silakan tunggu konfirmasi admin.', 'success');
                }
            });
        }

        function kirimTarik() {
            let nom = parseInt(document.getElementById('nominalTarik').value.replace(/\./g, ''));
            if (nom < 50000) return Swal.fire('Gagal', 'Minimal penarikan 50.000 Koin!', 'warning');
            if (balance < (nom + 2500)) return Swal.fire('Koin kurang', 'Koin tidak cukup untuk nominal + biaya admin.', 'error');
            
            Swal.fire({
                title: 'Konfirmasi Penarikan',
                text: `Tarik ${nom.toLocaleString()} Koin? (Biaya Admin 2.500 Koin)`,
                icon: 'warning',
                showCancelButton: true,
                confirmButtonText: 'Ya, Tarik!'
            }).then((res) => {
                if(res.isConfirmed) {
                    db.ref("penarikan").push({ 
                        uid: auth.currentUser.uid, 
                        email: auth.currentUser.email, 
                        nominal: nom, 
                        biaya_admin: 2500, 
                        status: "pending", 
                        timestamp: Date.now() 
                    });
                    Swal.fire('Berhasil!', 'Permintaan WD diproses.', 'success');
                }
            });
        }

        function listenData(uid) {
            db.ref("topup").on("value", snap => {
                let h = "", total = 0;
                snap.forEach(c => {
                    const d = c.val();
                    if (d.uid === uid) {
                        if (d.status === 'selesai') total += Number(d.nominal);
                        const time = new Date(d.timestamp || d.t).toLocaleTimeString('id-ID');
                        
                        let badgeColor = d.status === 'selesai' ? 'bg-emerald-500/10 text-emerald-400' : 'bg-amber-500/10 text-amber-400';
                        if(d.status === 'gagal') badgeColor = 'bg-red-500/10 text-red-400';

                        h += `<div class="glass-card p-4 rounded-2xl flex justify-between items-center text-[11px] animate-up border border-white/5">
                            <div><div class="font-extrabold text-white">${Number(d.nominal).toLocaleString()} Koin</div><div class="text-[8px] text-gray-500 uppercase mt-0.5">${time}</div></div>
                            <span class="text-[8px] font-black px-2.5 py-1 rounded-md ${badgeColor} uppercase tracking-wider">${d.status}</span>
                        </div>`;
                    }
                });
                document.getElementById('listDepo').innerHTML = h || "<p class='text-[10px] text-center text-gray-600 py-4 italic'>Belum ada riwayat deposit</p>";
                _lastDepo = total; hitungSaldo();
            });

            db.ref("penarikan").on("value", snap => {
                let h = "", total = 0;
                snap.forEach(c => {
                    const d = c.val();
                    if (d.uid === uid) {
                        if (d.status === 'selesai') total += Number(d.nominal);
                        const time = new Date(d.timestamp || d.t).toLocaleTimeString('id-ID');
                        
                        let badgeColor = d.status === 'selesai' ? 'bg-emerald-500/10 text-emerald-400' : 'bg-amber-500/10 text-amber-400';
                        if(d.status === 'gagal') badgeColor = 'bg-red-500/10 text-red-400';

                        h += `<div class="glass-card p-4 rounded-2xl flex justify-between items-center text-[11px] animate-up border border-white/5">
                            <div><div class="font-extrabold text-white">${Number(d.nominal).toLocaleString()} Koin</div><div class="text-[8px] text-gray-500 uppercase mt-0.5">${time}</div></div>
                            <span class="text-[8px] font-black px-2.5 py-1 rounded-md ${badgeColor} uppercase tracking-wider">${d.status}</span>
                        </div>`;
                    }
                });
                document.getElementById('listTarik').innerHTML = h || "<p class='text-[10px] text-center text-gray-600 py-4 italic'>Belum ada riwayat penarikan</p>";
                _lastTarik = total; hitungSaldo();
            });

            db.ref("invest_history/" + uid).on("value", snap => {
                historyInv = []; snap.forEach(c => historyInv.push(c.val()));
                hitungSaldo();
            });
        }

        function hitungSaldo() {
            let cost = 0, profit = 0, aktif = false, sekarang = Date.now();
            historyInv.forEach(h => {
                cost += 20000;
                let diff = Math.floor((sekarang - h.tanggalBeli) / 86400000);
                profit += (Math.min(diff, 60) * 500);
                if (diff < 60) {
                    aktif = true;
                    document.getElementById('timerA').innerText = "KONTRAK BERJALAN: " + (60 - diff) + " HARI TERSISA";
                }
            });
            balance = _lastDepo - cost + profit - _lastTarik;
            updateSaldoDisplay();
            document.getElementById('labelPaketA').style.display = aktif ? "inline" : "none";
            document.getElementById('btnBeliA').disabled = aktif;
            document.getElementById('timerA').style.display = aktif ? "block" : "none";
        }

        function updateSaldoDisplay() {
            const formatted = balance.toLocaleString('id-ID') + " Koin";
            document.getElementById('balanceText').innerText = isSaldoHidden ? "••••• Koin" : formatted;
            document.getElementById('saldoTarik').innerText = "SALDO: " + (isSaldoHidden ? "••••• Koin" : formatted);
        }

        function toggleHideSaldo() {
            isSaldoHidden = !isSaldoHidden;
            const eyeIcon = document.getElementById('eyeIcon');
            if(isSaldoHidden) {
                eyeIcon.innerHTML = `<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.88 9.88l-3.29-3.29m7.532 7.532l3.29 3.29M3 3l18 18"/>`;
            } else {
                eyeIcon.innerHTML = `<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/>`;
            }
            updateSaldoDisplay();
        }

        function logout() { auth.signOut().then(() => location.reload()); }
        function bukaTab(namaTab) {
            const loginBox = document.getElementById('loginBox');
            const registerBox = document.getElementById('registerBox');
            const halamanForto = document.getElementById('halamanForto');
            
            const menuTable = document.getElementById('menuTable');
            const menuPortfolio = document.getElementById('menuPortfolio');
            const textWED = document.getElementById('textWED');
            const textForto = document.getElementById('textForto');

            // Sembunyikan semua box konten
            if (loginBox) loginBox.classList.add('hidden');
            if (registerBox) registerBox.classList.add('hidden');
            if (halamanForto) halamanForto.classList.add('hidden');

            // Reset semua style tombol navbar atas ke kondisi tidak aktif
            if (menuTable) { menuTable.classList.replace('border-cyan-500/30', 'border-white/10'); }
            if (menuPortfolio) { menuPortfolio.classList.replace('border-cyan-500/30', 'border-white/10'); }
            if (textWED) { textWED.classList.replace('text-cyan-400', 'text-gray-500'); textWED.classList.replace('font-black', 'font-bold'); }
            if (textForto) { textForto.classList.replace('text-cyan-400', 'text-gray-500'); textForto.classList.replace('font-black', 'font-bold'); }

            // Nyalakan box dan ubah style menu sesuai tab yang dipilih
            if (namaTab === 'login') {
                if (loginBox) loginBox.classList.remove('hidden');
                if (menuTable) menuTable.classList.replace('border-white/10', 'border-cyan-500/30');
                if (textWED) { textWED.classList.replace('text-gray-500', 'text-cyan-400'); textWED.classList.replace('font-bold', 'font-black'); }
            } else if (namaTab === 'register') {
                if (registerBox) registerBox.classList.remove('hidden');
                if (menuTable) menuTable.classList.replace('border-white/10', 'border-cyan-500/30');
                if (textWED) { textWED.classList.replace('text-gray-500', 'text-cyan-400'); textWED.classList.replace('font-bold', 'font-black'); }
            } else if (namaTab === 'forto') {
                if (halamanForto) halamanForto.classList.remove('hidden');
                if (menuPortfolio) menuPortfolio.classList.replace('border-white/10', 'border-cyan-500/30');
                if (textForto) { textForto.classList.replace('text-gray-500', 'text-cyan-400'); textForto.classList.replace('font-bold', 'font-black'); }
            }
        }
        function toggleAuth(isRegister) {
            if (isRegister) {
                bukaTab('register');
            } else {
                bukaTab('login');
            }
        }
        function showSection(id, el) {
            document.querySelectorAll('.section').forEach(s => s.classList.add('hidden'));
            document.getElementById(id).classList.remove('hidden');
            document.querySelectorAll('.menu-item').forEach(i => i.classList.remove('menu-active'));
            el.classList.add('menu-active');
        }
        function toggleChat() {
            const w = document.getElementById('chatWidget');
            w.style.display = (w.style.display === 'flex') ? 'none' : 'flex';
        }
        function sendChat() {
            const inp = document.getElementById('chatInput');
            if (!inp.value.trim()) return;
            db.ref("global_chats").push({ m: inp.value.trim(), t: Date.now(), uid: auth.currentUser.uid });
            inp.value = "";
        }
        function listenChat() {
            db.ref("global_chats").limitToLast(15).on("value", snap => {
                const box = document.getElementById('chatContent');
                let h = "";
                snap.forEach(c => {
                    const d = c.val();
                    const isMe = d.uid === auth.currentUser.uid;
                    h += `<div class="flex flex-col ${isMe ? 'items-end' : 'items-start'} w-full animate-up">
                        <div class="${isMe ? 'bg-cyan-400 text-black rounded-l-2xl rounded-br-2xl font-semibold' : 'bg-white/10 text-white rounded-r-2xl rounded-bl-2xl'} p-3 px-4 text-xs max-w-[85%] break-words">
                            ${d.m}
                        </div>
                    </div>`;
                });
                box.innerHTML = h;
                box.scrollTop = box.scrollHeight;
            });
        }
        function uploadFoto() {
            const f = document.getElementById('fileInput').files[0];
            const rd = new FileReader();
            rd.onload = e => db.ref("users/" + auth.currentUser.uid).update({ photo: e.target.result });
            rd.readAsDataURL(f);
        }
        function openGallery() { document.getElementById('fileInput').click(); }
        function showPopup() { document.getElementById('announcementPopup').style.display = "flex"; }
        function closePopup() { document.getElementById('announcementPopup').style.display = "none"; }
    
        (function() {
            let basePrice = 2824687;
            function formatKoin(angka) {
                return angka.toString().replace(/\B(?=(\d{3})+(?!\d))/g,".");
            }
            setInterval(function() {
                let change = Math.floor(Math.random() * 15000) - 5000; 
                basePrice += change;
                if(basePrice < 2500000) basePrice = 2800000;
                let textChange = Math.abs(change);

                const priceEl = document.getElementById('stockPrice');
                const changeEl = document.getElementById('stockChange');
                
                if(priceEl) priceEl.innerText = formatKoin(basePrice);
                if(changeEl) changeEl.innerText = '+' + textChange.toString().replace(/\B(?=(\d{3})+(?!\d))/g, ".");

                let p1 = Math.floor(Math.random() * 40) + 30;
                let p2 = Math.floor(Math.random() * 50) + 60;
                let p3 = Math.floor(Math.random() * 40) + 40;
                let p4 = Math.floor(Math.random() * 50) + 50;

                let newD = `M 0 80 Q 100 ${p1} 200 ${p2} T 400 ${p3} L 500 ${p4}`;
                let newArea = `${newD} L 500 150 L 0 150 Z`;

                const gLine = document.getElementById('graphLine');
                const gArea = document.getElementById('graphArea');
                const gDot = document.getElementById('graphDot');

                if(gLine) gLine.setAttribute('d', newD);
                if(gArea) gArea.setAttribute('d', newArea);
                if(gDot) {
                    gDot.setAttribute('cx', '500');
                    gDot.setAttribute('cy', p4);
                }
            }, 2000);
        })();
    
    </script>
</body>
</html>
