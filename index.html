<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Investasi Page421 - Premium Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&family=Space+Grotesk:wght@700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <style>
        * { font-family: 'Plus+Jakarta+Sans', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background: #000; color: #fff; margin: 0; padding: 0; overflow-x: hidden; }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.08); }
        .font-space { font-family: 'Space+Grotesk', sans-serif; }

        /* Notifikasi Atas (Fixed Top) */
        .notif-bar {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 10000;
            width: 90%;
            max-width: 380px;
            padding: 16px;
            border-radius: 20px;
            font-weight: 800;
            text-align: center;
            display: none;
            box-shadow: 0 20px 40px rgba(0,0,0,0.6);
            animation: slideDown 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }
        @keyframes slideDown {
            from { transform: translate(-50%, -100%); opacity: 0; }
            to { transform: translate(-50%, 0); opacity: 1; }
        }
        .notif-success { background: #06b6d4; color: #000; border: 1px solid rgba(255,255,255,0.2); }
        .notif-error { background: #ef4444; color: #fff; border: 1px solid rgba(255,255,255,0.1); }

        .btn-cyan { background: #06b6d4; color: #000; font-weight: 800; transition: all 0.2s; }
        .btn-cyan:active { transform: scale(0.95); opacity: 0.9; }
        
        input { background: #0f0f0f !important; border: 1px solid rgba(255,255,255,0.05) !important; color: white !important; outline: none; transition: all 0.2s; }
        input:focus { border-color: #06b6d4 !important; box-shadow: 0 0 0 4px rgba(6, 182, 212, 0.1); }

        .menu-active { color: #06b6d4 !important; }
        .menu-active .icon-bg { background: rgba(6, 182, 212, 0.15); border-color: rgba(6, 182, 212, 0.3); }

        .video-container { position: relative; width: 100%; border-radius: 24px; overflow: hidden; background: #000; border: 1px solid rgba(255,255,255,0.1); }
        
        .loader-spin { width: 24px; height: 24px; border: 3px solid rgba(0,0,0,0.1); border-top-color: #000; border-radius: 50%; animation: spin 0.8s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }

        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #222; border-radius: 10px; }

        /* Splash screen */
        #splash {
            position: fixed;
            inset: 0;
            background: #000;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 9999;
        }
        #splash h1 {
            font-family: 'Space Grotesk', sans-serif;
            font-weight: 700;
            color: #06b6d4;
            font-size: 4rem;
            margin: 0;
            letter-spacing: 0.02em;
        }
        #splash .loading-bar {
            width: 80px;
            height: 6px;
            margin-top: 1rem;
            background: rgba(6, 182, 212, 0.2);
            border-radius: 9999px;
            overflow: hidden;
            position: relative;
        }
        #splash .loading-bar > div {
            width: 40%;
            height: 100%;
            background: #06b6d4;
            border-radius: inherit;
            animation: loading 1.6s infinite linear;
            position: absolute;
            left: -40%;
        }
        @keyframes loading {
            0% { left: -40%; }
            100% { left: 100%; }
        }

        /* Offline message on splash */
        #offlineMsg {
            color: #06b6d4;
            font-weight: normal;
            margin-top: 20px;
            font-size: 14px;
            display: none;
            font-family: 'Plus Jakarta Sans', sans-serif;
            letter-spacing: 0.05em;
        }
    </style>
</head>
<body class="selection:bg-cyan-500/30">
    <!-- UI Notification Fixed At Top -->
    <div id="notifBar" class="notif-bar"></div>

    <div id="app" class="min-h-screen flex flex-col"></div>

    <!-- Splash Screen -->
    <div id="splash">
        <h1>PAGE421</h1>
        <div class="loading-bar"><div></div></div>
        <p id="offlineMsg">Tidak ada koneksi internet</p>
    </div>

    <!-- Firebase SDK v10 (ES Modules) -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-app.js";
        import { getAuth, onAuthStateChanged, signInWithEmailAndPassword, createUserWithEmailAndPassword, signOut } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-auth.js";
        import { getDatabase, ref, set, get, push, onValue, query as rtdbQuery, limitToLast } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-database.js";

        // CONFIGURASI FIREBASE ANDA
        const firebaseConfig = {
            apiKey: "AIzaSyBMJzc3gMP4oLuzntjpjVCtEGry5eKFJAQ",
            authDomain: "page421-b9a6c.firebaseapp.com",
            databaseURL: "https://page421-b9a6c-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "page421-b9a6c",
            storageBucket: "page421-b9a6c.appspot.com"
        };

        const fApp = initializeApp(firebaseConfig);
        const auth = getAuth(fApp);
        const db = getDatabase(fApp);

        let state = {
            user: null,
            isRegister: false,
            isLoading: false,
            activeTab: 'home',
            balance: 0,
            deposits: [],
            withdrawals: [],
            investments: [],
            chats: []
        };

        const root = document.getElementById('app');
        const splash = document.getElementById('splash');
        const offlineMsg = document.getElementById('offlineMsg');

        // Deteksi koneksi internet
        function updateOnlineStatus() {
            const online = navigator.onLine;
            if (online) {
                offlineMsg.style.display = 'none';
                if (splash.style.display !== 'none') {
                    // hilangkan splash jika online
                    splash.style.display = 'none';
                }
                render();
            } else {
                // tampilkan pesan offline dan tampilkan splash terus
                offlineMsg.style.display = 'block';
                splash.style.display = 'flex';
            }
        }
        updateOnlineStatus();
        window.addEventListener('online', updateOnlineStatus);
        window.addEventListener('offline', updateOnlineStatus);

        // Fungsi Notifikasi Atas
        function notify(msg, type = 'success') {
            const el = document.getElementById('notifBar');
            el.innerText = msg.toUpperCase();
            el.className = `notif-bar notif-${type}`;
            el.style.display = 'block';
            setTimeout(() => { el.style.display = 'none'; }, 3500);
        }

        function fmtRupiah(v) {
            return 'Rp ' + Number(v).toLocaleString('id-ID');
        }

        function render() {
            // Hanya sembunyikan splash jika online
            if (navigator.onLine) {
                setTimeout(() => {
                    if(splash) splash.style.display = 'none';
                }, 800);
            }

            if (!state.user) {
                renderAuth();
            } else {
                renderDashboard();
            }
            if (window.lucide) lucide.createIcons();
        }

        // --- AUTH SECTION ---
        function renderAuth() {
            root.innerHTML = `
            <div class="flex-1 flex flex-col items-center justify-center p-8 bg-black">
                <div class="w-full max-w-sm space-y-12">
                    <div class="text-center">
                        <h1 class="text-6xl font-space font-bold text-cyan-500 tracking-tighter">PAGE421</h1>
                        <p class="text-gray-600 text-[10px] font-black tracking-[0.6em] mt-3 uppercase">Investment Portal</p>
                    </div>

                    <div class="glass p-10 rounded-[3rem] shadow-2xl border-white/5">
                        <form id="authForm" class="space-y-6">
                            <div class="space-y-2">
                                <label class="text-[10px] font-black text-gray-500 ml-1 uppercase">Email Account</label>
                                <input type="email" id="email" class="w-full h-14 rounded-2xl px-5 text-sm" placeholder="user@gmail.com" required>
                            </div>
                            <div class="space-y-2">
                                <label class="text-[10px] font-black text-gray-500 ml-1 uppercase">Password</label>
                                <input type="password" id="password" class="w-full h-14 rounded-2xl px-5 text-sm" placeholder="••••••••" required minlength="6">
                            </div>
                            <button type="submit" class="w-full h-15 btn-cyan rounded-2xl flex items-center justify-center shadow-xl shadow-cyan-500/20">
                               ${state.isLoading ? '<div class="loader-spin"></div>' : (state.isRegister ? 'DAFTAR SEKARANG' : 'MASUK KE SISTEM')}
                            </button>
                            
                            <p class="text-center text-[10px] text-gray-500 font-bold pt-4">
                                ${state.isRegister ? 'SUDAH ADA AKUN?' : 'BARU DI SINI?'} 
                                <span id="toggleAuth" class="text-cyan-400 cursor-pointer ml-1 underline">
                                    ${state.isRegister ? 'LOGIN' : 'DAFTAR'}
                                </span>
                            </p>
                        </form>
                    </div>
                </div>
            </div>
            `;

            document.getElementById('authForm').onsubmit = handleAuthSubmit;
            document.getElementById('toggleAuth').onclick = () => {
                state.isRegister = !state.isRegister;
                render();
            };
        }

        async function handleAuthSubmit(e) {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const pass = document.getElementById('password').value;
            state.isLoading = true;
            render();
            try {
                if (state.isRegister) {
                    const res = await createUserWithEmailAndPassword(auth, email, pass);
                    await set(ref(db, `users/${res.user.uid}`), { uid: res.user.uid, email, createdAt: Date.now() });
                    notify("Akun Berhasil Dibuat!");
                    state.isRegister = false;
                } else {
                    await signInWithEmailAndPassword(auth, email, pass);
                    notify("Selamat Datang!");
                }
            } catch (err) {
                notify(err.message, 'error');
            } finally {
                state.isLoading = false;
                render();
            }
        }

        // --- DASHBOARD SECTION ---
        function renderDashboard() {
            root.innerHTML = `
                <div class="flex-1 flex flex-col h-screen overflow-hidden">
                    <!-- Top Bar -->
                    <header class="p-5 flex justify-between items-center border-b border-white/5 bg-black/50 backdrop-blur-xl sticky top-0 z-50">
                        <div class="flex items-center gap-3">
                            <div class="w-12 h-12 rounded-2xl border-2 border-cyan-500 p-0.5 overflow-hidden">
                                <img src="https://i.imgur.com/8Km9tLL.png" class="w-full h-full object-cover rounded-[calc(1rem-2px)]" alt="User Avatar">
                            </div>
                            <div>
                                <h3 class="text-xs font-bold truncate max-w-[150px] tracking-tight">${state.user.email}</h3>
                                <p class="text-[9px] font-black text-cyan-500 uppercase tracking-tighter">Premium Investor</p>
                            </div>
                        </div>
                        <button id="logoutBtn" class="w-12 h-12 glass rounded-2xl flex items-center justify-center text-red-500" title="Logout">
                            <i data-lucide="power" class="w-5 h-5"></i>
                        </button>
                    </header>

                    <!-- Content Area -->
                    <main class="flex-1 overflow-y-auto p-5 pb-32 custom-scrollbar">
                        <section id="sec-home" class="space-y-6 ${state.activeTab === 'home' ? '' : 'hidden'} animate__animated animate__fadeIn">
                            <div class="glass p-10 rounded-[3rem] bg-gradient-to-br from-cyan-500/10 to-transparent border-cyan-500/20 shadow-2xl relative overflow-hidden">
                                <p class="text-[10px] font-black text-gray-500 tracking-[0.4em] mb-3">TOTAL BALANCE</p>
                                <h2 class="text-5xl font-space font-bold tracking-tighter mb-10">${fmtRupiah(state.balance)}</h2>
                                <div class="flex gap-4">
                                    <button onclick="switchTab('depo')" class="flex-1 h-14 bg-white text-black font-black rounded-2xl text-[10px] shadow-xl">DEPOSIT</button>
                                    <button onclick="switchTab('tarik')" class="flex-1 h-14 glass text-white font-black rounded-2xl text-[10px]">PENARIKAN</button>
                                </div>
                            </div>

                            <div class="glass p-6 rounded-[2.5rem] border-white/5 bg-[#0a0a0a]">
                                <h4 class="text-[10px] font-black text-cyan-500 uppercase tracking-widest mb-4">News & Update</h4>
                                <div class="video-container mb-4">
                                    <video controls poster="https://images.unsplash.com/photo-1611974714652-960201dc8394?q=80&w=800&auto=format&fit=crop">
                                        <source src="https://files.catbox.moe/ke70c6.mp4" type="video/mp4">
                                    </video>
                                </div>
                                <p class="text-xs text-gray-400 leading-relaxed">
                                    Ikuti tutorial di atas untuk memahami sistem kerja investasi. Keuntungan masuk otomatis setiap 24 jam.
                                </p>
                            </div>
                        </section>

                        <section id="sec-sosmed" class="space-y-6 ${state.activeTab === 'sosmed' ? '' : 'hidden'} animate__animated animate__fadeIn">
                            <h2 class="text-2xl font-space font-bold px-2">SOSIAL MEDIA</h2>
                            <div class="grid grid-cols-2 gap-4">
                                <a href="https://www.tiktok.com/@page421_official" target="_blank" class="glass p-8 rounded-[2rem] text-center border-white/5 hover:border-cyan-500 transition-all">
                                    <div class="text-4xl mb-4" aria-label="TikTok Icon">📱</div>
                                    <h4 class="text-sm font-black">TikTok</h4>
                                    <p class="text-[10px] text-gray-500">@page421_official</p>
                                </a>
                                <div class="glass p-8 rounded-[2rem] text-center border-white/5">
                                    <div class="text-4xl mb-4" aria-label="Instagram Icon">📷</div>
                                    <h4 class="text-sm font-black">Instagram</h4>
                                    <p class="text-[10px] text-gray-500">@page421</p>
                                </div>
                            </div>
                        </section>

                        <section id="sec-invest" class="space-y-6 ${state.activeTab === 'invest' ? '' : 'hidden'} animate__animated animate__fadeIn">
                            <h2 class="text-2xl font-space font-bold px-2">INVESTASI</h2>
                            <div class="glass p-8 rounded-[3rem] border-cyan-500/20">
                                <div class="flex justify-between items-center mb-6">
                                    <h4 class="font-bold text-lg">PREMIUM PACKAGE A</h4>
                                    <span class="text-[8px] bg-cyan-500 text-black px-3 py-1 rounded-full font-black uppercase">Active</span>
                                </div>
                                <div class="grid grid-cols-2 gap-4 mb-8">
                                    <div class="bg-black/40 p-4 rounded-2xl border border-white/5">
                                        <p class="text-[9px] text-gray-600 font-bold mb-1">HARGA</p>
                                        <p class="text-lg font-bold">${fmtRupiah(20000)}</p>
                                    </div>
                                    <div class="bg-black/40 p-4 rounded-2xl border border-white/5 text-cyan-400">
                                        <p class="text-[9px] text-cyan-600 font-bold mb-1">PROFIT</p>
                                        <p class="text-lg font-bold">Rp 500 / Hr</p>
                                    </div>
                                </div>
                                <button id="buyBtn" class="w-full h-16 btn-cyan rounded-2xl text-[10px] shadow-cyan-500/30 shadow-xl uppercase">AKTIFKAN PAKET</button>
                            </div>
                        </section>

                        <section id="sec-depo" class="space-y-6 ${state.activeTab === 'depo' ? '' : 'hidden'} animate__animated animate__fadeIn">
                            <h2 class="text-2xl font-space font-bold px-2">DEPOSIT</h2>
                            <div class="bg-white rounded-[3rem] p-10 text-black text-center shadow-2xl relative overflow-hidden">
                                <p class="text-[10px] font-black opacity-50 uppercase tracking-widest">Fixed Deposit</p>
                                <h1 class="text-5xl font-black my-4 tracking-tighter">Rp 50.000</h1>
                                <button id="depoBtn" class="w-full h-14 bg-black text-white font-black rounded-2xl mt-4 active:scale-95 shadow-xl uppercase text-xs">REQUEST DEPOSIT</button>
                            </div>
                            <div id="depoHistory" class="space-y-3 pt-6"></div>
                        </section>

                        <section id="sec-tarik" class="space-y-6 ${state.activeTab === 'tarik' ? '' : 'hidden'} animate__animated animate__fadeIn">
                            <h2 class="text-2xl font-space font-bold px-2">PENARIKAN</h2>
                            <div class="glass p-10 rounded-[3rem] text-center border-red-500/20 shadow-2xl">
                                <p class="text-[10px] font-bold text-gray-500 mb-2 uppercase">SALDO: ${fmtRupiah(state.balance)}</p>
                                <input id="tarikNominal" type="number" value="50000" min="50000" class="w-full bg-transparent text-center text-5xl font-black outline-none mb-6" />
                                <p class="text-[10px] text-red-400 font-bold uppercase mb-4 tracking-widest">Biaya Admin: Rp 2.500</p>
                                <button id="tarikBtn" class="w-full h-15 bg-red-600 text-white font-black rounded-2xl shadow-xl shadow-red-900/20 text-[11px] uppercase">REQUEST TARIK</button>
                            </div>
                            <div id="tarikHistory" class="space-y-3 pt-6"></div>
                        </section>
                    </main>

                    <!-- Bottom Nav -->
                    <nav class="fixed bottom-0 left-0 right-0 glass border-t border-white/5 px-6 py-4 flex justify-between items-center z-[90]">
                        <button onclick="switchTab('home')" class="nav-item flex flex-col items-center gap-1 ${state.activeTab === 'home' ? 'menu-active' : 'text-gray-600'}">
                            <div class="p-2 icon-bg border border-transparent rounded-xl"><i data-lucide="home" class="w-6 h-6"></i></div>
                            <span class="text-[9px] font-extrabold uppercase">Home</span>
                        </button>
                        <button onclick="switchTab('sosmed')" class="nav-item flex flex-col items-center gap-1 ${state.activeTab === 'sosmed' ? 'menu-active' : 'text-gray-600'}">
                            <div class="p-2 icon-bg border border-transparent rounded-xl"><i data-lucide="share-2" class="w-6 h-6"></i></div>
                            <span class="text-[9px] font-extrabold uppercase">Sosmed</span>
                        </button>
                        <button onclick="switchTab('invest')" class="nav-item flex flex-col items-center gap-1 ${state.activeTab === 'invest' ? 'menu-active' : 'text-gray-600'}">
                            <div class="p-2 icon-bg border border-transparent rounded-xl"><i data-lucide="gem" class="w-6 h-6"></i></div>
                            <span class="text-[9px] font-extrabold uppercase">Invest</span>
                        </button>
                        <button onclick="switchTab('depo')" class="nav-item flex flex-col items-center gap-1 ${state.activeTab === 'depo' ? 'menu-active' : 'text-gray-600'}">
                            <div class="p-2 icon-bg border border-transparent rounded-xl"><i data-lucide="plus-circle" class="w-6 h-6"></i></div>
                            <span class="text-[9px] font-extrabold uppercase">Depo</span>
                        </button>
                        <button onclick="switchTab('tarik')" class="nav-item flex flex-col items-center gap-1 ${state.activeTab === 'tarik' ? 'menu-active' : 'text-gray-600'}">
                            <div class="p-2 icon-bg border border-transparent rounded-xl"><i data-lucide="wallet" class="w-6 h-6"></i></div>
                            <span class="text-[9px] font-extrabold uppercase">Tarik</span>
                        </button>
                    </nav>

                    <!-- Chat Overlay Trigger -->
                    <button id="openChat" class="fixed bottom-24 right-6 w-16 h-16 btn-cyan rounded-full shadow-2xl flex items-center justify-center hover:scale-110 transition-all z-40" title="Chat">
                        <i data-lucide="message-square" class="w-7 h-7"></i>
                    </button>
                </div>

                <!-- Chat Pop-up Overlay -->
                <div id="chatOverlay" class="fixed inset-0 bg-black/95 backdrop-blur-2xl z-[200] hidden flex-col p-6">
                    <div class="max-w-md mx-auto w-full h-full flex flex-col pt-8">
                        <div class="flex justify-between items-center mb-8">
                            <div>
                                <h2 class="text-3xl font-space font-bold tracking-tighter">GLOBAL CHAT</h2>
                                <p class="text-[9px] font-black text-gray-600 tracking-[0.2em] uppercase">Private Support</p>
                            </div>
                            <button id="closeChat" class="w-14 h-14 glass rounded-3xl flex items-center justify-center" title="Close Chat"><i data-lucide="x" class="w-6 h-6"></i></button>
                        </div>
                        <div id="chatMessages" class="flex-1 overflow-y-auto space-y-5 pr-3 custom-scrollbar scroll-smooth"></div>
                        <div class="mt-6 flex gap-3 pb-8">
                            <input type="text" id="chatInput" placeholder="Ketik pesan..." class="flex-1 h-16 px-6 glass border-white/5 rounded-3xl text-sm" />
                            <button id="sendChat" class="w-16 h-16 btn-cyan rounded-3xl flex items-center justify-center" title="Send"><i data-lucide="send" class="w-6 h-6"></i></button>
                        </div>
                    </div>
                </div>
            `;

            // Setup button & events
            document.getElementById('logoutBtn').onclick = () => signOut(auth);
            const buyB = document.getElementById('buyBtn'); if(buyB) buyB.onclick = handleBuy;
            const depB = document.getElementById('depoBtn'); if(depB) depB.onclick = handleDepo;
            const tarB = document.getElementById('tarikBtn');
            if(tarB) tarB.onclick = () => handleTarik(parseInt(document.getElementById('tarikNominal').value));

            document.getElementById('openChat').onclick = () => {
                document.getElementById('chatOverlay').classList.remove('hidden');
                updateChatUI();
            };
            document.getElementById('closeChat').onclick = () => document.getElementById('chatOverlay').classList.add('hidden');
            document.getElementById('sendChat').onclick = sendChat;

            updateBalanceUI();
            renderHistory('depo');
            renderHistory('tarik');
        }

        // --- LOGIKA UTAMA ---
        window.switchTab = (tab) => { state.activeTab = tab; renderDashboard(); };

        async function handleDepo() {
            try {
                await push(ref(db, "topup"), { uid: state.user.uid, email: state.user.email, nominal: 50000, status: 'pending', timestamp: Date.now() });
                notify("Request Terkirim! Segera lapor ke Admin.");
            } catch (e) { notify(e.message, 'error'); }
        }

        async function handleBuy() {
            if(state.balance < 20000) return notify("Saldo Tidak Cukup!", 'error');
            try {
                await push(ref(db, `invest_history/${state.user.uid}`), { tanggalBeli: Date.now() });
                notify("Paket Berhasil Diaktifkan!");
            } catch (e) { notify(e.message, 'error'); }
        }

        async function handleTarik(n) {
            if (n < 50000) return notify("Minimal Penarikan Rp 50.000", 'error');
            if (state.balance < (n + 2500)) return notify("Saldo Kurang (Admin: 2.500)", 'error');
            try {
                await push(ref(db, "penarikan"), { uid: state.user.uid, email: state.user.email, nominal: n, biayaAdmin: 2500, status: 'pending', timestamp: Date.now() });
                notify("Request Sedang Diproses.");
            } catch (e) { notify(e.message, 'error'); }
        }

        async function sendChat() {
            const inp = document.getElementById('chatInput');
            const msg = inp.value.trim();
            if(!msg) return;
            try {
                await push(ref(db, "global_chats"), { uid: state.user.uid, email: state.user.email, m: msg, t: Date.now() });
                inp.value = '';
            } catch (e) { notify(e.message, 'error'); }
        }

        function updateBalanceUI() {
            const now = Date.now();
            let dTop = state.deposits.filter(d => d.status === 'selesai').reduce((a,c) => a + c.nominal, 0);
            let wDraw = state.withdrawals.reduce((a,c) => a + (c.nominal + (c.biayaAdmin || 0)), 0);
            let iProfit = 0;
            state.investments.forEach(i => {
                const days = Math.floor((now - i.tanggalBeli) / 86400000);
                iProfit += Math.min(days, 60) * 500;
            });
            state.balance = dTop + iProfit - wDraw - (state.investments.length * 20000);
        }

        function renderHistory(type) {
            const box = document.getElementById(`${type}History`);
            if(!box) return;
            const data = type === 'depo' ? state.deposits : state.withdrawals;
            if(data.length === 0) { box.innerHTML = '<p class="text-center py-10 text-[9px] text-gray-700 font-bold">KOSONG</p>'; return; }
            box.innerHTML = data.sort((a,b) => b.timestamp - a.timestamp).map(i => `
                <div class="glass p-5 rounded-2xl flex justify-between items-center text-[11px] animate__animated animate__fadeInUp">
                    <div>
                        <p class="text-[8px] font-black ${type === 'depo' ? 'text-cyan-500' : 'text-red-500'} mb-1">${type.toUpperCase()}</p>
                        <p class="font-bold">Rp ${i.nominal.toLocaleString()}</p>
                    </div>
                    <div class="text-right">
                        <p class="text-[8px] text-gray-700 mb-1">${new Date(i.timestamp).toLocaleDateString()}</p>
                        <span class="text-[8px] px-2 py-0.5 bg-cyan-500/10 text-cyan-500 font-black rounded uppercase">${i.status || 'Active'}</span>
                    </div>
                </div>
            `).join('');
        }

        function updateChatUI() {
            const box = document.getElementById('chatMessages');
            if(!box) return;
            box.innerHTML = state.chats.map(m => `
                <div class="${m.uid === state.user.uid ? 'text-right pl-10' : 'pr-10'} animate__animated animate__fadeIn">
                    <p class="text-[9px] font-black text-cyan-500 uppercase tracking-tighter mb-1">${m.email.split('@')[0]}</p>
                    <div class="inline-block p-4 rounded-3xl ${m.uid === state.user.uid ? 'bg-cyan-500 text-black font-bold' : 'glass border-white/5 text-white'} text-[13px] shadow-xl break-words">
                        ${m.m}
                    </div>
                </div>
            `).join('');
            box.scrollTop = box.scrollHeight;
        }

        // --- AUTH OBSERVER ---
        onAuthStateChanged(auth, (fbUser) => {
            if (fbUser) {
                state.user = { uid: fbUser.uid, email: fbUser.email };
                onValue(ref(db, 'topup'), (s) => {
                    const data = []; s.forEach(c => { if(c.val().uid === fbUser.uid) data.push({...c.val(), id: c.key}); });
                    state.deposits = data; updateBalanceUI(); render();
                });
                onValue(ref(db, 'penarikan'), (s) => {
                    const data = []; s.forEach(c => { if(c.val().uid === fbUser.uid) data.push({...c.val(), id: c.key}); });
                    state.withdrawals = data; updateBalanceUI(); render();
                });
                onValue(ref(db, `invest_history/${fbUser.uid}`), (s) => {
                    const data = []; s.forEach(c => { data.push({...c.val(), id: c.key}); });
                    state.investments = data; updateBalanceUI(); render();
                });
                onValue(rtdbQuery(ref(db, 'global_chats'), limitToLast(20)), (s) => {
                    const data = []; s.forEach(c => { data.push({...c.val(), id: c.key}); });
                    state.chats = data; updateChatUI();
                });
                render();
            } else {
                state.user = null; render();
            }
        });
    </script>
    <script src="https://unpkg.com/lucide@latest"></script>
</body>
</html>
