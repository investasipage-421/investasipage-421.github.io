<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Masuk ke GuruPlus</title>
<style>
  :root{
    --yellow: #FFCD43;
    --yellow-dark: #E0A91E;
    --orange: #FF6A39;
    --text-dark: #2B2B2E;
    --text-gray: #8A8A93;
    --blue: #3B6EF5;
    --border: #E3E3E8;
    --field-bg: #F4F4F6;
  }

  *{ box-sizing: border-box; }

  html, body{
    height: 100%;
  }

  body{
    margin: 0;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    background: #fff;
    font-family: "Segoe UI", "Helvetica Neue", Arial, sans-serif;
  }

  .phone{
    width: 100%;
    flex: 1;
    min-height: 100vh;
    background: #fff;
    display: flex;
    flex-direction: column;
  }

  .side-panel{
    display: none;
  }

  .content{
    flex: 1;
    width: 100%;
    max-width: 460px;
    margin: 0 auto;
    padding: 64px 28px 0 28px;
    display: flex;
    flex-direction: column;
  }

  /* Layar lebar: form tetap polos di tengah, tanpa panel ilustrasi */
  @media (min-width: 900px){
    body{ background: #F6F7FB; }

    .phone{
      flex-direction: row;
      max-width: 480px;
      min-height: 0;
      height: min(760px, 92vh);
      margin: auto;
      border-radius: 28px;
      box-shadow: 0 24px 60px rgba(20,20,40,0.10);
      overflow: hidden;
    }

    .side-panel{
      display: none;
    }

    .content{
      flex: 1;
      max-width: 460px;
      margin: 0 auto;
      padding: 0 56px;
      justify-content: center;
    }

    .mascot-wrap{ display: flex; }

    .footer{ border-top: none; margin-top: 0; }
    .submit-area{ padding: 18px 0 48px 0; }
  }

  /* ---------- Mascot ---------- */
  .mascot-wrap{
    display: flex;
    justify-content: center;
    margin-bottom: 22px;
  }
  .mascot{
    position: relative;
    width: 96px;
    height: 110px;
  }
  .mascot-shadow{
    position: absolute;
    bottom: -10px;
    left: 50%;
    transform: translateX(-50%);
    width: 64px;
    height: 14px;
    background: #E7E7EC;
    border-radius: 50%;
  }
  .pencil-cap{
    position: absolute;
    top: 0;
    left: 8px;
    width: 80px;
    height: 22px;
    background: #FF5A36;
    border-radius: 10px 10px 0 0;
  }
  .pencil-band{
    position: absolute;
    top: 20px;
    left: 4px;
    width: 88px;
    height: 10px;
    background: #C9CCD1;
  }
  .face{
    position: absolute;
    top: 28px;
    left: 4px;
    width: 88px;
    height: 78px;
    background: linear-gradient(180deg, #FFC93C 0%, #FFB23C 100%);
    border-radius: 0 0 44px 44px;
  }
  .eyebrow{
    position: absolute;
    top: 36px;
    width: 16px;
    height: 8px;
    border-top: 3px solid #2B2B2E;
    border-radius: 50%;
  }
  .eyebrow.left{ left: 16px; }
  .eyebrow.right{ left: 56px; transform: scaleX(-1); }
  .eye{
    position: absolute;
    top: 44px;
    width: 18px;
    height: 18px;
    background: #fff;
    border-radius: 50%;
    border: 2px solid #2B2B2E;
  }
  .eye.left{ left: 14px; }
  .eye.right{ left: 56px; }
  .pupil{
    position: absolute;
    top: 6px;
    left: 6px;
    width: 6px;
    height: 6px;
    background: #2B2B2E;
    border-radius: 50%;
  }
  .nose{
    position: absolute;
    top: 62px;
    left: 41px;
    width: 6px;
    height: 6px;
    background: #E8923C;
    border-radius: 50%;
  }
  .mouth{
    position: absolute;
    top: 74px;
    left: 36px;
    width: 16px;
    height: 8px;
    border-bottom: 3px solid #2B2B2E;
    border-radius: 50%;
  }

  /* ---------- Headings ---------- */
  h1.title{
    margin: 0 0 10px 0;
    text-align: center;
    font-size: 28px;
    font-weight: 800;
    color: var(--text-dark);
    letter-spacing: -0.3px;
  }

  .subtitle{
    text-align: center;
    margin: 0 0 28px 0;
    font-size: 15px;
    color: var(--text-gray);
  }
  .subtitle a{
    color: var(--blue);
    font-weight: 700;
    text-decoration: none;
  }
  .subtitle a:hover{ text-decoration: underline; }

  /* ---------- Google button ---------- */
  .btn-google{
    width: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 12px;
    padding: 16px 18px;
    background: #fff;
    border: 1px solid var(--border);
    border-radius: 14px;
    box-shadow: 0 3px 0 var(--border);
    font-size: 16px;
    font-weight: 700;
    color: var(--text-dark);
    cursor: pointer;
    margin-bottom: 26px;
    transition: transform .05s ease;
  }
  .btn-google:active{ transform: translateY(2px); box-shadow: 0 1px 0 var(--border); }
  .btn-google svg{ width: 22px; height: 22px; }

  /* ---------- Divider ---------- */
  .divider{
    display: flex;
    align-items: center;
    gap: 14px;
    margin-bottom: 26px;
  }
  .divider .line{
    flex: 1;
    height: 1px;
    background: var(--border);
  }
  .divider span{
    font-size: 14px;
    color: var(--text-gray);
    white-space: nowrap;
  }

  /* ---------- Inputs ---------- */
  .field{
    position: relative;
    margin-bottom: 18px;
  }
  .field input{
    width: 100%;
    padding: 18px 16px;
    background: var(--field-bg);
    border: 1px solid var(--border);
    border-radius: 14px;
    font-size: 16px;
    color: var(--text-dark);
    outline: none;
    transition: border-color .15s ease, background .15s ease;
  }
  .field input::placeholder{ color: #A6A6AE; }
  .field input:focus{
    border-color: var(--blue);
    background: #fff;
  }
  .field.has-icon input{ padding-right: 48px; }
  .eye-toggle{
    position: absolute;
    right: 14px;
    top: 50%;
    transform: translateY(-50%);
    background: none;
    border: none;
    cursor: pointer;
    padding: 6px;
    display: flex;
    color: var(--blue);
  }
  .eye-toggle svg{ width: 22px; height: 22px; }

  .forgot{
    text-align: right;
    margin-bottom: 18px;
  }
  .forgot a{
    color: var(--blue);
    font-size: 14px;
    font-weight: 700;
    text-decoration: none;
  }
  .forgot a:hover{ text-decoration: underline; }

  .error-msg{
    font-size: 13px;
    color: #E0483E;
    margin: -10px 0 14px 4px;
    min-height: 16px;
  }

  /* ---------- Footer / submit ---------- */
  .footer{
    margin-top: auto;
    padding-top: 18px;
    border-top: 1px solid var(--border);
  }
  .submit-area{
    padding: 18px 28px 28px 28px;
  }
  .btn-submit{
    width: 100%;
    padding: 18px;
    background: linear-gradient(180deg, var(--yellow) 0%, #FFC22E 100%);
    border: none;
    border-bottom: 4px solid var(--yellow-dark);
    border-radius: 16px;
    color: #fff;
    font-size: 16px;
    font-weight: 800;
    letter-spacing: 1px;
    cursor: pointer;
    transition: transform .05s ease, filter .15s ease;
  }
  .btn-submit:hover{ filter: brightness(1.03); }
  .btn-submit:active{ transform: translateY(2px); border-bottom-width: 2px; }
  .btn-submit:disabled{
    opacity: .6;
    cursor: not-allowed;
  }


</style>
</head>
<body>

<div class="phone">
  <div class="content">

    <div class="mascot-wrap">
      <div class="mascot">
        <div class="mascot-shadow"></div>
        <div class="pencil-cap"></div>
        <div class="pencil-band"></div>
        <div class="face">
          <div class="eyebrow left"></div>
          <div class="eyebrow right"></div>
          <div class="eye left"><div class="pupil"></div></div>
          <div class="eye right"><div class="pupil"></div></div>
          <div class="nose"></div>
          <div class="mouth"></div>
        </div>
      </div>
    </div>

    <h1 class="title">Masuk ke GuruPlus</h1>
    <p class="subtitle">Belum punya akun? <a href="#" id="daftarLink">Daftar akun</a></p>

    <button type="button" class="btn-google" id="googleBtn">
      <svg viewBox="0 0 48 48">
        <path fill="#FFC107" d="M43.611 20.083H42V20H24v8h11.303c-1.649 4.657-6.08 8-11.303 8-6.627 0-12-5.373-12-12s5.373-12 12-12c3.059 0 5.842 1.154 7.961 3.039l5.657-5.657C34.046 6.053 29.268 4 24 4 12.955 4 4 12.955 4 24s8.955 20 20 20 20-8.955 20-20c0-1.341-.138-2.65-.389-3.917z"/>
        <path fill="#FF3D00" d="M6.306 14.691l6.571 4.819C14.655 15.108 18.961 12 24 12c3.059 0 5.842 1.154 7.961 3.039l5.657-5.657C34.046 6.053 29.268 4 24 4 16.318 4 9.656 8.337 6.306 14.691z"/>
        <path fill="#4CAF50" d="M24 44c5.166 0 9.86-1.977 13.409-5.192l-6.19-5.238C29.211 35.091 26.715 36 24 36c-5.202 0-9.619-3.317-11.283-7.946l-6.522 5.025C9.505 39.556 16.227 44 24 44z"/>
        <path fill="#1976D2" d="M43.611 20.083H42V20H24v8h11.303a12.04 12.04 0 0 1-4.087 5.571l.003-.002 6.19 5.238C36.971 39.205 44 34 44 24c0-1.341-.138-2.65-.389-3.917z"/>
      </svg>
      Masuk dengan Google
    </button>

    <div class="divider">
      <span class="line"></span>
      <span>atau masuk manual</span>
      <span class="line"></span>
    </div>

    <form id="loginForm" novalidate>
      <div class="field">
        <input type="email" id="email" placeholder="Email" autocomplete="email" required>
      </div>

      <div class="field has-icon">
        <input type="password" id="password" placeholder="Kata sandi" autocomplete="current-password" required>
        <button type="button" class="eye-toggle" id="toggleEye" aria-label="Tampilkan kata sandi">
          <svg id="eyeIcon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M17.94 17.94A10.94 10.94 0 0 1 12 19c-6 0-10-7-10-7a18.6 18.6 0 0 1 4.22-5.06"></path>
            <path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c6 0 10 7 10 7a18.5 18.5 0 0 1-2.16 3.19"></path>
            <path d="M14.12 14.12a3 3 0 1 1-4.24-4.24"></path>
            <line x1="1" y1="1" x2="23" y2="23"></line>
          </svg>
        </button>
      </div>

      <div class="error-msg" id="errorMsg"></div>

      <div class="forgot">
        <a href="#" id="forgotLink">Lupa kata sandi?</a>
      </div>
    </form>

    <div class="footer">
      <div class="submit-area">
        <button type="submit" form="loginForm" class="btn-submit" id="submitBtn">MASUK</button>
      </div>
    </div>

  </div>
</div>

<script>
  const form = document.getElementById('loginForm');
  const emailInput = document.getElementById('email');
  const passwordInput = document.getElementById('password');
  const toggleEye = document.getElementById('toggleEye');
  const eyeIcon = document.getElementById('eyeIcon');
  const errorMsg = document.getElementById('errorMsg');
  const submitBtn = document.getElementById('submitBtn');
  const googleBtn = document.getElementById('googleBtn');
  const daftarLink = document.getElementById('daftarLink');
  const forgotLink = document.getElementById('forgotLink');

  // Toggle show/hide password
  let isVisible = false;
  toggleEye.addEventListener('click', () => {
    isVisible = !isVisible;
    passwordInput.type = isVisible ? 'text' : 'password';
    eyeIcon.innerHTML = isVisible
      ? '<path d="M1 12s4-7 11-7 11 7 11 7-4 7-11 7-11-7-11-7z"></path><circle cx="12" cy="12" r="3"></circle>'
      : '<path d="M17.94 17.94A10.94 10.94 0 0 1 12 19c-6 0-10-7-10-7a18.6 18.6 0 0 1 4.22-5.06"></path><path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c6 0 10 7 10 7a18.5 18.5 0 0 1-2.16 3.19"></path><path d="M14.12 14.12a3 3 0 1 1-4.24-4.24"></path><line x1="1" y1="1" x2="23" y2="23"></line>';
  });

  function validateEmail(value){
    return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(value);
  }

  form.addEventListener('submit', (e) => {
    e.preventDefault();
    errorMsg.textContent = '';

    const email = emailInput.value.trim();
    const password = passwordInput.value;

    if(!email || !password){
      errorMsg.textContent = 'Email dan kata sandi wajib diisi.';
      return;
    }
    if(!validateEmail(email)){
      errorMsg.textContent = 'Format email tidak valid.';
      return;
    }
    if(password.length < 6){
      errorMsg.textContent = 'Kata sandi minimal 6 karakter.';
      return;
    }

    submitBtn.disabled = true;
    submitBtn.textContent = 'MEMPROSES...';

    // Simulasi proses login (ganti dengan pemanggilan API asli)
    setTimeout(() => {
      submitBtn.disabled = false;
      submitBtn.textContent = 'MASUK';
      alert('Login berhasil (simulasi)!\nEmail: ' + email);
    }, 1200);
  });

  googleBtn.addEventListener('click', () => {
    alert('Arahkan ke proses Masuk dengan Google di sini.');
  });

  daftarLink.addEventListener('click', (e) => {
    e.preventDefault();
    alert('Arahkan ke halaman Daftar Akun di sini.');
  });

  forgotLink.addEventListener('click', (e) => {
    e.preventDefault();
    alert('Arahkan ke halaman Lupa Kata Sandi di sini.');
  });
</script>

</body>
</html>
