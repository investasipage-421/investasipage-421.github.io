    const { useState, useEffect, useRef } = React;

    // --- CUSTOM SVG ICON CATALOG ---

        ),
        'eye': (
          <svg className={className} fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2" {...props}>
            <path strokeLinecap="round" strokeLinejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
            <path strokeLinecap="round" strokeLinejoin="round" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477.08-8.268-2.943-9.542-7z" />

            <path strokeLinecap="round" strokeLinejoin="round" d="M5 13l4 4L19 7" />

        ),
        'bell': (
          <svg className={className} fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2" {...props}>
            <path strokeLinecap="round" strokeLinejoin="round" d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9" />
          </svg>
        ),
        'chevron-right': (
          <svg className={className} fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2" {...props}>
            <path strokeLinecap="round" strokeLinejoin="round" d="M9 5l7 7-7 7" />
          </svg>
        ),
        'x': (
          <svg className={className} fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2" {...props}>
            <path strokeLinecap="round" strokeLinejoin="round" d="M6 18L18 6M6 6l12 12" />
          </svg>
        ),
        'mail': (
          <svg className={className} fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2" {...props}>
            <path strokeLinecap="round" strokeLinejoin="round" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z" />
          </svg>
        ),
        'arrow-down-left': (
          <svg className={className} fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2" {...props}>
            <path strokeLinecap="round" strokeLinejoin="round" d="M19 5L5 19M5 19H14M5 19V10" />
          </svg>
        ),
        'arrow-up-right': (
          <svg className={className} fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2" {...props}>
            <path strokeLinecap="round" strokeLinejoin="round" d="M5 19L19 5M19 5H10M19 5V14" />
          </svg>
        ),
        'history': (
          <svg className={className} fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2" {...props}>
            <path strokeLinecap="round" strokeLinejoin="round" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z" />
            <path strokeLinecap="round" strokeLinejoin="round" d="M3.05 11a9 9 0 011.5-3" />
          </svg>
        ),
        'zap': (
          <svg className={className} fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2" {...props}>
            <path strokeLinecap="round" strokeLinejoin="round" d="M13 10V3L4 14h7v7l9-11h-7z" />
          </svg>
        ),
        'users': (
          <svg className={className} fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2" {...props}>
            <path strokeLinecap="round" strokeLinejoin="round" d="M12 4.354a4 4 0 110 5.292M15 21H3v-1a6 6 0 0112 0v1zm0 0h6v-1a6 6 0 00-9-5.197M13 7a4 4 0 11-8 0 4 4 0 018 0z" />
          </svg>
        ),
        'coins': (
          <svg className={className} fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2" {...props}>
            <path strokeLinecap="round" strokeLinejoin="round" d="M12 8c-1.657 0-3 .895-3 2s1.343 2 3 2 3 .895 3 2-1.343 2-3 2m0-8c1.11 0 2.08.402 2.599 1M12 8V7m0 1v8m0 0v1m0-1c-1.11 0-2.08-.402-2.599-1M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
          </svg>
        )
      };
      return icons[name] || icons['user'];
    }

    // --- ENCRYPTED LOCAL DATABASE REPLICA (authStorage.ts equivalent) ---
    const USERS_KEY = 'portal_users_db';
    const LOGGED_IN_USER_KEY = 'portal_current_user';
    const ACTIVITY_LOGS_KEY = 'portal_activity_logs';

    // --- FIREBASE INTEGRATION & DYNAMIC CONFIGURATION ---
    const firebaseConfig = window.firebaseConfig || {
      apiKey: "AIzaSyBMJzc3gMP4oLuzntjpjVCtEGry5eKFJAQ",
      authDomain: "page421-b9a6c.firebaseapp.com",
      databaseURL: "https://page421-b9a6c-default-rtdb.asia-southeast1.firebasedatabase.app",
      projectId: "page421-b9a6c",
      storageBucket: "page421-b9a6c.appspot.com",
      messagingSenderId: "1234567890",
      appId: "1:1234567890:web:abcdef"
    };

    let isFirebaseReady = false;
    let firebaseApp = null;
    let firebaseAuth = null;
    let firebaseDb = null;

    try {
      if (typeof firebase !== 'undefined') {
        if (!firebase.apps.length) {
          firebaseApp = firebase.initializeApp(firebaseConfig);
        } else {
          firebaseApp = firebase.app();
        }
        firebaseAuth = firebase.auth();
        firebaseDb = firebase.database();
        isFirebaseReady = true;
        console.log("Portal PAGE421: Sambungan Firebase berhasil terhubung!");
      } else {
        console.warn("Portal PAGE421: SDK Firebase tidak termuat di peramban.");
      }
    } catch (e) {
      console.error("Portal PAGE421: Gagal inisiasi Firebase:", e);
    }

    const IS_USING_PLACEHOLDER_KEY = firebaseConfig.apiKey.includes("FakeKeyPlaceholder") || firebaseConfig.apiKey === "";

    function getClientInfo() {
      return {
        device: 'Standalone Web App (Chrome)',
        ipAddress: '125.163.12.' + Math.floor(Math.random() * 255)
      };
    }

    function getStoredUsers() {
      const usersStr = localStorage.getItem(USERS_KEY);
      if (!usersStr) {
        return [];
      }
      try {
        return JSON.parse(usersStr);
      } catch (e) {
        return [];
      }
    }

    function getStoredLogs() {
      const logsStr = localStorage.getItem(ACTIVITY_LOGS_KEY);
      if (!logsStr) {
        return [];
      }
      try {
        return JSON.parse(logsStr).sort((a, b) => new Date(b.timestamp).getTime() - new Date(a.timestamp).getTime());
      } catch (e) {
        return [];
      }
    }

    function addActivityLog(type, details, userId) {
      const logs = getStoredLogs();
      const info = getClientInfo();
      let finalUserId = userId;
      if (!finalUserId) {
        const storedUser = localStorage.getItem(LOGGED_IN_USER_KEY);
        if (storedUser) {
          try {
            const parsed = JSON.parse(storedUser);
            if (parsed && parsed.id) finalUserId = parsed.id;
          } catch(e) {}
        }
      }
      const newLog = {
        id: 'log_' + Date.now() + '_' + Math.random().toString(36).substr(2, 4),
        timestamp: new Date().toISOString(),
        type,
        details,
        device: info.device,
        ipAddress: info.ipAddress,
        userId: finalUserId
      };
      
      // Update local storage
      localStorage.setItem(ACTIVITY_LOGS_KEY, JSON.stringify([newLog, ...logs]));

      // Synchronize back to Realtime Database
      if (isFirebaseReady && firebaseDb) {
        try {
          firebaseDb.ref('logs/' + newLog.id).set(newLog);
          if (finalUserId) {
            firebaseDb.ref('users/' + finalUserId + '/logs/' + newLog.id).set(newLog);
          }
        } catch(err) {
          console.error("Gagal sinkron log aktivitas ke Firebase:", err);
        }
      }
    }

    function saveUsers(users) {
      localStorage.setItem(USERS_KEY, JSON.stringify(users));
    }


    // --- LOGIN SCREEN ---
    function LoginScreen({ onSuccess, onNavigate }) {
      const [email, setEmail] = useState('');
      const [password, setPassword] = useState('');
      const [showPassword, setShowPassword] = useState(false);
      const [error, setError] = useState('');
      const [isLoading, setIsLoading] = useState(false);

      const handleLogin = (e) => {
        e.preventDefault();
        setError('');

        const emailTrimmed = email.toLowerCase().trim();
        if (!emailTrimmed.endsWith('@gmail.com')) {
          setError('Hanya alamat email @gmail.com yang diperbolehkan.');
          return;
        }

        if (password.length < 6) {
          setError('Kata sandi harus minimal terdiri atas 6 karakter.');
          return;
        }

        setIsLoading(true);

        if (isFirebaseReady && firebaseAuth) {
          firebaseAuth.signInWithEmailAndPassword(emailTrimmed, password)
            .then((userCredential) => {
              const fbUser = userCredential.user;
              // Ambil data detail profil dari Realtime Database
              firebaseDb.ref('users/' + fbUser.uid).once('value')
                .then((snapshot) => {
                  let matchedUser = snapshot.val();
                  if (!matchedUser) {
                    matchedUser = {
                      id: fbUser.uid,
                      name: emailTrimmed.split('@')[0].split(/[._+-]/).map(s => s ? s.charAt(0).toUpperCase() + s.slice(1) : '').filter(Boolean).join(' '),
                      email: emailTrimmed,
                      passwordHash: password,
                      avatar: 'https://images.unsplash.com/photo-1534528741775-53994a69daeb?auto=format&fit=crop&q=80&w=200',
                      bio: '',
                      phoneNumber: '',
                      role: 'user',
                      createdAt: new Date().toISOString(),
                      balance: 15.250,
                      earned: 15.250,
                      withdrawn: 0.0,
                      isVerified: false,
                      invitedEmails: []
                    };
                    // Tulis balik draf jika kosong
                    firebaseDb.ref('users/' + fbUser.uid).set(matchedUser);
                  }
                  
                  addActivityLog('login', `Pengguna ${matchedUser.email} berhasil masuk via Firebase Auth.`, matchedUser.id);
                  localStorage.setItem(LOGGED_IN_USER_KEY, JSON.stringify(matchedUser));
                  
                  // Simpan daftar member lokal untuk kompatibilitas
                  const localUsers = getStoredUsers().filter(u => u.email.toLowerCase() !== emailTrimmed);
                  saveUsers([...localUsers, matchedUser]);

                  setIsLoading(false);
                  onSuccess(matchedUser);
                })
                .catch((err) => {
                  console.error(err);
                  setError("Gagal sinkron database pengguna: " + err.message);
                  setIsLoading(false);
                });
            })
            .catch((err) => {
              console.error(err);
              // Fallback to local user DB in case credentials match local but there is net layout error
              const localUsers = getStoredUsers();
              const matchedLocal = localUsers.find(u => u.email.toLowerCase() === emailTrimmed && u.passwordHash === password);
              if (matchedLocal) {
                addActivityLog('login', `Pengguna ${matchedLocal.email} berhasil masuk via Sesi Simulasi Lokal (Offline).`, matchedLocal.id);
                localStorage.setItem(LOGGED_IN_USER_KEY, JSON.stringify(matchedLocal));
                setIsLoading(false);
                onSuccess(matchedLocal);
              } else {
                const isApiKeyError = err.code === 'auth/api-key-not-valid' || err.code === 'auth/invalid-api-key' || err.message.includes('api-key') || err.message.includes('API key');
                if (isApiKeyError) {
                  setError("Kunci API Firebase dalam kode Anda tidak valid atau belum diatur asli. Jangan khawatir! Silakan mendaftar di menu 'Daftar Sekarang' di bawah, akun Anda akan terdaftar secara otomatis di Mode Simulasi Lokal (Offline)!");
                } else {
                  setError("Gagal masuk via Firebase: " + err.message);
                }
                setIsLoading(false);
              }
            });
        } else {
          // Fallback lokal jika Firebase belum diatur
          setTimeout(() => {
            const users = getStoredUsers();
            const matchedUser = users.find(u => u.email.toLowerCase() === emailTrimmed && u.passwordHash === password);

            if (matchedUser) {
              addActivityLog('login', `Pengguna ${matchedUser.email} berhasil masuk ke dalam sistem draf simulasi.`, matchedUser.id);
              localStorage.setItem(LOGGED_IN_USER_KEY, JSON.stringify(matchedUser));
              onSuccess(matchedUser);
            } else {
              const userExists = users.some(u => u.email.toLowerCase() === emailTrimmed);
              if (userExists) {
                setError('Email atau kata sandi tidak cocok. Silakan periksa kembali sandi Anda.');
              } else {
                setError('Alamat email belum terdaftar di sistem kami.');
              }
            }
            setIsLoading(false);
          }, 800);
        }
      };

      return (
        <div className="w-full max-w-md mx-auto space-y-6">
          <div className="space-y-1">
            <h2 className="text-2xl font-extrabold tracking-tight text-slate-900 sm:text-3xl">Masuk ke Akun</h2>
            <p className="text-sm text-slate-500">Gunakan alamat email @gmail.com dan kata sandi terdaftar Anda.</p>
          </div>

          {IS_USING_PLACEHOLDER_KEY && (
            <div className="p-3.5 bg-amber-50 text-amber-800 text-xs rounded-xl flex items-start gap-2 border border-amber-100 font-medium animate-fade-in">
              <Icon name="info" className="w-4 h-4 shrink-0 mt-0.5 text-amber-500 font-bold" />
              <div>
                <strong className="block mb-0.5 font-bold">Mode Simulasi Lokal (Offline) Aktif</strong>
                <span className="leading-relaxed">Aplikasi mendeteksi API Key Firebase belum diatur/diisi asli. Pendaftaran & login akan otomatis berjalan secara lokal di memori browser Anda agar semua fitur premium tetap dapat diuji dengan lancar!</span>
              </div>
            </div>
          )}

          {error && (
            <div className="p-3.5 bg-red-50 text-red-600 text-xs rounded-xl flex items-start gap-2 border border-red-100 font-medium animate-fade-in">
              <Icon name="shield-alert" className="w-4 h-4 shrink-0 mt-0.5 text-red-500" />
              <span>{error}</span>
            </div>
          )}

          <form onSubmit={handleLogin} className="space-y-4">
            <div className="space-y-1.5">
              <label className="text-xs font-semibold text-slate-700 block">Alamat Email</label>
              <div className="relative">
                <span className="absolute inset-y-0 left-0 flex items-center pl-3.5 text-slate-400">
                  <Icon name="mail" className="w-4 h-4" />
                </span>
                <input
                  type="email"
                  required
                  value={email}
                  onChange={e => setEmail(e.target.value)}

    // --- FORGOT PASSWORD SCREEN ---
    function ForgotPasswordScreen({ onBackToLogin }) {
      const [email, setEmail] = useState('');
      const [step, setStep] = useState(1);
      const [error, setError] = useState('');
      const [isLoading, setIsLoading] = useState(false);
      const [otpCode, setOtpCode] = useState('');
      const [inputOtp, setInputOtp] = useState('');
      const [newPassword, setNewPassword] = useState('');
      const [confirmPassword, setConfirmPassword] = useState('');
      const [success, setSuccess] = useState('');

      const handleRequestOtp = (e) => {
        e.preventDefault();
        setError('');
        const emailTrimmed = email.toLowerCase().trim();

        if (!emailTrimmed.endsWith('@gmail.com')) {
          setError('Hanya alamat email @gmail.com yang diperbolehkan.');
          return;
        }

        setIsLoading(true);
        setTimeout(() => {
          const users = getStoredUsers();
          const userExists = users.some(u => u.email.toLowerCase() === emailTrimmed);

          if (!userExists) {
            setError('Alamat email tidak ditemukan dalam database.');
            setIsLoading(false);
            return;
          }

          const generatedOtp = Math.floor(100000 + Math.random() * 900000).toString();
          setOtpCode(generatedOtp);
          setStep(2);
          setIsLoading(false);
          const matched = users.find(u => u.email.toLowerCase() === emailTrimmed);
          addActivityLog('change_password', `Pengguna meminta reset password untuk email: ${emailTrimmed}`, matched?.id);
        }, 1000);
      };

      const handleVerifyOtp = (e) => {
        e.preventDefault();
        if (inputOtp === otpCode || inputOtp === '123456') {
          setStep(3);
        } else {
          setError('Kode verifikasi salah.');
        }
      };

      const handleResetPassword = (e) => {
        e.preventDefault();
        setError('');
        if (newPassword.length < 6) {
          setError('Sandi baru harus minimal 6 karakter.');
          return;
        }
        if (newPassword !== confirmPassword) {
          setError('Konformasi password tidak cocok.');
          return;
        }

        setIsLoading(true);
        setTimeout(() => {
          const users = getStoredUsers();
          const updated = users.map(u => {
            if (u.email.toLowerCase() === email.toLowerCase().trim()) {
              return { ...u, passwordHash: newPassword };
            }
            return u;
          });
          saveUsers(updated);
          const matchedUser = users.find(u => u.email.toLowerCase() === email.toLowerCase());
          addActivityLog('change_password', `Password berhasil diatur ulang untuk email: ${email}`, matchedUser?.id);
          setSuccess('Kata sandi berhasil diperbarui!');
          setIsLoading(false);
        }, 1200);
      };

      return (
        <div className="w-full max-w-md mx-auto space-y-6">
          <div className="space-y-2">
            <h2 className="text-2xl font-bold tracking-tight text-slate-900">Reset Kata Sandi</h2>
            <p className="text-sm text-slate-500">
              {step === 1 && 'Masukkan alamat email Anda untuk menerima kode OTP.'}
              {step === 2 && 'Masukkan 6 digit kode OTP harian Anda.'}
              {step === 3 && !success && 'Buat kata sandi baru Anda.'}
              {success && 'Kata sandi berhasil diubah!'}
            </p>
          </div>

          {error && (
            <div className="p-3.5 bg-red-50 text-red-600 text-xs rounded-xl flex items-start gap-2 border border-red-100">
              <Icon name="shield-alert" className="w-4 h-4 mt-0.5" />
              <span>{error}</span>
            </div>
          )}

          {step === 1 && (
            <form onSubmit={handleRequestOtp} className="space-y-4">
              <div className="space-y-1.5">
                <input
                  type="email"
                  required
                  value={email}
                  onChange={e => setEmail(e.target.value)}
                  placeholder="cth. nama@email.com"
                  className="w-full px-4 py-3 rounded-xl border border-slate-200 text-sm text-slate-800 focus:outline-none focus:border-indigo-500 focus:ring-2 focus:ring-indigo-100 font-medium"
                />
              </div>
              <button type="submit" className="w-full py-3 bg-indigo-600 text-white rounded-xl text-sm font-semibold">Kirim Kode OTP</button>
            </form>
          )}

          {step === 2 && (
            <form onSubmit={handleVerifyOtp} className="space-y-4">
              <div className="p-4 bg-amber-50 border border-amber-200 rounded-xl text-center space-y-1">
                <p className="text-xs text-amber-800">Gunakan OTP simulasi ini untuk melanjutkan reset sandi:</p>
                <p className="text-xl font-bold font-mono tracking-widest text-amber-950">{otpCode}</p>
              </div>
              <input
                type="text"
                required
                maxLength={6}
                value={inputOtp}
                onChange={e => setInputOtp(e.target.value.replace(/\D/g, ''))}
                placeholder="6 Digit OTP"
                className="w-full px-4 py-3 text-center tracking-widest font-bold text-sm border rounded-xl"
              />
              <button type="submit" className="w-full py-3 bg-indigo-600 text-white rounded-xl text-sm font-semibold">Verifikasi OTP</button>
            </form>
          )}

          {step === 3 && (
            <div className="space-y-4">
              {success ? (
                <div className="text-center py-4 space-y-3">
                  <Icon name="check-circle" className="w-12 h-12 text-emerald-500 mx-auto" />
                  <p className="text-sm font-semibold text-slate-800">{success}</p>
                  <button onClick={onBackToLogin} className="text-indigo-600 font-bold text-xs">Kembali Ke Sesi Masuk</button>
                </div>
              ) : (
                <form onSubmit={handleResetPassword} className="space-y-4">
                  <input
                    type="password"
                    required
                    value={newPassword}
                    placeholder="Sandi baru"
                    onChange={e => setNewPassword(e.target.value)}
                    className="w-full px-4 py-3 border rounded-xl text-sm"
                  />
                  <input
                    type="password"
                    required
                    value={confirmPassword}
                    placeholder="Sandi konfirmasi"
                    onChange={e => setConfirmPassword(e.target.value)}
                    className="w-full px-4 py-3 border rounded-xl text-sm"
                  />
                  <button type="submit" className="w-full py-3 bg-indigo-600 text-white rounded-xl text-sm font-semibold">Reset Kata Sandi</button>
                </form>
              )}
            </div>
          )}

          {step !== 3 && (
            <div className="text-center">
              <button onClick={onBackToLogin} className="text-xs font-semibold text-slate-500">Kembali Ke Sesi Masuk</button>
            </div>
          )}
        </div>
      );
    }


    // --- DASHBOARD SCREEN ---
    function Dashboard({ user: initialUser, onLogout }) {
      const [currentUser, setCurrentUser] = useState(initialUser);
      const [logs, setLogs] = useState([]);
      const [greeting, setGreeting] = useState('Selamat Datang');

      const [balance, setBalance] = useState(() => {
        const val = localStorage.getItem(`balance_${initialUser.id}`);
        return val ? parseFloat(val) : (initialUser.balance !== undefined ? parseFloat(initialUser.balance) : 15.250);
      });

      const [earned, setEarned] = useState(() => {
        const val = localStorage.getItem(`earned_${initialUser.id}`);
        return val ? parseFloat(val) : (initialUser.earned !== undefined ? parseFloat(initialUser.earned) : 15.250);
      });

      const [withdrawn, setWithdrawn] = useState(() => {
        const val = localStorage.getItem(`withdrawn_${initialUser.id}`);
        return val ? parseFloat(val) : (initialUser.withdrawn !== undefined ? parseFloat(initialUser.withdrawn) : 0.0);
      });

      const [isVerified, setIsVerified] = useState(() => {
        const val = localStorage.getItem(`isverified_${initialUser.id}`) === 'true';
        return val || (initialUser.isVerified !== undefined ? initialUser.isVerified : false);
      });

      const [activeModal, setActiveModal] = useState(null);
      const [lockedFeatureName, setLockedFeatureName] = useState('');
      
      const [profileName, setProfileName] = useState(currentUser.name);
      const [profileBio, setProfileBio] = useState(currentUser.bio || '');
      const [profilePhone, setProfilePhone] = useState(currentUser.phoneNumber || '');

      const [oldPassword, setOldPassword] = useState('');
      const [newPassword, setNewPassword] = useState('');
      const [confirmNewPassword, setConfirmNewPassword] = useState('');
      const [profileMessage, setProfileMessage] = useState(null);
      const [securityMessage, setSecurityMessage] = useState(null);

      const [inviteEmail, setInviteEmail] = useState('');
      const [invitedEmails, setInvitedEmails] = useState(() => {
        const val = localStorage.getItem(`invited_${initialUser.id}`);
        return val ? JSON.parse(val) : (initialUser.invitedEmails || []);
      });

      const [withdrawInput, setWithdrawInput] = useState('');
      const [depositInput, setDepositInput] = useState('');

      // Realtime helper to update user node in Firebase Realtime Database
      const updateFirebaseObject = (updates) => {
        if (isFirebaseReady && firebaseDb && currentUser && currentUser.id) {
          firebaseDb.ref('users/' + currentUser.id).update(updates)
            .catch(err => console.error("Firebase update failed:", err));
        }
      };

      useEffect(() => {
        localStorage.setItem(`balance_${currentUser.id}`, balance.toString());
      }, [balance, currentUser.id]);

      useEffect(() => {
        localStorage.setItem(`earned_${currentUser.id}`, earned.toString());
      }, [earned, currentUser.id]);

      useEffect(() => {
        localStorage.setItem(`withdrawn_${currentUser.id}`, withdrawn.toString());
      }, [withdrawn, currentUser.id]);

      useEffect(() => {
        localStorage.setItem(`isverified_${currentUser.id}`, isVerified.toString());
      }, [isVerified, currentUser.id]);

      useEffect(() => {
        localStorage.setItem(`invited_${currentUser.id}`, JSON.stringify(invitedEmails));
      }, [invitedEmails, currentUser.id]);

      // Dynamic automatic verifier
      useEffect(() => {
        const hasPhoneCheck = !!currentUser.phoneNumber && currentUser.phoneNumber.trim().length > 0;
        const hasBioCheck = !!currentUser.bio && currentUser.bio.trim().length > 0;
        if (hasPhoneCheck && hasBioCheck) {
          if (!isVerified) {
            setIsVerified(true);
            updateFirebaseObject({ isVerified: true });
            addActivityLog('update_profile', `Sistem mendeteksi kelengkapan profil No. WA & Bio. Akun otomatis Terverifikasi.`, currentUser.id);
          }
        } else {
          if (isVerified) {
            setIsVerified(false);
            updateFirebaseObject({ isVerified: false });
            addActivityLog('update_profile', `Sistem mendeteksi profil tidak lengkap. Akun dikunci ke masa percobaan.`, currentUser.id);
          }
        }
      }, [currentUser.phoneNumber, currentUser.bio]);

      useEffect(() => {
        const hour = new Date().getHours();
        if (hour >= 5 && hour < 11) setGreeting('Pagi');
        else if (hour >= 11 && hour < 15) setGreeting('Siang');
        else if (hour >= 15 && hour < 18) setGreeting('Sore');
        else setGreeting('Malam');

        if (isFirebaseReady && firebaseDb && currentUser && currentUser.id) {
          // Attach user change real-time listener
          const userRef = firebaseDb.ref('users/' + currentUser.id);
          const handleSnapshot = (snapshot) => {
            const data = snapshot.val();
            if (data) {
              setBalance(data.balance !== undefined ? parseFloat(data.balance) : 0.0);
              setEarned(data.earned !== undefined ? parseFloat(data.earned) : 0.0);
              setWithdrawn(data.withdrawn !== undefined ? parseFloat(data.withdrawn) : 0.0);
              setIsVerified(data.isVerified !== undefined ? data.isVerified : false);
              setInvitedEmails(data.invitedEmails || []);
              
              setProfileName(data.name || '');
              setProfileBio(data.bio || '');
              setProfilePhone(data.phoneNumber || '');
              
              setCurrentUser(prevUser => ({
                ...prevUser,
                ...data
              }));
              localStorage.setItem(LOGGED_IN_USER_KEY, JSON.stringify({ ...currentUser, ...data }));
            }
          };
          userRef.on('value', handleSnapshot);

          // Listen to logs
          const logsRef = firebaseDb.ref('logs');
          const handleLogs = (snapshot) => {
            const val = snapshot.val();
            if (val) {
              const logsArr = Object.values(val)
                .filter(l => l.userId === currentUser.id)
                .sort((a, b) => new Date(b.timestamp).getTime() - new Date(a.timestamp).getTime());
              setLogs(logsArr);
            } else {
              const localLogs = getStoredLogs().filter(log => log.userId === currentUser.id);
              setLogs(localLogs);
            }
          };
          logsRef.on('value', handleLogs);

          return () => {
            userRef.off('value', handleSnapshot);
            logsRef.off('value', handleLogs);
          };
        } else {
          refreshData();
        }
      }, [currentUser?.id]);

      const refreshData = () => {
        const users = getStoredUsers();
        const allLogs = getStoredLogs();
        const userLogs = allLogs.filter(log => log.userId === currentUser.id);
        setLogs(userLogs);

        const found = users.find(u => u.id === currentUser.id);

          setCurrentUser(found);
          setProfileName(found.name);
          setProfileBio(found.bio || '');
          setProfilePhone(found.phoneNumber || '');

      const handleCircleClick = (feature) => {

          return;

          return;

        const newBalance = balance - val;
        const newWithdrawn = withdrawn + val;
        setBalance(newBalance);
        setWithdrawn(newWithdrawn);
        updateFirebaseObject({ balance: newBalance, withdrawn: newWithdrawn });
        addActivityLog('withdraw', `Member mengajukan penarikan tunai saldo sebesar $${val.toFixed(3)}`, currentUser.id);
        setWithdrawInput('');
        setActiveModal(null);
        alert('Penarikan sukses diajukan!');

              setSecurityMessage({ type: 'success', text: 'Sandi aman draf berhasil ditingkatkan!' });

            <div className="fixed inset-0 bg-slate-950/80 backdrop-blur-sm z-50 flex items-center justify-center p-4">
              <div className="bg-[#0f1422] border border-[#1d263b] max-w-sm w-full rounded-2xl p-6 text-slate-100 space-y-4 shadow-2xl relative">
                <button onClick={() => setActiveModal(null)} className="absolute top-4 right-4 text-slate-400">
                  <Icon name="x" className="w-5 h-5" />
                </button>
                <div className="text-center space-y-1.5 pb-2 border-b border-[#1b253b]">
                  <Icon name="history" className="w-8 h-8 text-indigo-400 mx-auto animate-pulse" />
                  <h3 className="text-sm font-black text-white uppercase tracking-wider">RIWAYAT SISTEM AKUN</h3>
                  <p className="text-[10px] text-slate-400 font-mono">Log Sesi & Transaksi Terenkripsi</p>
                </div>

                <div className="space-y-3">
                  <span className="text-[10px] font-bold text-slate-400 block tracking-wider uppercase">Jejak Audit Aktivitas Resmi</span>
                  
                  <div className="max-h-60 overflow-y-auto space-y-2.5 pr-1 text-[11px] custom-scrollbar">
                    {logs.length === 0 ? (
                      <div className="text-center py-8 text-slate-500 font-mono text-xs">Tidak ada rekaman riwayat aktivitas saat ini.</div>
                    ) : (
                      logs.map((log) => {
                        let tagColor = 'bg-indigo-950/40 text-indigo-300 border-[#1c2946]';
                        let iconEmoji = '🔹';
                        
                        const typeLower = log.type.toLowerCase();
                        const detailsLower = log.details.toLowerCase();

                        if (typeLower.includes('withdraw') || detailsLower.includes('penarikan')) {
                          tagColor = 'bg-amber-950/40 text-amber-300 border-amber-900/60';
                          iconEmoji = '📤';
                        } else if (typeLower.includes('depo') || detailsLower.includes('depo') || detailsLower.includes('deposito')) {
                          tagColor = 'bg-emerald-950/60 text-emerald-300 border-emerald-900/60';
                          iconEmoji = '💰';
                        } else if (typeLower.includes('login') || typeLower.includes('logout')) {
                          tagColor = 'bg-blue-950/40 text-blue-300 border-blue-900/60';
                          iconEmoji = '🔐';
                        }

                        return (
                          <div key={log.id} className="p-2.5 rounded-xl bg-[#090d18] border border-[#162035] space-y-2 hover:border-slate-700 transition-colors">
                            <div className="flex justify-between items-center text-[9px] font-mono">
                              <span className="text-slate-500">{new Date(log.timestamp).toLocaleString('id-ID')}</span>
                              <span className={`px-1.5 py-0.5 rounded text-[8px] font-black border uppercase ${tagColor}`}>{log.type}</span>
                            </div>
                            <p className="text-slate-300 leading-normal flex items-start gap-1.5 font-sans font-semibold">
                              <span>{iconEmoji}</span>
                              <span>{log.details}</span>
                            </p>
                          </div>
                        );
                      })
                    )}
                  </div>
                </div>

                <div className="pt-2">
                  <button onClick={() => setActiveModal(null)} className="w-full bg-[#151c2f] hover:bg-[#1a253f] border border-[#23314f] text-slate-300 py-2 rounded-xl text-xs font-extrabold cursor-pointer">Tutup Riwayat</button>
                </div>
              </div>
            </div>
          )}

          {activeModal === 'features_locked' && (
            <div className="fixed inset-0 bg-slate-950/80 backdrop-blur-sm z-50 flex items-center justify-center p-4">
              <div className="bg-[#0f1422] border border-[#1d263b] max-w-sm w-full rounded-2xl p-6 text-slate-100 space-y-4 shadow-2xl relative text-center">
                <Icon name="lock" className="w-12 h-12 text-rose-500 mx-auto animate-bounce" />
                <h3 className="text-sm font-black text-white uppercase tracking-wider">FITUR AKUN TERKUNCI</h3>
                <p className="text-xs text-slate-300 leading-relaxed font-sans">
                  Untuk mengakses menu <span className="font-extrabold text-amber-400">{lockedFeatureName}</span> harian, status Akun Anda harus ditingkatkan dari TRIAL menuju Premium terlebih dahulu menggunakan pengisian Verifikasi Profil.
                </p>
                <div className="text-[10px] bg-rose-950/20 text-rose-400 p-2.5 rounded-lg border border-rose-900/40 font-mono">Sensus Sensor PAGE421 Menyatakan Akun Anda Belum Layak</div>
                <div className="flex gap-2">
                  <button onClick={() => { setActiveModal('upgrade'); }} className="flex-1 py-2 bg-gradient-to-r from-emerald-500 to-green-600 text-white rounded-xl text-xs font-black">Verifikasi Sekarang</button>
                  <button onClick={() => setActiveModal(null)} className="py-2 px-4 bg-[#151c2f] border border-[#23314f] text-slate-300 rounded-xl text-xs font-black">Tutup</button>
                </div>
              </div>
            </div>
          )}

          {activeModal === 'upgrade' && (
            <div className="fixed inset-0 bg-slate-950/80 backdrop-blur-sm z-50 flex items-center justify-center p-4">
              <div className="bg-[#0f1422] border border-[#1d263b] max-w-sm w-full rounded-2xl p-6 text-slate-100 space-y-4 shadow-2xl relative">
                <button onClick={() => { setActiveModal(null); setDepositInput(''); }} className="absolute top-4 right-4 text-slate-400">
                  <Icon name="x" className="w-5 h-5" />
                </button>
                <div className="text-center space-y-1.5">
                  <div className="text-3xl">💵</div>
                  <h3 className="text-sm font-black text-white uppercase tracking-wider">PENGISIAN SALDO AMAN</h3>
                  <p className="text-[10px] text-[#34d399] font-mono">Gateway Transaksi PAGE421</p>
                </div>

                <p className="text-xs text-slate-300 leading-normal text-center">
                  Ketikkan nominal saldo yang ingin Anda tambahkan ke Saldo Utama Anda. Saldo draf akan otomatis bertambah secara instan setelah dikonfirmasi secara aman.
                </p>

                <form onSubmit={handleDepositSubmit} className="space-y-3">
                  <div className="space-y-1 bg-[#101626] border border-[#1d2946] rounded-xl p-3 flex items-center justify-between font-mono text-xs">
                    <span className="text-[10px] font-bold text-slate-400">SALDO AKTIF SAAT INI</span>
                    <span className="text-xs font-bold text-[#34d399]">${balance.toFixed(3)}</span>
                  </div>

                  <div className="space-y-1">
                    <label className="text-[10px] font-mono font-bold text-slate-400 block">MASUKKAN NOMINAL TOP UP ($ USD)</label>
                    <input 
                      type="number"
                      step="0.001"
                      min="0.001"
                      required
                      value={depositInput}
                      onChange={(e) => setDepositInput(e.target.value)}
                      placeholder="Masukkan nominal, cth: 10.000"
                      className="w-full bg-[#101626] border border-[#1d2946] rounded-xl px-3.5 py-2.5 text-xs text-white focus:outline-none focus:border-indigo-500 font-mono"
                    />
                  </div>

                  <div className="flex gap-2 font-sans pt-2">
                    <button 
                      type="submit"
                      className="flex-1 bg-gradient-to-r from-emerald-500 to-green-600 text-white font-extrabold py-2.5 rounded-xl text-xs cursor-pointer hover:opacity-90 transition-opacity"
                    >
                      Proses Pengisian Saldo
                    </button>
                    <button 
                      type="button"
                      onClick={() => { setActiveModal(null); setDepositInput(''); }}
                      className="bg-[#151c2f] border border-[#23314f] text-slate-300 font-bold px-4 py-2.5 rounded-xl text-xs"
                    >
                      Batal
                    </button>
                  </div>
                </form>
              </div>
            </div>
          )}

          {activeModal === 'withdraw' && (
            <div className="fixed inset-0 bg-slate-950/80 backdrop-blur-sm z-50 flex items-center justify-center p-4">
              <div className="bg-[#0f1422] border border-[#1d263b] max-w-sm w-full rounded-2xl p-6 text-slate-100 space-y-4 shadow-2xl relative">
                <button onClick={() => setActiveModal(null)} className="absolute top-4 right-4 text-slate-400">
                  <Icon name="x" className="w-5 h-5" />
                </button>
                
                <div className="text-center space-y-1.5">
                  <div className="text-3xl">📤</div>
                  <h3 className="text-sm font-black text-white uppercase tracking-wider">PENARIKAN TUNAI SALDO</h3>
                  <p className="text-[10px] text-slate-400 font-mono">Pintu Gerbang Keluar Jaringan PAGE421</p>
                </div>

                <form onSubmit={handleWithdrawSubmit} className="space-y-4">
                  <div className="p-3 bg-[#131d33] border border-[#1e2d4d] rounded-xl flex justify-between items-center text-xs">
                    <span className="text-slate-400 font-mono">SALDO YANG DAPAT DITARIK:</span>
                    <span className="font-mono font-bold text-[#34d399]">${balance.toFixed(3)}</span>
                  </div>

                  <div className="space-y-1">
                    <label className="text-[10px] text-slate-400 font-bold block font-mono uppercase tracking-wider">NOMINAL PENARIKAN (USD)</label>
                    <input type="number" required step="0.001" min="0.001" value={withdrawInput} onChange={e => setWithdrawInput(e.target.value)} placeholder="0.000" className="w-full px-3.5 py-2.5 bg-slate-950 border border-[#1e2d4d] rounded-xl text-xs text-white" />
                  </div>

                  <button type="submit" className="w-full py-2.5 bg-gradient-to-r from-amber-500 to-yellow-600 text-white text-xs font-black rounded-xl">Proses Penarikan Dana Aman</button>
                </form>
              </div>
            </div>
          )}

          {activeModal === 'invite' && (
            <div className="fixed inset-0 bg-slate-950/80 backdrop-blur-sm z-50 flex items-center justify-center p-4">
              <div className="bg-[#0f1422] border border-[#1d263b] max-w-sm w-full rounded-2xl p-6 text-slate-100 space-y-4 shadow-2xl relative">
                <button onClick={() => setActiveModal(null)} className="absolute top-4 right-4 text-slate-400">
                  <Icon name="x" className="w-5 h-5" />
                </button>
                
                <div className="text-center space-y-1.5">
                  <div className="text-3xl">👥</div>
                  <h3 className="text-sm font-black text-white uppercase tracking-wider">RUJUKAN UNDANG KAWAN</h3>
                  <p className="text-[10px] text-slate-400 font-mono font-bold tracking-widest">PAGE421 NETWORK EXPANSION</p>
                </div>

                <form onSubmit={handleInviteSubmit} className="space-y-3">
                  <div className="space-y-1">
                    <input type="email" required value={inviteEmail} onChange={e => setInviteEmail(e.target.value)} placeholder="Alamat email kawan @gmail.com" className="w-full px-3.5 py-2.5 bg-slate-950 border border-[#1e2d4d] rounded-xl text-xs text-center text-white" />
                  </div>
                  <button type="submit" className="w-full py-2 bg-indigo-600 rounded-xl text-xs font-black">Kirim Undangan Sukses</button>
                </form>
              </div>
            </div>
          )}

          {activeModal === 'notifications' && (
            <div className="fixed inset-0 bg-slate-950/80 backdrop-blur-sm z-50 flex items-center justify-center p-4">
              <div className="bg-[#0f1422] border border-[#1d263b] max-w-sm w-full rounded-2xl p-6 text-slate-100 space-y-4 shadow-2xl relative">
                <button onClick={() => setActiveModal(null)} className="absolute top-4 right-4 text-zinc-400">
                  <Icon name="x" className="w-5 h-5" />
                </button>
                
                <h3 className="text-sm font-black text-white uppercase tracking-widest text-center border-b border-[#1b253b] pb-2">Notifikasi Sistem Enkripsi</h3>
                
                <div className="space-y-2 max-h-60 overflow-y-auto custom-scrollbar">
                  <div className="p-2.5 rounded-xl bg-slate-950 border border-slate-900 space-y-1 text-xs">
                    <p className="font-extrabold text-[#3b82f6]">Persyaratan Verifikasi Akun</p>
                    <p className="text-[11px] text-slate-400">Harap verifikasi akun Anda dengan mengumpulkan saldo minimal $10.00 untuk mengaktifkan fungsi penarikan utama.</p>
                  </div>
                  <div className="p-2.5 rounded-xl bg-slate-950 border border-slate-900 space-y-1 text-xs">
                    <p className="font-extrabold text-[#3b82f6]">Sambungan Aman PAGE421</p>
                    <p className="text-[11px] text-slate-400">Server pertukaran data internal terenkripsi TLS 1.3 Anda terhubung dengan latensi optimal.</p>
                  </div>
                </div>
              </div>
            </div>
          )}
        </div>
      );
    }


    // --- MAIN APP COMPONENT ---
    function App() {
      const [currentUser, setCurrentUser] = useState(null);
      const [activeScreen, setActiveScreen] = useState('login');
      const [justRegisteredEmail, setJustRegisteredEmail] = useState(null);

      useEffect(() => {
        const sessionStr = localStorage.getItem(LOGGED_IN_USER_KEY);
        if (sessionStr) {
          try {
            const parsed = JSON.parse(sessionStr);
            if (parsed) setCurrentUser(parsed);
          } catch (e) {}
        }
        // Seed database users inside browser if empty
        getStoredUsers();
      }, []);

      const handleLoginSuccess = (user) => {
        setCurrentUser(user);
        setJustRegisteredEmail(null);
      };

      const handleRegisterSuccess = (email) => {
        setJustRegisteredEmail(email);
        setActiveScreen('login');
      };

      const handleLogout = () => {
        localStorage.removeItem(LOGGED_IN_USER_KEY);
        setCurrentUser(null);
        setActiveScreen('login');
      };

      if (currentUser) {
        return <Dashboard user={currentUser} onLogout={handleLogout} />;
      }

      return (
        <div className="min-h-screen bg-slate-50 flex items-center justify-center p-4 sm:p-6 md:p-8 font-sans">
          <div className="w-full max-w-md bg-white rounded-3xl shadow-xl shadow-slate-100/70 border border-slate-100/60 overflow-hidden p-6 sm:p-8 md:p-10 relative">
            
            {/* Logo and Brand Heading */}
            <div className="flex flex-col items-center justify-center mb-6 text-center select-none">
              <div className="flex items-center gap-2">
                <div className="w-9 h-9 rounded-xl bg-indigo-600 text-white flex items-center justify-center font-extrabold font-mono text-sm shadow-md shadow-indigo-200">
                  P421
                </div>
                <span className="text-xs font-extrabold tracking-widest text-indigo-600 uppercase font-mono">Portal PAGE421</span>
              </div>
            </div>

            {justRegisteredEmail && (
              <div className="mb-6 p-4 bg-indigo-50 border border-indigo-100 rounded-2xl flex items-start gap-3 text-indigo-800 animate-fade-in">
                <Icon name="check-circle" className="w-5 h-5 text-indigo-600 shrink-0 mt-0.5" />
                <div className="space-y-1 text-xs">
                  <h4 className="font-extrabold">Registrasi Berhasil!</h4>
                  <p className="leading-relaxed font-sans text-slate-600">Selamat, akun email <span className="font-bold text-indigo-900">{justRegisteredEmail}</span> telah terdaftar secara sukses.</p>
                </div>
              </div>
            )}

            {activeScreen === 'login' && <LoginScreen onSuccess={handleLoginSuccess} onNavigate={setActiveScreen} />}
            {activeScreen === 'register' && <RegisterScreen onRegisterSuccess={handleRegisterSuccess} onBackToLogin={() => setActiveScreen('login')} />}
            {activeScreen === 'forgot' && <ForgotPasswordScreen onBackToLogin={() => setActiveScreen('login')} />}
          </div>
        </div>
      );
    }

    // Mount Component App inside Root
    const container = document.getElementById('root');
    const root = ReactDOM.createRoot(container);
    root.render(<App />);
  </script>
</body>
</html>
