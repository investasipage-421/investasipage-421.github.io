<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Page421 Quantum Investment</title>
    <!-- Frameworks -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://unpkg.com/framer-motion@10.16.4/dist/framer-motion.js"></script>
    <!-- Firebase Legacy SDK for simple HTML integration -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=JetBrains+Mono:wght@700&display=swap" rel="stylesheet">
    
    <style>
        * { font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background: #000; color: #fff; overflow-x: hidden; }
        .glass-card { background: rgba(17, 17, 17, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.05); }
        .custom-scrollbar::-webkit-scrollbar { width: 3px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #222; border-radius: 10px; }
        .cyan-glow { box-shadow: 0 0 20px rgba(6, 182, 212, 0.15); }
    </style>
</head>
<body class="selection:bg-cyan-500 selection:text-black">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;
        const { motion, AnimatePresence } = FramerMotion;

        // --- Firebase Config ---
        const firebaseConfig = {
            apiKey: "AIzaSyBMJzc3gMP4oLuzntjpjVCtEGry5eKFJAQ",
            authDomain: "page421-b9a6c.firebaseapp.com",
            databaseURL: "https://page421-b9a6c-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "page421-b9a6c"
        };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.database();

        // --- Icons Helper ---
        const Icon = ({ name, size = 20, className = "" }) => {
            const [svg, setSvg] = useState('');
            useEffect(() => {
                if (window.lucide) {
                    const icon = window.lucide.createIcons();
                }
            }, []);
            return <i data-lucide={name} style={{ width: size, height: size }} className={className}></i>
        };

        // --- Main App ---
        function App() {
            const [user, setUser] = useState(null);
            const [loading, setLoading] = useState(true);
            const [section, setSection] = useState('news');
            const [balance, setBalance] = useState(0);
            const [showChat, setShowChat] = useState(false);
            const [showAnnounce, setShowAnnounce] = useState(false);

            useEffect(() => {
                const unsub = auth.onAuthStateChanged(u => {
                    setUser(u);
                    setLoading(false);
                    if (u) {
                        setShowAnnounce(true);
                        listenData(u.uid);
                    }
                });
                return unsub;
            }, []);

            const [deposits, setDeposits] = useState([]);
            const [withdraws, setWithdraws] = useState([]);
            const [investHistory, setInvestHistory] = useState([]);
            const [profileImg, setProfileImg] = useState("https://i.imgur.com/8Km9tLL.png");

            const listenData = (uid) => {
                db.ref("topup").on("value", snap => {
                    let d = []; snap.forEach(c => { if(c.val().uid === uid) d.push({...c.val(), id: c.key}) });
                    setDeposits(d.reverse());
                });
                db.ref("penarikan").on("value", snap => {
                    let d = []; snap.forEach(c => { if(c.val().uid === uid) d.push({...c.val(), id: c.key}) });
                    setWithdraws(d.reverse());
                });
                db.ref("invest_history/" + uid).on("value", snap => {
                    let d = []; snap.forEach(c => d.push(c.val()));
                    setInvestHistory(d);
                });
                db.ref("users/" + uid + "/photo").on("value", snap => {
                    if(snap.val()) setProfileImg(snap.val());
                });
            };

            useEffect(() => {
                let cost = 0, profit = 0, now = Date.now();
                const totalDepo = deposits.filter(d => d.status === 'selesai').reduce((a, b) => a + Number(b.nominal), 0);
                const totalTarik = withdraws.filter(w => w.status === 'selesai').reduce((a, b) => a + (Number(b.nominal) + 2500), 0);
                investHistory.forEach(h => {
                    cost += 20000;
                    let diff = Math.floor((now - h.tanggalBeli) / 86400000);
                    profit += (Math.min(diff, 60) * 500);
                });
                setBalance(totalDepo - cost + profit - totalTarik);
            }, [deposits, withdraws, investHistory]);

            if (loading) return (
                <div className="h-screen w-full flex items-center justify-center bg-black">
                    <div className="w-10 h-10 border-2 border-cyan-500 border-t-transparent rounded-full animate-spin"></div>
                </div>
            );

            return (
                <div className="max-w-md mx-auto h-screen flex flex-col bg-black relative overflow-hidden shadow-2xl">
                    {!user ? <AuthScreen /> : (
                        <>
                            <Header user={user} balance={balance} photo={profileImg} />
                            <main className="flex-1 overflow-y-auto p-6 space-y-8 custom-scrollbar pb-24">
                                {section === 'news' && <NewsSection />}
                                {section === 'quiz' && <QuizSection />}
                                {section === 'invest' && <InvestSection user={user} balance={balance} history={investHistory} />}
                                {section === 'depo' && <DepoSection user={user} history={deposits} />}
                                {section === 'tarik' && <TarikSection user={user} balance={balance} history={withdraws} />}
                            </main>
                            <Navbar active={section} onChange={setSection} />
                            <ChatWidget isOpen={showChat} onToggle={() => setShowChat(!showChat)} user={user} />
                            {showAnnounce && <Announcement onClose={() => setShowAnnounce(false)} />}
                        </>
                    )}
                </div>
            );
        }

        // --- Sub Components ---
        function AuthScreen() {
            const [isReg, setIsReg] = useState(false);
            const [email, setEmail] = useState('');
            const [pass, setPass] = useState('');

            const handle = (e) => {
                e.preventDefault();
                if (isReg) {
                    auth.createUserWithEmailAndPassword(email, pass)
                        .then(() => { alert("Sukses! Silakan Login."); setIsReg(false); auth.signOut(); })
                        .catch(err => alert(err.message));
                } else {
                    auth.signInWithEmailAndPassword(email, pass).catch(err => alert(err.message));
                }
            };

            return (
                <motion.div initial={{ opacity: 0, y: 20 }} animate={{ opacity: 1, y: 0 }} className="p-10 flex flex-col items-center justify-center h-full gap-8">
                    <div className="text-center">
                        <h1 className="text-5xl font-black text-cyan-500 italic tracking-tighter">PAGE421</h1>
                        <p className="text-[10px] text-white/30 font-bold uppercase tracking-widest mt-2">Investasi Otomatis</p>
                    </div>
                    <form onSubmit={handle} className="w-full space-y-4">
                        <input type="email" placeholder="Email" className="w-full bg-neutral-900 border border-white/5 p-5 rounded-2xl outline-none focus:ring-1 ring-cyan-500" onChange={e => setEmail(e.target.value)} required />
                        <input type="password" placeholder="Kata Sandi" className="w-full bg-neutral-900 border border-white/5 p-5 rounded-2xl outline-none focus:ring-1 ring-cyan-500" onChange={e => setPass(e.target.value)} required />
                        <button type="submit" className="w-full bg-cyan-500 text-black font-black py-5 rounded-2xl uppercase tracking-widest text-xs">{isReg ? 'Daftar' : 'Masuk'}</button>
                    </form>
                    <p className="text-xs text-white/40">{isReg ? 'Sudah punya akun?' : 'Belum punya akun?'} <span className="text-cyan-400 font-bold cursor-pointer" onClick={() => setIsReg(!isReg)}>{isReg ? 'Login' : 'Daftar'}</span></p>
                </motion.div>
            )
        }

        function Header({ user, balance, photo }) {
            return (
                <header className="p-6 pt-10 flex justify-between items-center bg-black/80 backdrop-blur-xl border-b border-white/5 sticky top-0 z-40">
                    <div className="flex items-center gap-4">
                        <div className="w-14 h-14 rounded-2xl border-2 border-cyan-500/50 overflow-hidden bg-neutral-900">
                            <img src={photo} className="w-full h-full object-cover" />
                        </div>
                        <div>
                            <h2 className="text-2xl font-black text-white tracking-tight"><span className="text-cyan-500 font-mono text-lg">Rp</span> {balance.toLocaleString('id-ID')}</h2>
                            <p className="text-[10px] text-white/30 font-bold uppercase truncate max-w-[120px]">{user.email}</p>
                        </div>
                    </div>
                    <button onClick={() => auth.signOut()} className="p-3 bg-neutral-900 border border-white/5 rounded-2xl text-red-500 active:scale-90 transition-all">
                        <Icon name="log-out" size={18} />
                    </button>
                </header>
            )
        }

        function NewsSection() {
            return (
                <div className="space-y-8 animate-up">
                    <div className="relative bg-gradient-to-br from-cyan-500 to-blue-700 p-8 rounded-[32px] text-white overflow-hidden shadow-2xl">
                        <div className="relative z-10 space-y-4">
                            <span className="bg-black/20 px-3 py-1 rounded-full text-[9px] font-black uppercase tracking-widest">Sistem Aktif</span>
                            <h3 className="text-3xl font-black leading-none uppercase italic">Mulai Investasi,<br/>Raih Profit!</h3>
                            <p className="text-[10px] font-bold text-white/80 leading-relaxed max-w-[85%] uppercase">Dana anda bekerja otomatis setiap 24 jam dengan sistem Page421.</p>
                            <div className="p-3 bg-black/20 rounded-2xl border border-white/10">
                                <p className="text-[9px] font-bold underline truncate">https://chat.whatsapp.com/CYbrANKs7GZ8uzOwqw20MG</p>
                            </div>
                        </div>
                        <Icon name="trending-up" size={160} className="absolute -right-10 -bottom-10 opacity-10 -rotate-12" />
                    </div>
                    <div className="space-y-4">
                        <h4 className="text-xs font-black text-cyan-400 uppercase tracking-widest flex items-center gap-2"><Icon name="play-circle" size={16} /> Edukasi Page421</h4>
                        <div className="aspect-video rounded-[32px] overflow-hidden glass-card cyan-glow">
                            <video controls poster="https://images.unsplash.com/photo-1611974714652-960201dc8394?w=800" className="w-full h-full object-cover">
                                <source src="https://files.catbox.moe/ke70c6.mp4" type="video/mp4" />
                            </video>
                        </div>
                        <p className="text-[10px] text-white/40 italic text-center px-4 font-bold uppercase">Panduan Menggunakan Sistem Keuntungan Harian</p>
                    </div>
                </div>
            )
        }

        function QuizSection() {
            const mats = [
                { id: '01', t: "Pengenalan Platform", d: "Sistem pengelolaan aset digital otomatis.", i: "shield-check", c: "indigo" },
                { id: '02', t: "Protokol Deposit", d: "Minimal saldo mengendap Rp 50.000.", i: "wallet", c: "amber" },
                { id: '03', t: "Sistem Penarikan", d: "Verifikasi blockchain internal instan.", i: "arrow-up-right", c: "rose" }
            ];
            return (
                <div className="space-y-6">
                    <h3 className="text-xl font-black uppercase tracking-tighter flex items-center gap-3"><span className="w-1.5 h-6 bg-indigo-500 rounded-full" />Materi Dasar</h3>
                    {mats.map(m => (
                        <div key={m.id} className="glass-card p-6 rounded-[28px] border-white/5 relative overflow-hidden group">
                           <div className="flex gap-5 items-start">
                                <div className={`w-12 h-12 bg-${m.c}-500/10 rounded-2xl flex items-center justify-center text-${m.c}-400 shrink-0`}><Icon name={m.i} /></div>
                                <div className="space-y-1">
                                    <p className="text-[9px] font-black text-white/30 uppercase">Modul {m.id}</p>
                                    <h4 className="text-lg font-extrabold text-white">{m.t}</h4>
                                    <p className="text-xs text-white/50">{m.d}</p>
                                </div>
                           </div>
                        </div>
                    ))}
                </div>
            )
        }

        function InvestSection({ user, balance, history }) {
            const active = history.find(h => (Date.now() - h.tanggalBeli) < (60 * 86400000));
            const diff = active ? Math.floor((Date.now() - active.tanggalBeli) / 86400000) : 0;
            const buy = () => {
                if(balance < 20000) return alert("Saldo tidak cukup!");
                if(confirm("Gunakan Rp 20.000 untuk aktifkan Paket Premium A?")) {
                    db.ref("invest_history/" + user.uid).push({ tanggalBeli: Date.now() });
                }
            };
            return (
                <div className="glass-card rounded-[40px] p-8 border-emerald-500/20 relative overflow-hidden">
                    <div className="relative z-10 flex flex-col gap-8">
                        <div className="flex justify-between items-start">
                            <div className="space-y-1">
                                <span className="text-[9px] font-black text-emerald-400 tracking-[0.4em] uppercase">Node Premium A</span>
                                <h3 className="text-3xl font-black text-white italic tracking-tighter leading-none">Investasi<br/>Otomatis</h3>
                            </div>
                            {active && <span className="bg-emerald-500 text-black text-[9px] font-black px-4 py-2 rounded-2xl uppercase tracking-widest animate-pulse">Aktif</span>}
                        </div>
                        <div className="grid grid-cols-2 gap-4">
                            <div className="bg-white/5 p-5 rounded-3xl border border-white/5"><p className="text-[9px] text-white/40 font-black uppercase mb-1">Harga Paket</p><p className="text-xl font-bold font-mono">Rp 20k</p></div>
                            <div className="bg-emerald-500/5 p-5 rounded-3xl border border-emerald-500/10"><p className="text-[9px] text-emerald-400 font-black uppercase mb-1">Profit Harian</p><p className="text-xl font-bold font-mono text-emerald-400">Rp 500</p></div>
                        </div>
                        {active ? (
                            <div className="bg-emerald-500/10 p-5 rounded-[28px] border border-emerald-500/20 text-center"><p className="text-[11px] font-black font-mono text-emerald-400 uppercase tracking-widest">Sisa Masa Aktif: {60-diff} Hari</p></div>
                        ) : (
                            <button onClick={buy} className="w-full bg-white text-black font-black py-5 rounded-[28px] uppercase tracking-widest shadow-2xl active:scale-95 transition-all">Aktifkan Paket</button>
                        )}
                        <p className="text-[9px] text-white/30 italic text-center font-bold tracking-widest uppercase">Masa Aktif Paket 60 Hari</p>
                    </div>
                    <Icon name="trending-up" size={160} className="absolute -right-12 -bottom-12 opacity-5 -rotate-12" />
                </div>
            )
        }

        function DepoSection({ user, history }) {
            const req = () => {
                db.ref("topup").push({ uid: user.uid, email: user.email, nominal: 50000, status: "pending", timestamp: Date.now() });
                alert("Request deposit terkirim! Silakan lapor admin.");
            };
            return (
                <div className="space-y-8">
                    <div className="bg-gradient-to-br from-amber-400 to-orange-600 rounded-[40px] p-10 text-black text-center shadow-2xl relative overflow-hidden">
                        <div className="relative z-10 flex flex-col items-center gap-2">
                            <p className="text-[10px] font-black opacity-40 uppercase tracking-[0.5em] mb-2">Likuiditas Node</p>
                            <h1 className="text-6xl font-black italic">50k</h1>
                            <p className="text-[10px] font-bold opacity-70 uppercase tracking-widest mt-2 px-8">Minimal deposit tetap Rp 50.000</p>
                            <button onClick={req} className="w-full bg-black text-amber-500 font-black py-5 rounded-[28px] mt-8 active:scale-95 uppercase text-xs tracking-widest">Request Deposit</button>
                        </div>
                        <Icon name="wallet" size={200} className="absolute -left-16 -bottom-16 opacity-10 rotate-12" />
                    </div>
                    <div className="space-y-4">
                        <h4 className="text-[10px] font-black text-white/30 uppercase tracking-[0.4em] px-2 flex items-center gap-2"><Icon name="clock" size={14} /> Riwayat Terakhir</h4>
                        {history.map((h, i) => (
                            <div key={i} className="glass-card p-6 rounded-[28px] flex justify-between items-center group border-white/5">
                                <div className="flex items-center gap-4">
                                    <div className={`w-10 h-10 rounded-xl flex items-center justify-center ${h.status === 'selesai' ? 'bg-amber-500/10 text-amber-500' : 'bg-white/5 text-white/20'}`}><Icon name="plus" /></div>
                                    <div className="flex flex-col"><p className="text-md font-bold font-mono">Rp {Number(h.nominal).toLocaleString()}</p><p className="text-[9px] text-white/30 font-bold uppercase mt-1">{new Date(h.timestamp).toLocaleDateString()}</p></div>
                                </div>
                                <span className={`text-[9px] font-black px-4 py-2 rounded-2xl uppercase ${h.status === 'selesai' ? 'bg-amber-500/20 text-amber-500 border border-amber-500/30' : 'bg-neutral-900 text-white/20'}`}>{h.status}</span>
                            </div>
                        ))}
                    </div>
                </div>
            )
        }

        function TarikSection({ user, balance, history }) {
            const [val, setVal] = useState('50.000');
            const req = () => {
                const raw = Number(val.replace(/\./g, ''));
                if(raw < 50000) return alert("Minimal penarikan Rp 50.000!");
                if(balance < (raw + 2500)) return alert("Saldo tidak cukup termasuk biaya admin.");
                if(confirm(`Tarik Rp ${raw.toLocaleString()} \nBiaya Admin: Rp 2.500?`)) {
                    db.ref("penarikan").push({ uid: user.uid, email: user.email, nominal: raw, biaya_admin: 2500, status: "pending", timestamp: Date.now() });
                    alert("Permintaan penarikan diproses!");
                }
            };
            return (
                <div className="space-y-8">
                    <div className="glass-card rounded-[40px] p-10 border-rose-500/20 relative overflow-hidden flex flex-col items-center">
                        <p className="text-[10px] font-black text-white/30 uppercase tracking-[0.5em] mb-4 italic">Ekstraksi Saldo</p>
                        <div className="flex items-center gap-3 mb-6">
                            <span className="text-2xl font-black text-rose-500 italic">Rp</span>
                            <input type="text" value={val} className="bg-transparent text-6xl font-black text-white outline-none w-full text-center" onChange={e => setVal(e.target.value.replace(/[^0-9]/g, '').replace(/\B(?=(\d{3})+(?!\d))/g, "."))} />
                        </div>
                        <div className="bg-black/30 p-4 rounded-3xl border border-white/5 w-full text-center space-y-1 mb-8">
                            <p className="text-[10px] text-rose-400 font-black uppercase tracking-widest">Biaya Protokol: Rp 2.500</p>
                            <p className="text-[9px] text-white/30 font-bold uppercase">Tersedia: Rp {balance.toLocaleString()}</p>
                        </div>
                        <button onClick={req} className="w-full bg-rose-600 text-white font-black py-5 rounded-[28px] uppercase tracking-widest text-xs shadow-2xl active:scale-95">Tarik Sekarang</button>
                        <Icon name="arrow-up-right" size={200} className="absolute -right-20 -bottom-20 opacity-5 rotate-12" />
                    </div>
                </div>
            )
        }

        function Navbar({ active, onChange }) {
            const items = [
                { id: 'news', l: "Berita", i: "layout-dashboard", c: "cyan" },
                { id: 'quiz', l: "Materi", i: "book-open", c: "indigo" },
                { id: 'invest', l: "Invest", i: "trending-up", c: "emerald" },
                { id: 'depo', l: "Depo", i: "wallet", c: "amber" },
                { id: 'tarik', l: "Tarik", i: "arrow-up-right", c: "rose" }
            ];
            const colors = { cyan: 'cyan-400', indigo: 'indigo-400', emerald: 'emerald-400', amber: 'amber-400', rose: 'rose-400' };
            return (
                <nav className="fixed bottom-0 left-0 right-0 max-w-md mx-auto bg-black/90 backdrop-blur-2xl border-t border-white/10 px-4 py-4 flex justify-between items-center rounded-t-[32px] z-50">
                    {items.map(it => (
                        <button key={it.id} onClick={() => onChange(it.id)} className={`flex flex-col items-center gap-1.5 flex-1 ${active === it.id ? 'text-' + colors[it.c] : 'text-white/20'}`}>
                            <div className={`p-3 rounded-2xl relative ${active === it.id ? 'bg-' + it.c + '-500/10' : ''}`}><Icon name={it.i} size={22} /></div>
                            <span className="text-[8px] font-black uppercase tracking-widest">{it.l}</span>
                        </button>
                    ))}
                </nav>
            )
        }

        function ChatWidget({ isOpen, onToggle, user }) {
            const [msg, setMsg] = useState('');
            const [chats, setChats] = useState([]);
            const scroll = useRef(null);

            useEffect(() => {
                if(!isOpen) return;
                const unsub = db.ref("global_chats").limitToLast(20).on("value", snap => {
                    let d = []; snap.forEach(c => d.push({...c.val(), id: c.key}));
                    setChats(d);
                    setTimeout(() => scroll.current?.scrollTo(0, scroll.current.scrollHeight), 100);
                });
                return () => db.ref("global_chats").off("value", unsub);
            }, [isOpen]);

            const send = () => {
                if(!msg.trim()) return;
                db.ref("global_chats").push({ m: msg.trim(), t: Date.now(), uid: user.uid });
                setMsg('');
            };

            return (
                <>
                    <button onClick={onToggle} className="fixed bottom-28 right-6 w-16 h-16 bg-cyan-500 rounded-[24px] flex items-center justify-center shadow-2xl border-4 border-black z-40 active:scale-90 transition-all">
                        <Icon name="message-square" className="text-black" size={24} />
                    </button>
                    <AnimatePresence>
                        {isOpen && (
                            <motion.div initial={{ opacity: 0, scale: 0.9, y: 100 }} animate={{ opacity: 1, scale: 1, y: 0 }} exit={{ opacity: 0, scale: 0.9, y: 100 }} className="fixed inset-0 z-[60] p-6 pb-24 md:p-12 flex flex-col items-center justify-center bg-black/60 backdrop-blur-sm">
                                <div className="w-full max-w-md h-[70vh] glass-card rounded-[40px] flex flex-col border-cyan-500/20 shadow-[0_0_50px_rgba(0,0,0,0.8)]">
                                    <div className="p-6 flex justify-between items-center bg-neutral-900/80 rounded-t-[40px] border-b border-white/5">
                                        <div className="flex items-center gap-3"><div className="w-2 h-2 bg-cyan-500 rounded-full animate-pulse" /><h4 className="text-[10px] font-black uppercase text-cyan-500 tracking-[0.3em]">Global Chat</h4></div>
                                        <button onClick={onToggle} className="text-white/20 hover:text-white"><Icon name="x" size={24} /></button>
                                    </div>
                                    <div ref={scroll} className="flex-1 overflow-y-auto p-6 space-y-6 bg-black/40 custom-scrollbar">
                                        {chats.map(c => (
                                            <div key={c.id} className={`flex flex-col ${c.uid === user.uid ? 'items-end' : 'items-start'} gap-1.5`}>
                                                <div className={`max-w-[85%] p-4 text-[12px] font-medium leading-relaxed ${c.uid === user.uid ? 'bg-cyan-500 text-black rounded-l-2xl rounded-tr-2xl' : 'bg-neutral-800 text-white rounded-r-2xl rounded-tl-2xl'}`}>{c.m}</div>
                                                <span className="text-[8px] text-white/20 font-bold px-2">{new Date(c.t).toLocaleTimeString()}</span>
                                            </div>
                                        ))}
                                    </div>
                                    <div className="p-4 bg-neutral-900/80 flex gap-2 rounded-b-[40px] border-t border-white/5">
                                        <input type="text" value={msg} className="flex-1 bg-black text-xs p-5 rounded-2xl outline-none focus:ring-1 ring-cyan-500" placeholder="Ketik pesan..." onChange={e => setMsg(e.target.value)} onKeyDown={e => e.key === 'Enter' && send()} />
                                        <button onClick={send} className="bg-cyan-500 text-black p-5 rounded-2xl active:scale-90 transition-all"><Icon name="send" /></button>
                                    </div>
                                </div>
                            </motion.div>
                        )}
                    </AnimatePresence>
                </>
            )
        }

        function Announcement({ onClose }) {
            return (
                <div className="fixed inset-0 bg-black/90 z-[100] flex items-center justify-center p-8 backdrop-blur-md">
                    <motion.div initial={{ scale: 0.9, y: 20 }} animate={{ scale: 1, y: 0 }} className="glass-card border-2 border-cyan-500/30 rounded-[32px] p-8 max-w-xs w-full text-center flex flex-col items-center gap-6">
                        <div className="w-16 h-16 bg-cyan-500 rounded-2xl flex items-center justify-center rotate-12 shadow-2xl shadow-cyan-500/20"><Icon name="trending-up" className="text-black" size={32} /></div>
                        <div className="space-y-2">
                            <h2 className="text-2xl font-black text-white italic">Selamat Datang!</h2>
                            <p className="text-white/40 text-[10px] font-bold uppercase leading-relaxed tracking-widest">Sistem Page421 Aktif. Pantau Profit Anda Sekarang.</p>
                        </div>
                        <button onClick={onClose} className="w-full bg-cyan-500 text-black font-black py-5 rounded-2xl uppercase tracking-widest text-[10px] shadow-lg active:scale-95">Mulai Sekarang</button>
                    </motion.div>
                </div>
            )
        }

        // --- Render ---
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
