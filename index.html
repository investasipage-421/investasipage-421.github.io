<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ayam Terbang</title>
<style>
  :root{
    --bg-deep:#08020f;
    --bg-mid:#160a30;
    --bg-glow:#3d1f6e;
    --neb-violet:#6d28d9;
    --neb-teal:#0891b2;
    --neb-rose:#be185d;
    --feather:#fff6e0;
    --feather-shade:#ffd76b;
    --wing1:#ffcf5c;
    --wing2:#e8821c;
    --comb:#ff5d7a;
    --cyan:#7be8f0;
    --lav:#cbb6ff;
  }
  *{ box-sizing:border-box; margin:0; padding:0; }
  html,body{ height:100%; overflow:hidden; }
  body{ font-family:system-ui, sans-serif; }

  /* ===== LATAR (bagian yang dipasang di web Anda) ===== */
  .scene{
    position:fixed; inset:0; overflow:hidden; z-index:-1;
    background:
      radial-gradient(ellipse at 50% 25%, var(--bg-glow), transparent 60%),
      linear-gradient(180deg, var(--bg-deep), var(--bg-mid) 55%, var(--bg-deep));
  }

  /* nebula lembut */
  .neb{ position:absolute; border-radius:50%; filter:blur(70px); opacity:.28; mix-blend-mode:screen; }
  .n1{ width:46vw; height:46vw; top:-12%; left:-10%; background:radial-gradient(circle, var(--neb-violet), transparent 70%); animation:drift1 34s ease-in-out infinite alternate; }
  .n2{ width:38vw; height:38vw; bottom:-14%; right:-8%; background:radial-gradient(circle, var(--neb-teal), transparent 70%); animation:drift2 40s ease-in-out infinite alternate; }
  .n3{ width:30vw; height:30vw; top:35%; right:10%; background:radial-gradient(circle, var(--neb-rose), transparent 70%); opacity:.18; animation:drift3 30s ease-in-out infinite alternate; }
  @keyframes drift1{ from{ transform:translate(0,0); } to{ transform:translate(6vw,5vh); } }
  @keyframes drift2{ from{ transform:translate(0,0); } to{ transform:translate(-5vw,-6vh); } }
  @keyframes drift3{ from{ transform:translate(0,0) scale(1); } to{ transform:translate(-4vw,4vh) scale(1.15); } }

  .stars, .stars2{ position:absolute; inset:0; pointer-events:none; }
  .stars{
    background-image:
      radial-gradient(1.5px 1.5px at 10% 20%, #fff, transparent),
      radial-gradient(1.5px 1.5px at 80% 10%, #fff, transparent),
      radial-gradient(1px 1px at 60% 70%, #fff, transparent),
      radial-gradient(1.5px 1.5px at 30% 80%, #fff, transparent),
      radial-gradient(1px 1px at 90% 60%, #fff, transparent),
      radial-gradient(1.5px 1.5px at 45% 35%, #fff, transparent),
      radial-gradient(1px 1px at 15% 55%, #fff, transparent),
      radial-gradient(1.5px 1.5px at 70% 90%, #fff, transparent);
    opacity:.55; animation: twinkleField 6s ease-in-out infinite;
  }
  .stars2{
    background-image:
      radial-gradient(1px 1px at 25% 15%, var(--lav), transparent),
      radial-gradient(1px 1px at 55% 50%, var(--lav), transparent),
      radial-gradient(1px 1px at 85% 35%, var(--lav), transparent),
      radial-gradient(1px 1px at 5% 75%, var(--lav), transparent),
      radial-gradient(1px 1px at 65% 85%, var(--lav), transparent);
    opacity:.4; animation: twinkleField 8s ease-in-out infinite reverse;
  }
  @keyframes twinkleField{ 0%,100%{opacity:.3;} 50%{opacity:.65;} }

  .moon{
    position:absolute; top:10%; left:10%;
    width:64px; height:64px; border-radius:50%;
    background:radial-gradient(circle at 38% 35%, #fffdf2, #ffe9b0 55%, #f6cf7e 80%);
    box-shadow:0 0 50px 18px rgba(255,233,176,.35), 0 0 90px 30px rgba(255,233,176,.15);
  }
  .moon::before, .moon::after{
    content:""; position:absolute; border-radius:50%;
    background:rgba(180,140,70,.18);
  }
  .moon::before{ width:14px; height:14px; top:14px; left:30px; }
  .moon::after{ width:9px; height:9px; top:36px; left:14px; }

  .shoot{
    position:absolute; top:16%; left:55%;
    width:90px; height:2px;
    background:linear-gradient(90deg, transparent, #fff, transparent);
    transform:rotate(28deg);
    opacity:0;
    animation: shoot 9s ease-in infinite;
  }
  .shoot.s2{ top:42%; left:5%; width:60px; animation-duration:13s; animation-delay:3.4s; }
  @keyframes shoot{
    0%, 88%{ opacity:0; transform:translate(0,0) rotate(28deg); }
    90%{ opacity:1; }
    97%{ opacity:0; transform:translate(140px,80px) rotate(28deg); }
    100%{ opacity:0; transform:translate(0,0) rotate(28deg); }
  }

  .sparkle{
    position:absolute; color:#fff; pointer-events:none;
    animation: twinkle linear infinite; text-shadow:0 0 6px currentColor;
  }
  @keyframes twinkle{ 0%,100%{ opacity:0; transform:scale(.4) rotate(0deg); } 50%{ opacity:1; transform:scale(1) rotate(180deg); } }

  /* ===== ayam terbang ===== */
  .chicken-path{ position:absolute; top:42%; animation:flyAcross 13s ease-in-out infinite; }
  .chicken-bob{ position:relative; animation:bob 1.3s ease-in-out infinite; }
  .aura{
    position:absolute; width:170px; height:140px; left:-30px; top:-25px;
    background:radial-gradient(ellipse, rgba(255,215,107,.4), rgba(167,139,250,.18) 50%, transparent 75%);
    filter:blur(16px);
    animation: auraPulse 1.3s ease-in-out infinite;
  }
  .chicken{ position:relative; width:104px; height:90px;
    filter:
      drop-shadow(0 0 10px rgba(255,215,107,.7))
      drop-shadow(0 0 26px rgba(167,139,250,.4));
  }
  @keyframes flyAcross{ from{ transform:translateX(-160px); } to{ transform:translateX(calc(100vw + 160px)); } }
  @keyframes bob{ 0%,100%{ transform:translateY(0) rotate(-3deg); } 50%{ transform:translateY(-18px) rotate(3deg); } }
  @keyframes auraPulse{ 0%,100%{ opacity:.7; transform:scale(1); } 50%{ opacity:1; transform:scale(1.12); } }

  /* ayam kedua: terbang menyilang dari kiri-bawah jauh naik ke kanan-atas, bersamaan dengan yang pertama */
  .diag-path{ position:absolute; left:-14%; top:80%; animation: flyDiagonal 13s ease-in-out infinite; }
  @keyframes flyDiagonal{
    0%{ transform:translate(0,0) rotate(-20deg) scale(.5); opacity:0; }
    8%{ opacity:.85; }
    50%{ transform:translate(60vw,-48vh) rotate(-20deg) scale(.68); opacity:.85; }
    92%{ opacity:.85; }
    100%{ transform:translate(128vw,-100vh) rotate(-20deg) scale(.8); opacity:0; }
  }

  .c-feather{ position:absolute; left:-10px; top:24px; width:30px; height:9px; border-radius:50% 50% 50% 0;
    transform-origin:100% 50%; opacity:.95; }
  .c-feather.f1{ background:linear-gradient(90deg, var(--wing2), transparent); transform:rotate(-22deg); animation:flutter 1.1s ease-in-out infinite; }
  .c-feather.f2{ width:34px; top:32px; left:-12px; background:linear-gradient(90deg, var(--wing1), transparent); transform:rotate(-6deg); animation:flutter 1.1s ease-in-out infinite .1s; }
  .c-feather.f3{ width:26px; top:40px; left:-8px; background:linear-gradient(90deg, var(--comb), transparent); opacity:.6; transform:rotate(10deg); animation:flutter 1.1s ease-in-out infinite .2s; }
  @keyframes flutter{ 0%,100%{ transform:rotate(var(--r,-6deg)); } 50%{ transform:rotate(calc(var(--r,-6deg) - 8deg)); } }

  .c-body{ position:absolute; left:14px; top:24px; width:64px; height:46px;
    background:radial-gradient(circle at 32% 28%, var(--feather), var(--feather-shade) 78%);
    border-radius:55% 50% 50% 55% / 60% 60% 50% 50%;
    box-shadow:inset -6px -4px 8px rgba(0,0,0,.12); }
  .c-body::after{ content:""; position:absolute; width:18px; height:12px; top:8px; left:8px;
    background:rgba(255,255,255,.55); border-radius:50%; filter:blur(3px); }

  .c-wing{ position:absolute; left:28px; top:14px; width:50px; height:34px;
    background:linear-gradient(155deg, var(--wing1), var(--wing2) 70%);
    clip-path: polygon(8% 38%, 2% 12%, 30% 0%, 58% 8%, 100% 14%, 80% 36%, 96% 56%, 58% 50%, 34% 68%, 14% 56%);
    transform-origin:8% 25%; animation:flap .34s ease-in-out infinite alternate;
    box-shadow:0 2px 6px rgba(0,0,0,.2); }
  @keyframes flap{ from{ transform:rotate(-4deg) scaleY(1); } to{ transform:rotate(-50deg) scaleY(.92); } }

  .c-head{ position:absolute; left:64px; top:6px; width:32px; height:30px;
    background:radial-gradient(circle at 35% 28%, var(--feather), var(--feather-shade) 78%);
    border-radius:50%; }
  .c-eye{ position:absolute; left:78px; top:14px; width:4px; height:4px; background:#2b2b2b; border-radius:50%; box-shadow:0 0 2px #fff; }
  .c-beak{ position:absolute; left:92px; top:18px; width:0; height:0;
    border-top:5px solid transparent; border-bottom:5px solid transparent; border-left:12px solid var(--wing1); }
  .c-wattle{ position:absolute; left:86px; top:24px; width:6px; height:8px; background:var(--comb); border-radius:50% 50% 50% 0; }
  .c-comb{ position:absolute; left:68px; top:-6px; width:22px; height:12px; }
  .c-comb span{ position:absolute; width:8px; height:8px; background:var(--comb); border-radius:50%; bottom:0; box-shadow:0 0 5px rgba(255,93,122,.7); }
  .c-comb span:nth-child(1){ left:0; height:6px; }
  .c-comb span:nth-child(2){ left:7px; height:10px; }
  .c-comb span:nth-child(3){ left:14px; height:6px; }
  .c-leg{ position:absolute; left:36px; top:62px; width:2px; height:14px; background:var(--wing1); transform:rotate(15deg); }
  .c-leg2{ position:absolute; left:46px; top:62px; width:2px; height:14px; background:var(--wing1); transform:rotate(-10deg); }

  .trail{ position:absolute; color:var(--cyan); pointer-events:none;
    animation: trailFade 1s ease-out infinite; text-shadow:0 0 6px currentColor; }
  .trail.t1{ left:4px; top:34px; font-size:11px; }
  .trail.t2{ left:-8px; top:44px; font-size:8px; color:var(--lav); animation-delay:.25s; }
  .trail.t3{ left:-18px; top:38px; font-size:6px; color:#fff; animation-delay:.5s; }
  @keyframes trailFade{ 0%{ opacity:.9; transform:translateX(0) scale(1);} 100%{ opacity:0; transform:translateX(-34px) scale(.2);} }

  .vignette{ position:absolute; inset:0; background:radial-gradient(ellipse at center, transparent 45%, rgba(0,0,0,.5) 100%); }

  @media (prefers-reduced-motion: reduce){
    .chicken-path, .chicken-bob, .c-wing, .c-feather, .aura, .sparkle, .trail, .stars, .stars2, .neb, .shoot{ animation:none !important; }
  }
  /* ===== akhir bagian latar ===== */

  .preview{ position:relative; z-index:1; height:100vh; display:flex; align-items:center; justify-content:center;
    text-align:center; color:#f5f3ff; padding:1.5rem; }
  .preview h1{ font-size:clamp(1.4rem,5vw,2.2rem); font-weight:600; }
  .preview p{ margin-top:.5rem; color:#c9c3e0; font-size:.9rem; max-width:32ch; }
</style>
</head>
<body>

  <div class="scene">
    <div class="neb n1"></div>
    <div class="neb n2"></div>
    <div class="neb n3"></div>
    <div class="stars"></div>
    <div class="stars2"></div>
    <div class="moon"></div>
    <div class="shoot"></div>
    <div class="shoot s2"></div>

    <span class="sparkle" style="top:18%; left:28%; font-size:14px; animation-duration:2.6s; animation-delay:.2s;">✦</span>
    <span class="sparkle" style="top:30%; left:68%; font-size:10px; color:#7be8f0; animation-duration:3.2s; animation-delay:.8s;">✧</span>
    <span class="sparkle" style="top:62%; left:22%; font-size:12px; color:#cbb6ff; animation-duration:2.8s; animation-delay:1.3s;">✦</span>
    <span class="sparkle" style="top:74%; left:78%; font-size:16px; animation-duration:3.6s; animation-delay:.5s;">✧</span>
    <span class="sparkle" style="top:12%; left:50%; font-size:9px; color:#cbb6ff; animation-duration:2.4s; animation-delay:1.6s;">⋆</span>
    <span class="sparkle" style="top:55%; left:88%; font-size:13px; animation-duration:2.9s; animation-delay:1.1s;">✧</span>
    <span class="sparkle" style="top:84%; left:42%; font-size:10px; color:#cbb6ff; animation-duration:3.4s; animation-delay:.7s;">⋆</span>

    <div class="chicken-path"><div class="chicken-bob">
      <div class="aura"></div>
      <div class="chicken">
        <span class="trail t1">✦</span><span class="trail t2">✧</span><span class="trail t3">⋆</span>
        <div class="c-feather f1"></div><div class="c-feather f2"></div><div class="c-feather f3"></div>
        <div class="c-body"></div><div class="c-wing"></div>
        <div class="c-head"></div><div class="c-comb"><span></span><span></span><span></span></div>
        <div class="c-eye"></div><div class="c-wattle"></div><div class="c-beak"></div>
        <div class="c-leg"></div><div class="c-leg2"></div>
      </div>
    </div></div>

    <div class="vignette"></div>
  </div>

  <div class="preview">
    <div>
      <h1>404</h1>
      <p>Mohon maaf wed sedang dalam perbaikan terimakasi 🙏 
        pesan dari orbitxy.com</p>
    </div>
  </div>

</body>
</html>
