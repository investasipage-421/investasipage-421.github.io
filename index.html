<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Masuk Orbit</title>
<style>
  :root {
    --ink: #3F3F3F;
    --muted: #818181;
    --border: #E1E1E1;
    --field-bg: #F6F6F6;
    --accent: #316FEA;
    --cta: #FFC508;
    --cta-shadow: #C99B06;
    --orbit-1: #5B6CFF;
    --orbit-2: #FF8A3D;
  }

  * { box-sizing: border-box; }

  body {
    margin: 0;
    font-family: 'Nunito', system-ui, -apple-system, sans-serif;
    background: #ffffff;
    color: var(--ink);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 64px 16px 140px;
  }

  .wrap {
    width: 100%;
    max-width: 420px;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  /* Original mascot: a simple orbiting-dot mark, not affiliated with any third party */
  .mark {
    width: 64px;
    height: 64px;
    margin-bottom: 18px;
    position: relative;
    animation: float 3s ease-in-out infinite;
  }
  @keyframes float {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-6px); }
  }
  .mark svg { width: 100%; height: 100%; display: block; }

  h1 {
    font-size: 26px;
    font-weight: 800;
    margin: 0 0 8px;
    text-align: center;
  }

  .signup-line {
    font-size: 14px;
    color: var(--muted);
    margin-bottom: 28px;
  }
  .signup-line a {
    color: var(--accent);
    font-weight: 700;
    text-decoration: none;
  }
  .signup-line a:hover { text-decoration: underline; }

  form {
    width: 100%;
    display: flex;
    flex-direction: column;
    gap: 16px;
  }

  .google-btn {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 12px;
    width: 100%;
    background: #fff;
    border: 2px solid var(--border);
    border-radius: 12px;
    box-shadow: 0 5px 0 var(--border);
    padding: 13px;
    font-weight: 800;
    font-size: 15px;
    color: var(--ink);
    cursor: pointer;
    transition: all 0.15s ease;
  }
  .google-btn:hover { background: #fafafa; }
  .google-btn:active {
    box-shadow: none;
    transform: translateY(5px);
  }

  .divider {
    display: flex;
    align-items: center;
    gap: 16px;
    color: #b5b5b5;
    font-size: 13px;
    margin: 4px 0;
  }
  .divider::before, .divider::after {
    content: '';
    flex: 1;
    height: 1px;
    background: #e3e3e3;
  }

  input[type="email"],
  input[type="password"],
  input[type="text"] {
    width: 100%;
    border: 2px solid var(--border);
    background: var(--field-bg);
    border-radius: 12px;
    padding: 14px 16px;
    font-size: 15px;
    color: var(--ink);
    outline: none;
    transition: border-color 0.15s ease;
  }
  input::placeholder { color: var(--muted); }
  input:focus { border-color: var(--accent); }

  .pw-field { position: relative; }
  .pw-field input { padding-right: 48px; }
  .pw-toggle {
    position: absolute;
    right: 14px;
    top: 50%;
    transform: translateY(-50%);
    background: none;
    border: none;
    color: var(--accent);
    cursor: pointer;
    font-size: 18px;
    line-height: 1;
    padding: 4px;
  }

  .forgot {
    text-align: right;
    font-size: 13px;
  }
  .forgot a {
    color: var(--accent);
    font-weight: 700;
    text-decoration: none;
  }
  .forgot a:hover { text-decoration: underline; }

  .bottom-bar {
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    background: #fff;
    border-top: 4px solid #D8D8D8;
    padding: 16px;
    display: flex;
    justify-content: center;
  }
  .bottom-bar-inner { width: 100%; max-width: 420px; }

  .submit-btn {
    width: 100%;
    background: var(--cta);
    border: 2px solid var(--cta-shadow);
    box-shadow: 0 5px 0 var(--cta-shadow);
    border-radius: 12px;
    padding: 14px;
    color: #fff;
    font-weight: 800;
    font-size: 15px;
    letter-spacing: 0.03em;
    text-transform: uppercase;
    cursor: pointer;
    transition: all 0.15s ease;
  }
  .submit-btn:active {
    box-shadow: none;
    transform: translateY(5px);
  }
  .submit-btn:disabled {
    opacity: 0.7;
    cursor: not-allowed;
  }
</style>
</head>
<body>

  <div class="wrap">
    <div class="mark">
      <svg viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
        <circle cx="32" cy="32" r="10" fill="var(--orbit-2)"/>
        <ellipse cx="32" cy="32" rx="28" ry="12" stroke="var(--orbit-1)" stroke-width="3" fill="none" transform="rotate(-20 32 32)"/>
        <circle cx="9" cy="22" r="4" fill="var(--orbit-1)" transform="rotate(-20 32 32)"/>
      </svg>
    </div>

    <h1>Masuk Orbit</h1>
    <div class="signup-line">Belum punya akun? <a href="#">Daftar akun</a></div>

    <form onsubmit="return false;">
      <button type="button" class="google-btn">
        <svg width="22" height="22" viewBox="0 0 48 48" xmlns="http://www.w3.org/2000/svg">
          <path fill="#FFC107" d="M43.611,20.083H42V20H24v8h11.303c-1.649,4.657-6.08,8-11.303,8c-6.627,0-12-5.373-12-12c0-6.627,5.373-12,12-12c3.059,0,5.842,1.154,7.961,3.039l5.657-5.657C34.046,6.053,29.268,4,24,4C12.955,4,4,12.955,4,24c0,11.045,8.955,20,20,20c11.045,0,20-8.955,20-20C44,22.659,43.862,21.35,43.611,20.083z"/>
          <path fill="#FF3D00" d="M6.306,14.691l6.571,4.819C14.655,15.108,18.961,12,24,12c3.059,0,5.842,1.154,7.961,3.039l5.657-5.657C34.046,6.053,29.268,4,24,4C16.318,4,9.656,8.337,6.306,14.691z"/>
          <path fill="#4CAF50" d="M24,44c5.166,0,9.86-1.977,13.409-5.192l-6.19-5.238C29.211,35.091,26.715,36,24,36c-5.202,0-9.619-3.317-11.283-7.946l-6.522,5.025C9.505,39.556,16.227,44,24,44z"/>
          <path fill="#1976D2" d="M43.611,20.083H42V20H24v8h11.303c-0.792,2.237-2.231,4.166-4.087,5.571c0.001-0.001,0.002-0.001,0.003-0.002l6.19,5.238C36.971,39.205,44,34,44,24C44,22.659,43.862,21.35,43.611,20.083z"/>
        </svg>
        <span>Masuk dengan Google</span>
      </button>

      <div class="divider">atau masuk manual</div>

      <input type="email" placeholder="Email">

      <div class="pw-field">
        <input id="pw" type="password" placeholder="Kata sandi">
        <button type="button" class="pw-toggle" onclick="togglePw()">👁</button>
      </div>

      <div class="forgot"><a href="#">Lupa kata sandi?</a></div>
    </form>
  </div>

  <div class="bottom-bar">
    <div class="bottom-bar-inner">
      <button type="button" class="submit-btn">Masuk</button>
    </div>
  </div>

  <script>
    function togglePw() {
      const pw = document.getElementById('pw');
      pw.type = pw.type === 'password' ? 'text' : 'password';
    }
  </script>

</body>
</html>
