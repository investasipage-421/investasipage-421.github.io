<style>
body { padding:0; justify-content:flex-start; background:#F6F6F6; min-height:100vh; }

.back-wrap { display:flex; flex-direction:column; align-items:center; gap:4px; }
.back-btn { width:44px; height:44px; border-radius:12px; background:#E8E8E8; border:2px solid #C6C6C6; box-shadow:0 5px 0 #C0C0C0; font-size:22px; color:#A0A0A0; cursor:pointer; display:flex; align-items:center; justify-content:center; font-weight:700; line-height:1; padding-bottom:3px; text-decoration:none; transition:all 0.15s; }
.back-btn:active { box-shadow:none; transform:translateY(5px); }
.back-label { font-size:10px; font-weight:700; color:#A0A0A0; }
.header-center { text-align:center; padding-top:4px; flex:1; margin:0 12px; }
.header-center h2 { font-size:18px; font-weight:800; margin:0; color:#3F3F3F; }
.header-center p { font-size:12px; color:#A0A0A0; margin:2px 0 0; font-weight:600; }
.xp-badge { display:flex; flex-direction:column; align-items:center; gap:4px; }
.xp-box { width:52px; height:52px; border-radius:14px; background:#2ECC71; border:2px solid #27AE60; box-shadow:0 5px 0 #1E8449; display:flex; align-items:center; justify-content:center; }
.xp-label { font-size:11px; font-weight:800; color:#2ECC71; }
.content { padding:100px 16px 30px; max-width:480px; margin:0 auto; }
.avatar-card { background:#FFF8DC; border-radius:20px 20px 0 0; overflow:hidden; min-height:260px; display:flex; align-items:flex-end; justify-content:center; }
.avatar-card img { width:100%; max-height:300px; object-fit:contain; display:block; }
.name-section { background:#fff; border-radius:0 0 20px 20px; padding:16px 20px; display:flex; align-items:center; justify-content:space-between; box-shadow:0 5px 0 #E0E0E0; border:2px solid #E8E8E8; border-top:none; margin-bottom:16px; }
.name-info h3 { font-size:20px; font-weight:800; color:#3F3F3F; margin:0 0 4px; }
.name-info p { font-size:11px; font-weight:700; color:#A0A0A0; letter-spacing:0.05em; margin:0; text-transform:uppercase; }
.edit-btn { width:44px; height:44px; border-radius:12px; background:#E8E8E8; border:2px solid #D0D0D0; box-shadow:0 4px 0 #C8C8C8; display:flex; align-items:center; justify-content:center; cursor:pointer; transition:all 0.15s; flex-shrink:0; border-style:solid; }
.edit-btn:active { box-shadow:none; transform:translateY(4px); }
</style>

};
const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const bulan = ['JANUARI','FEBRUARI','MARET','APRIL','MEI','JUNI','JULI','AGUSTUS','SEPTEMBER','OKTOBER','NOVEMBER','DESEMBER'];
onAuthStateChanged(auth, (user) => {
  if (!user) { window.location.href = '/login'; return; }
  document.getElementById('userName').textContent = user.displayName || user.email.split('@')[0];
  const created = new Date(user.metadata.creationTime);
  document.getElementById('joinDate').textContent = 'GABUNG SEJAK ' + bulan[created.getMonth()] + ' ' + created.getFullYear();
});
