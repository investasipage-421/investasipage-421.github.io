<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Orbit</title>
<link rel="stylesheet" href="/css/style.css">
<style>
  body {
    padding: 0;
    justify-content: flex-start;
    background: #F6F6F6;
    min-height: 100vh;
  }

  /* Top bar */
  .topbar {
    position: fixed;
    top: 0; left: 0; right: 0;
    background: #fff;
    border-bottom: 2px solid #E1E1E1;
    padding: 14px 16px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    z-index: 100;
  }
  .topbar-left {
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .topbar-logo { width: 32px; height: 32px; }
  .topbar-name { font-size: 18px; font-weight: 800; color: var(--orbit-1); }
  .avatar-sm {
    width: 36px; height: 36px;
    border-radius: 50%;
    background: #EEF3FF;
    border: 2px solid var(--orbit-1);
    display: flex; align-items: center; justify-content: center;
    font-size: 16px; cursor: pointer;
  }

  /* Content */
  .content {
    padding: 80px 16px 100px;
    max-width: 480px;
    margin: 0 auto;
  }

  /* Under construction */
  .wip-box {
    display: none;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 60vh;
    text-align: center;
    padding: 32px 16px;
  }
  .wip-box.active { display: flex; }
  .wip-icon { font-size: 64px; margin-bottom: 16px; }
  .wip-title { font-size: 20px; font-weight: 800; color: #3F3F3F; margin-bottom: 8px; }
  .wip-msg { font-size: 14px; color: #818181; }

  /* Bottom nav */
  .bottom-nav {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    background: #fff;
    border-top: 2px solid #E1E1E1;
    display: flex;
    justify-content: space-around;
    align-items: flex-end;
    padding: 8px 8px 20px;
    z-index: 100;
  }
  .nav-item {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
    cursor: pointer;
    font-size: 10px;
    font-weight: 700;
    color: #A0A0A0;
    border: none;
    background: none;
    padding: 0;
  }
  .nav-box {
    width: 48px; height: 48px;
    border-radius: 14px;
    background: #F0F0F0;
    border: 2px solid #D8D8D8;
    box-shadow: 0 4px 0 #C8C8C8;
    display: flex; align-items: center; justify-content: center;
    font-size: 22px;
    transition: all 0.15s ease;
  }
  .nav-item:active .nav-box {
    box-shadow: none;
    transform: translateY(4px);
  }
  .nav-item.active .nav-box {
    background: #EEF3FF;
    border-color: #316FEA;
    box-shadow: 0 4px 0 #1a4fbb;
  }
  .nav-item.active:active .nav-box {
    box-shadow: none;
    transform: translateY(4px);
  }
  .nav-item.active { color: var(--orbit-1); }
  .nav-box svg { color: #A0A0A0; }
  .nav-item.active .nav-box svg { color: #316FEA; }

  /* Tanya AI center button - sama tinggi dengan yang lain */
  .nav-item.center-btn {
    margin-top: 0;
    padding: 0;
    background: none;
    border: none;
  }
  .center-btn-inner {
    width: 48px; height: 48px;
    border-radius: 14px;
    background: linear-gradient(135deg, #FFC508, #FFD740);
    border: 2px solid #C99B06;
    box-shadow: 0 4px 0 #C99B06;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.15s;
    margin-bottom: 0;
  }
  .nav-item.center-btn:active .center-btn-inner {
    box-shadow: none;
    transform: translateY(4px);
  }
  .center-btn-inner svg { width: 28px; height: 28px; }
  .nav-item.center-btn span:last-child { font-size: 10px; font-weight: 800; color: #C99B06; }

  /* Notif dot */
  .notif-dot {
    width: 10px; height: 10px;
    background: #FF3D00;
    border-radius: 50%;
    position: absolute;
    top: -2px; right: -2px;
  }
  .nav-icon-wrap { position: relative; display: inline-flex; }
</style>
</head>
<body>

  <!-- Top bar -->
  <div class="topbar">
    <div class="topbar-left">
      <svg class="topbar-logo" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
        <circle cx="32" cy="32" r="10" fill="#FF8A3D"/>
        <ellipse cx="32" cy="32" rx="28" ry="12" stroke="#5B6CFF" stroke-width="3" fill="none" transform="rotate(-20 32 32)"/>
        <circle cx="9" cy="22" r="4" fill="#5B6CFF" transform="rotate(-20 32 32)"/>
      </svg>
      <span class="topbar-name">Orbit</span>
    </div>
    <div class="avatar-sm" id="avatarBtn">👤</div>
  </div>

  <!-- Content tabs -->
  <div class="content">
    <div class="wip-box active" id="tab-beranda">
      <div class="wip-icon">🏠</div>
      <div class="wip-title">Beranda</div>
      <div class="wip-msg">Sedang diperbaiki, harap tunggu ya!</div>
    </div>
    <div class="wip-box" id="tab-belajar">
      <div class="wip-icon">📚</div>
      <div class="wip-title">Belajar</div>
      <div class="wip-msg">Sedang diperbaiki, harap tunggu ya!</div>
    </div>
    <div class="wip-box" id="tab-tanyaai">
      <div class="wip-icon">🤖</div>
      <div class="wip-title">Tanya AI</div>
      <div class="wip-msg">Sedang diperbaiki, harap tunggu ya!</div>
    </div>
    <div class="wip-box" id="tab-catatan">
      <div class="wip-icon">📝</div>
      <div class="wip-title">Catatan</div>
      <div class="wip-msg">Sedang diperbaiki, harap tunggu ya!</div>
    </div>
    <div class="wip-box" id="tab-lainnya">
      <div class="wip-icon">⚙️</div>
      <div class="wip-title">Lainnya</div>
      <div class="wip-msg">Sedang diperbaiki, harap tunggu ya!</div>
    </div>
  </div>

  <!-- Bottom nav -->
  <div class="bottom-nav">
    <button class="nav-item active" id="nav-beranda" onclick="pindahTab('beranda')">
      <div class="nav-box"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
  <path d="M3 9.5L12 3L21 9.5V20C21 20.55 20.55 21 20 21H15V15H9V21H4C3.45 21 3 20.55 3 20V9.5Z" fill="currentColor"/>
</svg></div>
      <span>Beranda</span>
    </button>

    <button class="nav-item" id="nav-belajar" onclick="pindahTab('belajar')">
      <div class="nav-box" style="position:relative;">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect x="3" y="3" width="18" height="18" rx="4" fill="currentColor" opacity="0.15"/>
  <path d="M10 8.5L16 12L10 15.5V8.5Z" fill="currentColor"/>
</svg>
        <span class="notif-dot"></span>
      </div>
      <span>Belajar</span>
    </button>

    <button class="nav-item center-btn" id="nav-tanyaai" onclick="pindahTab('tanyaai')">
      <div class="center-btn-inner"><svg width="28" height="28" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect x="8" y="14" width="48" height="42" rx="10" fill="#FF8A3D"/>
  <rect x="8" y="14" width="48" height="12" rx="6" fill="#FF3D00"/>
  <ellipse cx="24" cy="38" rx="7" ry="8" fill="#fff"/>
  <ellipse cx="40" cy="38" rx="7" ry="8" fill="#fff"/>
  <circle cx="25" cy="39" r="4" fill="#1a0f00"/>
  <circle cx="41" cy="39" r="4" fill="#1a0f00"/>
  <circle cx="26.5" cy="37" r="1.5" fill="#fff"/>
  <circle cx="42.5" cy="37" r="1.5" fill="#fff"/>
  <path d="M24 50 Q32 55 40 50" stroke="#c8855a" stroke-width="2.5" fill="none" stroke-linecap="round"/>
</svg></div>
      <span>Tanya AI</span>
    </button>

    <button class="nav-item" id="nav-catatan" onclick="pindahTab('catatan')">
      <div class="nav-box"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
  <path d="M6 3H18C18.55 3 19 3.45 19 4V21L12 17.5L5 21V4C5 3.45 5.45 3 6 3Z" fill="currentColor"/>
</svg></div>
      <span>Catatan</span>
    </button>

    <button class="nav-item" id="nav-lainnya" onclick="pindahTab('lainnya')">
      <div class="nav-box"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
  <circle cx="5" cy="12" r="2" fill="currentColor"/>
  <circle cx="12" cy="12" r="2" fill="currentColor"/>
  <circle cx="19" cy="12" r="2" fill="currentColor"/>
</svg></div>
      <span>Lainnya</span>
    </button>
  </div>

  <script>
    function pindahTab(tab) {
      document.querySelectorAll('.wip-box').forEach(el => el.classList.remove('active'));
      document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
      document.getElementById('tab-' + tab).classList.add('active');
      document.getElementById('nav-' + tab).classList.add('active');
    }
  </script>

  <!-- Firebase cek login -->
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

    const firebaseConfig = {
      apiKey: "AIzaSyDx5PqjFlKfrBcildKkCs77KjjGJ97dtvA",
      authDomain: "orbitxy-6e79c.firebaseapp.com",
      databaseURL: "https://orbitxy-6e79c-default-rtdb.asia-southeast1.firebasedatabase.app",
      projectId: "orbitxy-6e79c",
      storageBucket: "orbitxy-6e79c.firebasestorage.app",
      messagingSenderId: "1064037228597",
      appId: "1:1064037228597:web:7a0bdc18ca338ec1d7d17c"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);

    onAuthStateChanged(auth, (user) => {
      if (!user) {
        window.location.href = '/login';
      } else {
        document.getElementById('avatarBtn').textContent = 
          user.displayName ? user.displayName.charAt(0).toUpperCase() : '👤';
      }
    });
  </script>

</body>
</html>
