<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Masuk Orbit</title>
<link rel="stylesheet" href="/css/style.css">
<style>
  .loading { opacity: 0.7; pointer-events: none; }
  .submit-btn:disabled {
    background: #E0E0E0;
    border-color: #C8C8C8;
    box-shadow: 0 5px 0 #C8C8C8;
    color: #A0A0A0;
    cursor: not-allowed;
    transform: none;
  }

  .error-panel {
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    z-index: 999;
    background: #FFE4E4;
    border-top: 4px solid #FFBBBB;
    padding: 20px 16px 32px;
    display: flex;
    flex-direction: column;
    align-items: center;
    transform: translateY(100%);
    transition: transform 0.35s cubic-bezier(0.34, 1.2, 0.64, 1);
  }
  .error-panel.show {
    transform: translateY(0);
  }
  .error-panel-inner {
    width: 100%;
    max-width: 420px;
  }
  .error-panel-title {
    display: flex;
    align-items: center;
    gap: 10px;
    color: #CC0000;
    font-weight: 800;
    font-size: 18px;
    margin-bottom: 6px;
  }
  .error-icon {
    background: #CC0000;
    color: white;
    border-radius: 50%;
    width: 28px;
    height: 28px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 16px;
    font-weight: 900;
    flex-shrink: 0;
  }
  .error-panel-msg {
    font-size: 15px;
    font-weight: 700;
    color: #3F3F3F;
    margin: 0;
  }
</style>
</head>
<body>

  <div class="wrap">
    <div class="mark">
      <svg viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
        <circle cx="32" cy="32" r="10" fill="var(--orbit-2)"/>
        <ellipse cx="32" cy="32" rx="28" ry="12" stroke="var(--orbit-1)" stroke-width="3" fill="none" transform="rotate(-20 32 32)"/>
        <circle cx="9" cy="22" r="4" fill="var(--orbit-1)" transform="rotate(-20 32 32)"/>
      </svg>
    </div>

    <h1>Masuk Orbit</h1>
    <div class="switch-line">Belum punya akun? <a href="/daftar">Daftar akun</a></div>

    <form onsubmit="return false;">
      <button type="button" class="google-btn" onclick="loginGoogle()">
        <svg width="22" height="22" viewBox="0 0 48 48" xmlns="http://www.w3.org/2000/svg">
          <path fill="#FFC107" d="M43.611,20.083H42V20H24v8h11.303c-1.649,4.657-6.08,8-11.303,8c-6.627,0-12-5.373-12-12c0-6.627,5.373-12,12-12c3.059,0,5.842,1.154,7.961,3.039l5.657-5.657C34.046,6.053,29.268,4,24,4C12.955,4,4,12.955,4,24c0,11.045,8.955,20,20,20c11.045,0,20-8.955,20-20C44,22.659,43.862,21.35,43.611,20.083z"/>
          <path fill="#FF3D00" d="M6.306,14.691l6.571,4.819C14.655,15.108,18.961,12,24,12c3.059,0,5.842,1.154,7.961,3.039l5.657-5.657C34.046,6.053,29.268,4,24,4C16.318,4,9.656,8.337,6.306,14.691z"/>
          <path fill="#4CAF50" d="M24,44c5.166,0,9.86-1.977,13.409-5.192l-6.19-5.238C29.211,35.091,26.715,36,24,36c-5.202,0-9.619-3.317-11.283-7.946l-6.522,5.025C9.505,39.556,16.227,44,24,44z"/>
          <path fill="#1976D2" d="M43.611,20.083H42V20H24v8h11.303c-0.792,2.237-2.231,4.166-4.087,5.571c0.001-0.001,0.002-0.001,0.003-0.002l6.19,5.238C36.971,39.205,44,34,44,24C44,22.659,43.862,21.35,43.611,20.083z"/>
        </svg>
        <span>Masuk dengan Google</span>
      </button>

      <div class="divider">atau masuk manual</div>

      <input id="email" type="email" placeholder="Email" oninput="cekInput()">
      <div class="pw-field">
        <input id="pw" type="password" placeholder="Kata sandi" oninput="cekInput()">
        <button type="button" class="pw-toggle" onclick="togglePw()">👁</button>
      </div>

      <div class="forgot"><a href="/forget-password">Lupa kata sandi?</a></div>
    </form>
  </div>

  <!-- Error panel -->
  <div id="errorPanel" class="error-panel">
    <div class="error-panel-inner">
      <div class="error-panel-title">
        <span class="error-icon">!</span>
        Oops...
      </div>
      <p id="errorMsg" class="error-panel-msg"></p>
    </div>
  </div>

  <!-- Tombol Masuk (satu-satunya) -->
  <div class="bottom-bar">
    <div class="bottom-bar-inner">
      <button id="submitBtn" type="button" class="submit-btn" onclick="loginEmail()" disabled>Masuk</button>
    </div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getAuth, signInWithEmailAndPassword, GoogleAuthProvider, signInWithPopup } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

    const firebaseConfig = {
      apiKey: "AIzaSyDx5PqjFlKfrBcildKkCs77KjjGJ97dtvA",
      authDomain: "orbitxy-6e79c.firebaseapp.com",
      databaseURL: "https://orbitxy-6e79c-default-rtdb.asia-southeast1.firebasedatabase.app",
      projectId: "orbitxy-6e79c",
      storageBucket: "orbitxy-6e79c.firebasestorage.app",
      messagingSenderId: "1064037228597",
      appId: "1:1064037228597:web:7a0bdc18ca338ec1d7d17c"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const provider = new GoogleAuthProvider();

    let toastTimer = null;

    function showError(msg) {
      document.getElementById('errorMsg').textContent = msg;
      document.getElementById('errorPanel').classList.add('show');
      if (toastTimer) clearTimeout(toastTimer);
      toastTimer = setTimeout(() => {
        document.getElementById('errorPanel').classList.remove('show');
      }, 5000);
    }

    function setLoading(loading) {
      const btn = document.getElementById('submitBtn');
      btn.textContent = loading ? 'Memuat...' : 'Masuk';
      btn.classList.toggle('loading', loading);
    }

    window.cekInput = function() {
      const email = document.getElementById('email').value.trim();
      const pw = document.getElementById('pw').value;
      document.getElementById('submitBtn').disabled = !(email && pw);
    };

    window.togglePw = function() {
      const pw = document.getElementById('pw');
      pw.type = pw.type === 'password' ? 'text' : 'password';
    };

    window.loginEmail = async function() {
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('pw').value;
      setLoading(true);
      try {
        await signInWithEmailAndPassword(auth, email, password);
        window.location.href = '/dashboard';
      } catch (e) {
        setLoading(false);
        if (e.code === 'auth/user-not-found' || e.code === 'auth/wrong-password' || e.code === 'auth/invalid-credential') {
          showError('Email atau kata sandi salah. Silakan coba lagi.');
        } else if (e.code === 'auth/invalid-email') {
          showError('Format email tidak valid.');
        } else if (e.code === 'auth/too-many-requests') {
          showError('Terlalu banyak percobaan. Coba lagi nanti.');
        } else {
          showError('Terjadi kesalahan. Coba lagi.');
        }
      }
    };

    window.loginGoogle = async function() {
      try {
        await signInWithPopup(auth, provider);
        window.location.href = '/dashboard';
      } catch (e) {
        showError('Login Google gagal. Coba lagi.');
      }
    };
  </script>

</body>
</html>
