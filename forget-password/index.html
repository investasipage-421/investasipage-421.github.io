<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lupa Kata Sandi - Orbit</title>
<link rel="stylesheet" href="/css/style.css">
</head>
<body>

  <div class="wrap">
    <a href="/login" class="back-btn">‹</a>

    <div class="mark">
      <svg viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
        <circle cx="32" cy="32" r="10" fill="var(--orbit-2)"/>
        <ellipse cx="32" cy="32" rx="28" ry="12" stroke="var(--orbit-1)" stroke-width="3" fill="none" transform="rotate(-20 32 32)"/>
        <circle cx="9" cy="22" r="4" fill="var(--orbit-1)" transform="rotate(-20 32 32)"/>
      </svg>
    </div>

    <h1>Lupa Kata Sandi?</h1>
    <p class="forgot-desc">Masukkan email kamu dan kami akan mengirimkan kode untuk reset kata sandi.</p>

    <form onsubmit="return false;">
      <input type="email" placeholder="Email">
    </form>
  </div>

  <div class="bottom-bar">
    <div class="bottom-bar-inner">
      <button type="button" class="submit-btn">Kirim Kode</button>
    </div>
  </div>

</body>
</html>
