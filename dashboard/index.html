<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Selesaikan Profilmu - Orbit</title>
<link rel="stylesheet" href="/css/style.css">
<style>
  body {
    padding: 0;
    justify-content: flex-start;
    background: #fff;
  }

  .ob-header {
    position: fixed;
    top: 0; left: 0; right: 0;
    background: #fff;
    z-index: 100;
    padding: 14px 16px 0;
  }
  .ob-header-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    max-width: 480px;
    margin: 0 auto 10px;
  }
  .ob-nav-btn {
    width: 48px; height: 48px;
    border-radius: 14px;
    background: #E8E8E8;
    border: 2px solid #C6C6C6;
    box-shadow: 0 5px 0 #C0C0C0;
    font-size: 20px;
    color: #A0A0A0;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.15s;
    flex-shrink: 0;
    font-weight: 700;
    line-height: 1;
    padding: 0;
    padding-bottom: 3px;
  }
  .ob-nav-btn:active:not(.decorative) {
    box-shadow: none;
    transform: translateY(5px);
  }
  .ob-nav-btn.decorative {
    opacity: 0.4;
    cursor: default;
    pointer-events: none;
  }
  .ob-nav-btn:hover:not(.decorative) { background: #DCDCDC; }

  .ob-title-wrap { text-align: center; flex: 1; }
  .ob-title-wrap h2 { font-size: 16px; font-weight: 800; margin: 0; color: #3F3F3F; }
  .ob-title-wrap span { font-size: 12px; color: #818181; font-weight: 600; }

  .ob-progress-wrap {
    max-width: 480px;
    margin: 0 auto 2px;
    height: 7px;
    background: #E5E5E5;
    border-radius: 99px;
    overflow: hidden;
  }
  .ob-progress-bar {
    height: 100%;
    background: #316FEA;
    border-radius: 99px;
    transition: width 0.4s ease;
  }

  .ob-content {
    padding: 90px 16px 30px;
    max-width: 480px;
    margin: 0 auto;
    width: 100%;
  }

  .ob-question {
    font-size: 26px;
    font-weight: 800;
    color: #3F3F3F;
    margin: 0 0 20px;
    line-height: 1.3;
  }

  .step { display: none; }
  .step.active { display: block; }

  /* Avatar grid */
  .avatar-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 14px;
  }
  /* Avatar card - tombol style dengan shadow bawah */
  .avatar-card {
    border: 2.5px solid #D8D8D8;
    border-radius: 20px;
    padding: 0;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    background: #fff;
    overflow: visible;
    aspect-ratio: 1;
    box-shadow: 0 6px 0 #C8C8C8;
    transition: box-shadow 0.12s ease, transform 0.12s ease, border-color 0.15s;
    position: relative;
  }
  .avatar-card:active {
    box-shadow: none;
    transform: translateY(6px);
  }
  .avatar-card.selected {
    border-color: #316FEA;
    box-shadow: 0 6px 0 #1a4fbb;
  }
  .avatar-card.selected:active {
    box-shadow: none;
    transform: translateY(6px);
  }
  .avatar-card svg {
    width: 100%; height: 100%;
    display: block;
    border-radius: 17px;
    overflow: hidden;
  }



  /* Source list */
  .source-list { display: flex; flex-direction: column; gap: 12px; }
  .source-item {
    display: flex;
    align-items: center;
    gap: 14px;
    border: 2.5px solid #D8D8D8;
    border-radius: 16px;
    padding: 14px 18px;
    cursor: pointer;
    background: #fff;
    font-size: 16px;
    font-weight: 700;
    color: #3F3F3F;
    box-shadow: 0 5px 0 #C8C8C8;
    transition: box-shadow 0.12s ease, transform 0.12s ease, border-color 0.15s;
  }
  .source-item:active {
    box-shadow: none;
    transform: translateY(5px);
  }
  .source-item.selected {
    border-color: #316FEA;
    background: #EEF3FF;
    box-shadow: 0 5px 0 #1a4fbb;
  }
  .source-item.selected:active {
    box-shadow: none;
    transform: translateY(5px);
  }
  .source-icon {
    width: 44px; height: 44px;
    border-radius: 12px;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
    overflow: hidden;
  }



  /* Modal */
  .modal-overlay {
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.45);
    z-index: 999;
    display: flex; align-items: center; justify-content: center;
    padding: 24px;
    opacity: 0; pointer-events: none;
    transition: opacity 0.25s ease;
  }
  .modal-overlay.show { opacity: 1; pointer-events: all; }
  .modal-box {
    background: #fff;
    border-radius: 28px;
    padding: 40px 28px 36px;
    width: 100%; max-width: 340px;
    display: flex; flex-direction: column; align-items: center; text-align: center;
    transform: scale(0.88);
    transition: transform 0.25s cubic-bezier(0.34,1.4,0.64,1);
    box-shadow: 0 20px 60px rgba(0,0,0,0.2);
  }
  .modal-overlay.show .modal-box { transform: scale(1); }
  .modal-mark { width: 80px; height: 80px; margin-bottom: 20px; animation: float 3s ease-in-out infinite; }
  .modal-text { font-size: 20px; font-weight: 800; color: #3F3F3F; line-height: 1.45; margin: 0; }
</style>
</head>
<body>

<div class="ob-header">
  <div class="ob-header-row">
    <button class="ob-nav-btn" id="btnBack" onclick="prevStep()"><span style="display:flex;align-items:center;justify-content:center;line-height:1;">←</span></button>
    <div class="ob-title-wrap">
      <h2>Selesaikan profilmu</h2>
      <span id="stepLabel">1 dari 2</span>
    </div>
    <button class="ob-nav-btn decorative">⏭</button>
  </div>
  <div class="ob-progress-wrap">
    <div class="ob-progress-bar" id="progressBar" style="width:50%"></div>
  </div>
</div>

      <div class="source-item" onclick="pilihSumber(this,'lainnya')">
        <div class="source-icon"><svg viewBox="0 0 24 24" width="24" height="24" xmlns="http://www.w3.org/2000/svg">
  <rect width="24" height="24" rx="6" fill="#9E9E9E"/>
  <circle cx="6" cy="12" r="2" fill="white"/>
  <circle cx="12" cy="12" r="2" fill="white"/>
  <circle cx="18" cy="12" r="2" fill="white"/>
</svg></div> Lainnya
      </div>
    </div>
  </div>

</div>

<!-- Modal -->
<div class="modal-overlay" id="modalOverlay" onclick="tutupModal()">
  <div class="modal-box" onclick="event.stopPropagation()">
    <svg class="modal-mark" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
      <circle cx="32" cy="32" r="10" fill="#FF8A3D"/>
      <ellipse cx="32" cy="32" rx="28" ry="12" stroke="#5B6CFF" stroke-width="3" fill="none" transform="rotate(-20 32 32)"/>
      <circle cx="9" cy="22" r="4" fill="#5B6CFF" transform="rotate(-20 32 32)"/>
    </svg>
    <p class="modal-text">Tolong selesaikan profilmu untuk melanjutkan ke Orbit!</p>
  </div>
</div>



<script>
  let currentStep = 1;
  const totalSteps = 2;
  let selectedAvatar = null;
  let selectedSumber = null;

  function updateUI() {
    document.querySelectorAll('.step').forEach((el, i) => {
      el.classList.toggle('active', i + 1 === currentStep);
    });
    document.getElementById('progressBar').style.width = (currentStep / totalSteps * 100) + '%';
    document.getElementById('stepLabel').textContent = currentStep + ' dari ' + totalSteps;
    updateNextBtn();
  }

  function updateNextBtn() {
    const btn = document.getElementById('nextBtn');
    if (currentStep === 1) {
      btn.disabled = !selectedAvatar;
      btn.textContent = 'LANJUT';
    } else {
      btn.disabled = !selectedSumber;
      btn.textContent = 'SELESAI';
    }
  }

  function prevStep() {
    if (currentStep > 1) { currentStep--; updateUI(); }
    else { document.getElementById('modalOverlay').classList.add('show'); }
  }

  function nextStep() {
    if (currentStep < totalSteps) { currentStep++; updateUI(); }
    else {
      localStorage.setItem('orbit_avatar', selectedAvatar);
      localStorage.setItem('orbit_sumber', selectedSumber);
      window.location.href = '/home';
    }
  }

  function pilihAvatar(el, id) {
    document.querySelectorAll('.avatar-card').forEach(c => c.classList.remove('selected'));
    el.classList.add('selected');
    selectedAvatar = id;
    updateNextBtn();
  }

  function pilihSumber(el, id) {
    document.querySelectorAll('.source-item').forEach(c => c.classList.remove('selected'));
    el.classList.add('selected');
    selectedSumber = id;
    updateNextBtn();
  }

  window.tutupModal = function() {
    document.getElementById('modalOverlay').classList.remove('show');
  };
</script>

</body>
</html>
