<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Daftar Orbit</title>
<link rel="stylesheet" href="/css/style.css">
<script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
<style>
  .loading { opacity: 0.7; pointer-events: none; }
  .submit-btn:disabled {
    background: #E0E0E0;
    border-color: #C8C8C8;
    box-shadow: 0 5px 0 #C8C8C8;
    color: #A0A0A0;
    cursor: not-allowed;
    transform: none;
  }

  .error-panel {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    z-index: 999;
    background: #FFE4E4;
    border-top: 4px solid #FFBBBB;
    padding: 20px 16px 32px;
    display: flex;
    flex-direction: column;
    align-items: center;
    transform: translateY(100%);
    transition: transform 0.35s cubic-bezier(0.34, 1.2, 0.64, 1);
  }
  .error-panel.show { transform: translateY(0); }
  .error-panel-inner { width: 100%; max-width: 420px; }
  .error-panel-title {
    display: flex; align-items: center; gap: 10px;
    color: #CC0000; font-weight: 800; font-size: 18px; margin-bottom: 6px;
  }
  .error-icon {
    background: #CC0000; color: white; border-radius: 50%;
    width: 28px; height: 28px;
    display: flex; align-items: center; justify-content: center;
    font-size: 16px; font-weight: 900; flex-shrink: 0;
  }
  .error-panel-msg { font-size: 15px; font-weight: 700; color: #3F3F3F; margin: 0; }

  .success-panel {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    z-index: 999;
    background: #E6FFED;
    border-top: 4px solid #A8E6BB;
    padding: 20px 16px 32px;
    display: flex;
    flex-direction: column;
    align-items: center;
    transform: translateY(100%);
    transition: transform 0.35s cubic-bezier(0.34, 1.2, 0.64, 1);
  }
  .success-panel.show { transform: translateY(0); }
  .success-panel-inner { width: 100%; max-width: 420px; }
  .success-panel-title {
    display: flex; align-items: center; gap: 10px;
    color: #2E7D32; font-weight: 800; font-size: 18px; margin-bottom: 6px;
  }
  .success-icon {
    background: #2E7D32; color: white; border-radius: 50%;
    width: 28px; height: 28px;
    display: flex; align-items: center; justify-content: center;
    font-size: 16px; font-weight: 900; flex-shrink: 0;
  }
  .success-panel-msg { font-size: 15px; font-weight: 700; color: #3F3F3F; margin: 0; }
</style>
</head>
<body>

  <div class="wrap">
    <div class="mark">
      <svg viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
        <circle cx="32" cy="32" r="10" fill="var(--orbit-2)"/>
        <ellipse cx="32" cy="32" rx="28" ry="12" stroke="var(--orbit-1)" stroke-width="3" fill="none" transform="rotate(-20 32 32)"/>
        <circle cx="9" cy="22" r="4" fill="var(--orbit-1)" transform="rotate(-20 32 32)"/>
      </svg>
    </div>

    <h1>Daftar profilmu</h1>
    <div class="switch-line">Sudah punya akun? <a href="/login">Masuk</a></div>

    <form onsubmit="return false;">
      <button type="button" class="google-btn" onclick="daftarGoogle()">
        <svg width="22" height="22" viewBox="0 0 48 48" xmlns="http://www.w3.org/2000/svg">
          <path fill="#FFC107" d="M43.611,20.083H42V20H24v8h11.303c-1.649,4.657-6.08,8-11.303,8c-6.627,0-12-5.373-12-12c0-6.627,5.373-12,12-12c3.059,0,5.842,1.154,7.961,3.039l5.657-5.657C34.046,6.053,29.268,4,24,4C12.955,4,4,12.955,4,24c0,11.045,8.955,20,20,20c11.045,0,20-8.955,20-20C44,22.659,43.862,21.35,43.611,20.083z"/>
          <path fill="#FF3D00" d="M6.306,14.691l6.571,4.819C14.655,15.108,18.961,12,24,12c3.059,0,5.842,1.154,7.961,3.039l5.657-5.657C34.046,6.053,29.268,4,24,4C16.318,4,9.656,8.337,6.306,14.691z"/>
          <path fill="#4CAF50" d="M24,44c5.166,0,9.86-1.977,13.409-5.192l-6.19-5.238C29.211,35.091,26.715,36,24,36c-5.202,0-9.619-3.317-11.283-7.946l-6.522,5.025C9.505,39.556,16.227,44,24,44z"/>
          <path fill="#1976D2" d="M43.611,20.083H42V20H24v8h11.303c-0.792,2.237-2.231,4.166-4.087,5.571c0.001-0.001,0.002-0.001,0.003-0.002l6.19,5.238C36.971,39.205,44,34,44,24C44,22.659,43.862,21.35,43.611,20.083z"/>
        </svg>
        <span>Daftar dengan Google</span>
      </button>

      <div class="divider">atau daftar manual</div>

      <input id="nama" type="text" placeholder="Nama" oninput="cekInput()">
      <input id="email" type="email" placeholder="Email" oninput="cekInput()">

      <div class="pw-field">
        <input id="pw" type="password" placeholder="Kata sandi" oninput="cekInput()">
        <button type="button" class="pw-toggle" onclick="togglePw('pw')">👁</button>
      </div>

      <div class="pw-field">
        <input id="pw2" type="password" placeholder="Konfirmasi kata sandi" oninput="cekInput()">
        <button type="button" class="pw-toggle" onclick="togglePw('pw2')">👁</button>
      </div>
    </form>
  </div>

  <!-- Error panel -->
  <div id="errorPanel" class="error-panel">
    <div class="error-panel-inner">
      <div class="error-panel-title">
        <span class="error-icon">!</span>
        Oops...
      </div>
      <p id="errorMsg" class="error-panel-msg"></p>
    </div>
  </div>

  <!-- Success panel -->
  <div id="successPanel" class="success-panel">
    <div class="success-panel-inner">
      <div class="success-panel-title">
        <span class="success-icon">✓</span>
        Akun Dibuat!
      </div>
      <p class="success-panel-msg">Link verifikasi sudah dikirim ke email kamu. Cek inbox atau folder spam, lalu klik link-nya sebelum masuk.</p>
    </div>
  </div>

  <!-- Tombol Daftar -->
  <div class="bottom-bar">
    <div class="bottom-bar-inner">
      <button id="submitBtn" type="button" class="submit-btn" onclick="daftarEmail()" disabled>Daftar Akun</button>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getAuth, createUserWithEmailAndPassword, updateProfile, GoogleAuthProvider, signInWithPopup } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";



    const firebaseConfig = {
      apiKey: "AIzaSyDx5PqjFlKfrBcildKkCs77KjjGJ97dtvA",
      authDomain: "orbitxy-6e79c.firebaseapp.com",
      databaseURL: "https://orbitxy-6e79c-default-rtdb.asia-southeast1.firebasedatabase.app",
      projectId: "orbitxy-6e79c",
      storageBucket: "orbitxy-6e79c.firebasestorage.app",
      messagingSenderId: "1064037228597",
      appId: "1:1064037228597:web:7a0bdc18ca338ec1d7d17c"
    };

    const EMAILJS_PUBLIC_KEY  = '6XJwFyAjqoA0nIis3';
    const EMAILJS_SERVICE_ID  = 'service_qbvxohl';
    const EMAILJS_TEMPLATE_ID = 'template_wf2m7va';
    window.emailjs.init(EMAILJS_PUBLIC_KEY);

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const provider = new GoogleAuthProvider();

    let errorTimer = null;

    function showError(msg) {
      document.getElementById('errorMsg').textContent = msg;
      document.getElementById('errorPanel').classList.add('show');
      if (errorTimer) clearTimeout(errorTimer);
      errorTimer = setTimeout(() => {
        document.getElementById('errorPanel').classList.remove('show');
      }, 5000);
    }

    function showSuccess() {
      document.getElementById('successPanel').classList.add('show');
      setTimeout(() => { window.location.href = '/login'; }, 5000);
    }

    function setLoading(loading) {
      const btn = document.getElementById('submitBtn');
      btn.textContent = loading ? 'Memuat...' : 'Daftar Akun';
      btn.classList.toggle('loading', loading);
    }

    window.cekInput = function() {
      const nama  = document.getElementById('nama').value.trim();
      const email = document.getElementById('email').value.trim();
      const pw    = document.getElementById('pw').value;
      const pw2   = document.getElementById('pw2').value;
      document.getElementById('submitBtn').disabled = !(nama && email && pw && pw2);
    };

    window.togglePw = function(id) {
      const pw = document.getElementById(id);
      pw.type = pw.type === 'password' ? 'text' : 'password';
    };

    window.daftarEmail = async function() {
      const nama  = document.getElementById('nama').value.trim();
      const email = document.getElementById('email').value.trim();
      const pw    = document.getElementById('pw').value;
      const pw2   = document.getElementById('pw2').value;

      if (pw !== pw2) return showError('Konfirmasi kata sandi tidak cocok.');
      if (pw.length < 6) return showError('Kata sandi minimal 6 karakter.');

      setLoading(true);
      try {
        const result = await createUserWithEmailAndPassword(auth, email, pw);
        await updateProfile(result.user, { displayName: nama });

        // Kirim email via EmailJS
        await window.emailjs.send(EMAILJS_SERVICE_ID, EMAILJS_TEMPLATE_ID, {
          nama:  nama,
          email: email,
          link:  'https://orbitxy.com/login'
        });

        setLoading(false);
        showSuccess();
      } catch (e) {
        setLoading(false);
        if (e.code === 'auth/email-already-in-use') {
          showError('Email sudah terdaftar. Silakan masuk.');
        } else if (e.code === 'auth/invalid-email') {
          showError('Format email tidak valid.');
        } else if (e.code === 'auth/weak-password') {
          showError('Kata sandi terlalu lemah.');
        } else {
          showError('Terjadi kesalahan. Coba lagi.');
        }
      }
    };

    window.daftarGoogle = async function() {
      try {
        await signInWithPopup(auth, provider);
        window.location.href = '/dashboard';
      } catch (e) {
        showError('Daftar dengan Google gagal. Coba lagi.');
      }
    };
  </script>

</body>
</html>
